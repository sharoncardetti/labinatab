{id:'climate',group:'🌍 Earth Science',emoji:'🌍',color:'#15803d',light:'#f0fdf4',
 title:'Climate & the Atmosphere',teaser:'A 1°C rise in global temperature triggers hurricanes, droughts, and sea-level rise. Why so sensitive?',chips:['Greenhouse effect','CO₂','Climate'],
 lvls:{
  junior:{icon:'🌤️',title:'Earth\'s invisible blanket',
   body:`<p>Earth is the perfect distance from the Sun — not scorching hot like Venus, not freezing cold like Mars. One major reason is our atmosphere, a thin layer of gases surrounding the planet. Without it, Earth's average temperature would be around −18°C and everything would be frozen solid!</p>
<p>The atmosphere acts like an <strong>invisible blanket</strong>. Sunlight passes straight through it and warms the ground. The warm ground then radiates heat back upward as invisible infrared radiation — like how a hot road shimmers with heat haze. Some gases in the atmosphere, called <strong>greenhouse gases</strong> (mainly carbon dioxide CO₂ and water vapour), absorb this rising heat and send much of it back downward. This keeps us warm: the <strong>greenhouse effect</strong>. Without it, we'd all be frozen.</p>
<p>Here's the problem: by burning coal, oil, and gas, humans are adding extra CO₂ to the atmosphere. More CO₂ means a thicker blanket, trapping more heat. Earth is warming. Even a seemingly small change of 1–2°C has enormous knock-on effects: ice sheets melt, sea levels rise, weather patterns shift, coral reefs bleach and die. The atmosphere is a finely tuned system, and we are changing it faster than it has ever changed in the last million years.</p>`,
   facts:[{e:'🌡️',t:'Earth\'s average temperature has risen ~1.2°C since the Industrial Revolution. Small sounds big — but it changes everything.'},{e:'🐻‍❄️',t:'Arctic sea ice in summer has shrunk by ~40% since satellite measurements began in 1979.'},{e:'🌊',t:'Sea levels have risen ~20 cm since 1900. They are now rising faster each decade, due to ice melt and ocean thermal expansion.'}],
   formula:null,sim:'climate'},

  student:{icon:'📊',title:'Radiative Forcing, the Carbon Cycle, and Climate Sensitivity',
   body:`<p>Earth's climate is a thermodynamic system maintained by the balance between incoming solar energy and outgoing infrared radiation. When this balance is disturbed — for example by adding CO₂ — the system must warm until a new balance is reached. The disturbance is quantified as <strong>radiative forcing</strong> ΔF (in W/m²): the change in energy flux at the top of the atmosphere before any temperature response. For CO₂, the forcing follows a logarithmic relationship: <span class="mk">ΔF = 5.35 · ln(C/C₀)</span>, where C₀ ≈ 280 ppm (pre-industrial) and C is the current concentration (~420 ppm). This gives ΔF ≈ 2.1 W/m² today — roughly equivalent to a small light bulb shining on every square metre of Earth's surface, continuously.</p>
<p>The resulting temperature change is <span class="mk">ΔT = λ · ΔF</span>, where λ is the <strong>climate sensitivity parameter</strong>. Without feedback effects, λ₀ ≈ 0.3 K/(W/m²). But the climate system has feedbacks that amplify warming: as temperature rises, water vapour (itself a greenhouse gas) increases (+1.8 W/m²/K), ice melts and dark ocean absorbs more sunlight (+0.4 W/m²/K), and so on. These positive feedbacks roughly triple the sensitivity to λ ≈ 0.8–1.2 K/(W/m²), giving an <strong>Equilibrium Climate Sensitivity (ECS)</strong> of approximately 2.5–4°C per doubling of CO₂.</p>
<p>The <strong>carbon cycle</strong> involves continuous exchange between the atmosphere (~900 GtC), land vegetation and soils (~2000 GtC), ocean surface and deep ocean (~38,000 GtC), and fossil fuel reserves (~5000 GtC accessible). Human emissions (~10 GtC/year) are partially offset: about 30% is absorbed by the ocean and 30% by land plants, leaving ~40% accumulating in the atmosphere — currently raising CO₂ at about 2.5 ppm/year, a rate unprecedented in the ice-core record.</p>`,
   facts:[{e:'🌿',t:'The ocean absorbs ~30% of human CO₂ emissions, but this causes ocean acidification — pH has dropped 0.1 units, dissolving the shells of marine organisms.'},{e:'🏔️',t:'The Greenland and Antarctic ice sheets together hold enough water to raise sea levels by ~65 metres if fully melted — a very long-term risk.'},{e:'💨',t:'Aerosol particles from industry and volcanoes actually cool the climate by ~0.5°C, masking even more warming. Reducing air pollution could cause a short-term temperature spike.'}],
   formula:{rows:[
    {n:'Radiative forcing',e:'ΔF  =  5.35 · ln( C / C₀ )   [W/m²]'},
    {n:'Pre-industrial C₀',e:'C₀  ≈  280 ppm;   C_now  ≈  420 ppm'},
    {sep:1},
    {n:'Temp. response',e:'ΔT  =  λ · ΔF'},
    {n:'No-feedback λ₀',e:'λ₀  ≈  0.3  K·m²/W'},
    {n:'With feedbacks λ',e:'λ  ≈  0.8–1.2  K·m²/W'},
    {sep:1},
    {n:'ECS (best estimate)',e:'ΔT_{2×CO₂}  ≈  3 °C   (IPCC AR6)'},
   ]},sim:'climate'},

  scholar:{icon:'∇',title:'Energy Balance Models, GCMs, and Climate Tipping Points',
   body:`<p>At the top-of-atmosphere (TOA), Earth's energy balance requires that absorbed solar radiation equals emitted longwave radiation: <span class="mk">S₀(1−α)/4 = σT_eff⁴</span>, giving effective radiating temperature <span class="mk">T_eff = [S₀(1−α)/(4σ)]^{1/4} ≈ 255 K</span>. The surface is ~33 K warmer due to the natural greenhouse effect — the downward re-emission of longwave radiation by greenhouse gases. The current energy imbalance (more energy absorbed than emitted) is measured by satellites at +0.87 W/m², directly confirming the anthropogenic greenhouse forcing.</p>
<p>The <strong>Planck feedback</strong> is the primary restoring force: as surface temperature T rises, emitted thermal radiation increases as 4σT³ (Stefan-Boltzmann), giving a stabilising feedback of λ_P = −1/(4σT³) ≈ −3.2 W·m⁻²·K⁻¹. Additional feedbacks contribute: water vapour (+1.8), lapse-rate (−0.6), surface albedo (+0.4), and cloud feedbacks (−0.4 to +0.4, the dominant uncertainty). The total feedback parameter γ = Σ f_i, and the Equilibrium Climate Sensitivity is <span class="mk">ECS = −ΔF_{2×} / γ</span>. The wide 2.5–4°C ECS range in IPCC AR6 reflects primarily cloud feedback uncertainty.</p>
<p>Modern climate projections use <strong>General Circulation Models (GCMs)</strong> — coupled atmosphere-ocean models solving the primitive equations (Navier-Stokes + thermodynamics on a rotating sphere) on grids of ~25–100 km horizontal resolution. Subgrid processes (convection, cloud microphysics, ocean eddies) require parameterisation, introducing model uncertainty. The most advanced models in CMIP6 include interactive carbon cycles, aerosol chemistry, and ice-sheet dynamics.</p>
<p>Perhaps most concerning are <strong>climate tipping points</strong> — thresholds at which positive feedbacks become self-sustaining, triggering large, irreversible state changes even after forcing is removed. Candidates include: West Antarctic Ice Sheet collapse (sea level +3 m), Greenland Ice Sheet collapse (+7 m), Amazon dieback (carbon source reversal), Atlantic Meridional Overturning Circulation (AMOC) collapse (European cooling), and permafrost carbon release (CH₄ feedback). Recent studies (Armstrong McKay et al., Science 2022) suggest some tipping points may be exceeded at 1.5–2°C of global warming, with cascading interactions — "tipping cascades" — potentially destabilising Earth's climate system at temperatures previously considered safe.</p>`,
   facts:[{e:'💻',t:'The highest-resolution climate models run on petaflop supercomputers for months to simulate decades — yet still cannot resolve individual clouds.'},{e:'📡',t:'CERES satellite instruments measure Earth\'s energy imbalance at +0.87 ± 0.12 W/m² (NASA, 2022) — confirming the greenhouse forcing directly from space.'},{e:'🌊',t:'AMOC has weakened ~15% since the mid-20th century (Caesar et al., Nature 2018) and may cross a tipping point between 1.8°C and 4°C of global warming.'}],
   formula:{rows:[
    {n:'TOA energy balance',e:'S₀(1−α)/4  =  σ·T_eff⁴',c:'σ = 5.67×10⁻⁸ W·m⁻²·K⁻⁴'},
    {n:'Effective temp.',e:'T_eff  ≈  255 K  (observed surface: 288 K)'},
    {sep:1},
    {n:'Planck feedback',e:'λ_P  =  −1/(4σT³)  ≈  −3.2  W·m⁻²·K⁻¹'},
    {n:'ECS formula',e:'ECS  =  −ΔF_{2×CO₂} / γ,   γ = Σ feedbacks'},
    {sep:1},
    {n:'CO₂ forcing',e:'ΔF  =  5.35 · ln(C/C₀)   W/m²'},
    {n:'Current forcing',e:'ΔF(420/280)  ≈  2.1  W/m²'},
   ]},sim:'climate'},
 }},

{id:'tectonics',group:'🌍 Earth Science',emoji:'🌍',color:'#b45309',light:'#fffbeb',
 title:'Plate Tectonics & Earthquakes',teaser:'The ground beneath your feet is moving — slowly but unstoppably. Every mountain, ocean, and earthquake is a consequence.',chips:['Plates','Earthquakes','Seismology'],
 lvls:{
  junior:{icon:'🌋',title:'The Earth is alive — and moving!',
   body:`<p>The ground beneath your feet feels completely solid and still. But if you could watch Earth from space in fast-forward over millions of years, you would see something extraordinary: the continents are slowly drifting across the surface like giant puzzle pieces floating on a very slow river of hot rock. This is called <strong>plate tectonics</strong>, and it is the single most important process shaping our planet's surface.</p>
<p>Earth's outer shell is broken into about 15 large pieces called <strong>tectonic plates</strong>. They move at roughly the speed your fingernails grow — a few centimetres per year. But over millions of years, this adds up: 200 million years ago, all the continents were joined in one supercontinent called <strong>Pangaea</strong>. India was near Antarctica. The Atlantic Ocean didn't exist. The Himalayas — the tallest mountains on Earth — only began forming 50 million years ago when India crashed into Asia.</p>
<p>When plates collide, slide past each other, or pull apart, the energy released can be devastating. <strong>Earthquakes</strong> occur when two plates that have been locked together by friction suddenly slip — releasing centuries of stored energy in seconds. The 2011 Japan earthquake was so powerful it shifted Earth's axis by 17 centimetres and shortened the day by 1.8 microseconds. In the simulation below, watch plates move and feel the consequences.</p>`,
   facts:[{e:'🏔️',t:'The Himalayas grow about 5 mm taller every year — India is still crashing into Asia at 4.4 cm/year, and the collision that started 50 million years ago isn\'t over.'},{e:'🌊',t:'The 2004 Indian Ocean earthquake released energy equivalent to 23,000 Hiroshima bombs and triggered tsunamis that killed 230,000 people across 14 countries.'},{e:'🧲',t:'Earth\'s magnetic field — which protects us from solar radiation — is generated by churning liquid iron in the outer core, 2,900 km below the surface.'}],
   formula:null,sim:'tectonics'},

  student:{icon:'🌍',title:'Plate boundaries, seismic waves, and the Wilson cycle',
   body:`<p>Earth's interior is layered: solid inner core (Fe-Ni, ~1,220 km radius, ~5,400 K), liquid outer core (convecting Fe, generates the geodynamo), mantle (silicate rock, viscosity ~10²¹ Pa·s, convecting over millions of years), and crust (oceanic: ~7 km basaltic; continental: ~35 km granitic). Tectonic plates are the rigid lithosphere (crust + uppermost mantle, ~100 km thick) floating on the ductile asthenosphere. Plate motion is driven by <strong>ridge push</strong> (new oceanic crust created at mid-ocean ridges slides downhill) and <strong>slab pull</strong> (cold, dense subducting slab pulls the plate behind it — the dominant force).</p>
<p>Three boundary types: <strong>divergent</strong> (plates separate; mid-ocean ridges, continental rifts — e.g. East African Rift); <strong>convergent</strong> (plates collide; oceanic subduction producing volcanic arcs and deep ocean trenches, or continent-continent collision producing fold mountain belts); <strong>transform</strong> (plates slide laterally; e.g. San Andreas Fault). The <strong>Wilson cycle</strong> describes the ~500 Myr opening and closing of ocean basins: rifting → ocean opening → subduction initiation → ocean closing → continental collision → suturing.</p>
<p><strong>Earthquakes</strong> nucleate at the <em>hypocenter</em> (focus) and radiate seismic waves: <em>P-waves</em> (compressional, travel through solids and liquids, ~6–8 km/s in crust) and <em>S-waves</em> (shear, solids only, ~3.5–4.5 km/s). The P–S arrival time difference at a seismometer gives distance to the earthquake; three stations triangulate location. Magnitude is measured on the <strong>moment magnitude scale</strong> M_w = (2/3)log₁₀(M₀) − 10.7, where M₀ = μAd is the seismic moment (shear modulus × rupture area × average slip). Each unit increase in M_w represents ~32× more energy released.</p>`,
   facts:[{e:'🔍',t:'Seismologists discovered Earth\'s liquid outer core in 1906 by noticing that S-waves (which can\'t travel through liquids) disappear on the far side of the planet.'},{e:'📡',t:'GPS networks can now detect plate motion in real time — the Pacific plate moves northwest at 7 cm/year, measurable to millimetre precision.'},{e:'⚡',t:'The largest earthquake ever recorded was the 1960 Valdivia, Chile earthquake (M_w 9.5) — it ruptured a fault 1,000 km long and 200 km wide simultaneously.'}],
   formula:{rows:[
    {n:'Moment magnitude',e:'M_w  =  (2/3) log₁₀(M₀)  −  10.7'},
    {n:'Seismic moment',e:'M₀  =  μ · A · d   (Pa·m²·m = N·m)'},
    {sep:1},
    {n:'Energy scaling',e:'ΔM_w = 1  →  32× more energy'},
    {n:'P-wave velocity',e:'V_P  =  √[(K + 4G/3) / ρ]'},
    {sep:1},
    {n:'S-wave velocity',e:'V_S  =  √[G / ρ]'},
    {n:'P−S time lag',e:'Δt  =  d · (1/V_S − 1/V_P)   →  distance d'},
   ]},sim:'tectonics'},

  scholar:{icon:'∂',title:'Mantle convection, geodynamics, and seismic tomography',
   body:`<p>Mantle convection is governed by the equations of highly viscous (Stokes) flow with thermally driven buoyancy. The <strong>Rayleigh number</strong> Ra = αgΔTd³/(κν) — where α is thermal expansion, g gravity, ΔT temperature contrast, d mantle thickness, κ thermal diffusivity, ν kinematic viscosity — quantifies the vigour of convection. Earth's mantle has Ra ~ 10⁷, far above the critical value ~10³, indicating vigorous convection. The <strong>Nusselt number</strong> Nu ~ Ra^{1/3} relates the convective to conductive heat flux; Earth loses ~47 TW of heat, ~70% through oceanic crust creation at mid-ocean ridges.</p>
<p><strong>Seismic tomography</strong> images Earth's interior by inverting thousands of seismogram arrival times for 3D velocity structure. Perturbations δV_P/V_P and δV_S/V_S correlate with temperature (cold slabs are fast, hot plumes slow) and composition. Global tomography models (e.g. LLSVP — Large Low Shear Velocity Provinces beneath Africa and the Pacific) reveal continent-scale anomalies at the core-mantle boundary, interpreted as hot, dense thermochemical piles possibly representing remnants of a magma ocean differentiation. The resolution limit of global tomography is ~200 km; regional models reach ~10 km.</p>
<p>The <strong>geodynamo</strong> — Earth's magnetic field source — is maintained by convection in the liquid outer core. The induction equation <span class="mk">∂B/∂t = ∇×(u×B) + η∇²B</span> (where η = 1/(μ₀σ) is magnetic diffusivity) describes field evolution: the first term (advection) amplifies field via the dynamo mechanism; the second (diffusion) decays it. The magnetic Reynolds number Rm = UL/η ~ 500 for Earth's core, ensuring advection dominates. Paleomagnetic records show ~170 polarity reversals in the past 100 Myr, occurring irregularly every 0.1–50 Myr, with transitions lasting ~5,000 years — a process still not fully understood.</p>`,
   facts:[{e:'🌐',t:'Seismic tomography revealed two continent-sized "blobs" at the base of the mantle (LLSVPs) — possibly remnants of a Mars-sized impactor that formed the Moon 4.5 billion years ago.'},{e:'🧲',t:'Earth\'s magnetic north pole is currently moving toward Siberia at ~55 km/year — 10× faster than in the 19th century — suggesting changes in core flow dynamics.'},{e:'🔬',t:'Diamond-anvil cell experiments can recreate pressures of 360 GPa and temperatures of 6,000 K — reproducing Earth\'s inner core conditions in a lab to measure iron\'s properties directly.'}],
   formula:{rows:[
    {n:'Rayleigh number',e:'Ra  =  αgΔTd³ / (κν)',c:'Earth\'s mantle: Ra ~ 10⁷'},
    {n:'Nusselt number',e:'Nu  ~  Ra^{1/3}   (convective / conductive heat)'},
    {sep:1},
    {n:'Induction equation',e:'∂B/∂t  =  ∇×(u×B)  +  η∇²B'},
    {n:'Magnetic Rm',e:'Rm  =  UL/η  ~  500   (advection dominates)'},
    {sep:1},
    {n:'Stokes flow',e:'∇P  =  η∇²u  +  ρg   (inertia negligible)'},
    {n:'Heat flux',e:'Q  =  Nu · k · ΔT/d   (~47 TW total)'},
   ]},sim:'tectonics'},
 }},

{id:'ocean',group:'🌍 Earth Science',emoji:'🌊',color:'#0369a1',light:'#e0f2fe',
 title:'Oceanography & Ocean Currents',teaser:'The ocean is Earth\'s climate engine. A river of water wider than the Amazon and a thousand times deeper circles the entire planet — keeping Europe warm and oxygen in the air.',chips:['Currents','Thermohaline','Deep Ocean'],
 lvls:{
  junior:{icon:'🌊',title:'The ocean: Earth\'s giant climate machine!',
   body:`<p>The ocean covers 71% of Earth's surface and contains 97% of all the water on our planet. But it is far more than a giant puddle — it is a vast, moving, living system that controls our climate, produces half our oxygen, and shapes the weather of every country on Earth. Without the ocean, Earth's surface temperature would swing from −100°C at night to +100°C in the daytime. The ocean acts as an enormous heat buffer, absorbing heat in summer and releasing it slowly in winter.</p>
<p>The ocean is constantly in motion. Near the surface, <strong>wind-driven currents</strong> push water around the globe in great circular patterns called <strong>gyres</strong>. The Gulf Stream, for example, carries warm water from the Caribbean northward along the eastern coast of North America and then across to Europe — keeping cities like London and Dublin 5–10°C warmer than they would otherwise be at their latitude. Without it, Northern Europe would have the same climate as Canada.</p>
<p>Deep beneath the surface, an even grander circulation operates: the <strong>thermohaline circulation</strong>, sometimes called the "ocean conveyor belt." Cold, salty water near the poles sinks to the ocean floor and slowly travels through the deep ocean, taking thousands of years to complete one circuit of the globe. This invisible river carries heat, nutrients, and dissolved gases to every corner of the ocean — and its disruption by climate change is one of scientists' greatest concerns.</p>`,
   facts:[{e:'🌡️',t:'The Gulf Stream transports 30 million cubic metres of water per second — 150 times the combined flow of all rivers on Earth.'},{e:'🐋',t:'The deepest point of the ocean — the Challenger Deep in the Mariana Trench — is 11,034 metres deep. Mount Everest would fit inside with 2 km to spare.'},{e:'💨',t:'The ocean produces about 50% of Earth\'s oxygen — mostly from microscopic phytoplankton near the surface, not from rainforests.'}],
   formula:null,sim:'ocean'},

  student:{icon:'🌊',title:'Geostrophic flow, Ekman transport, and the thermohaline circulation',
   body:`<p>Ocean surface currents are driven by wind stress τ (N/m²) applied to the surface layer. In the rotating Earth frame, the <strong>Coriolis force</strong> deflects moving water to the right in the Northern Hemisphere and left in the Southern. Wind-driven surface flow spirals with depth — the <strong>Ekman spiral</strong> — resulting in net water transport 90° to the right (NH) of the wind: <span class="mk">M_E = τ/(ρf)</span>, where f = 2Ω sin(φ) is the Coriolis parameter. Convergent Ekman transport piles up water, creating pressure gradients that drive <strong>geostrophic flow</strong>: the balance <span class="mk">fv = (1/ρ)∂P/∂x</span> and <span class="mk">fu = −(1/ρ)∂P/∂y</span> means geostrophic currents flow parallel to pressure contours (like wind around a weather system).</p>
<p><strong>Wind-driven gyres</strong> arise from Ekman convergence in subtropical regions, piling up water in the gyre centre (dynamic topography ~1 m). <strong>Sverdrup balance</strong> relates interior gyre transport to wind stress curl: <span class="mk">βV = (1/ρ)∇×τ</span> (where β = ∂f/∂y). Western boundary currents (Gulf Stream, Kuroshio) are intensified because they must carry the return flow in a narrow band — a consequence of β-plane dynamics. The <strong>thermohaline circulation</strong> (THC) is driven by density differences: cold, salty water in the North Atlantic sinks to form North Atlantic Deep Water (NADW), driving a global overturning circulation (AMOC) with ~18 Sv (1 Sv = 10⁶ m³/s) transport.</p>
<p>The ocean's vertical structure is set by density stratification: a warm, light surface mixed layer (~100 m, well-mixed by wind) overlies the <strong>thermocline</strong> (rapid temperature decrease, 100–1000 m) and abyssal deep water (~2°C, 34.7 psu salinity). Internal waves propagate along density surfaces (isopycnals); their breaking mixes the interior ocean, providing the ~1 cm²/s diapycnal diffusivity needed to sustain the THC against the tendency of stratification to shut it down.</p>`,
   facts:[{e:'🌡️',t:'The AMOC has slowed ~15% since the mid-20th century — if it collapses, northwestern Europe could cool by 5–10°C within decades, even as global temperatures rise.'},{e:'🧪',t:'A single drop of deep ocean water near Antarctica was last at the surface ~1,000 years ago — the ventilation timescale of the deep ocean, measured by radiocarbon dating.'},{e:'🌀',t:'Mesoscale eddies (50–200 km diameter) contain ~80% of the kinetic energy in the ocean — they mix heat, salt, and nutrients far more effectively than the mean circulation.'}],
   formula:{rows:[
    {n:'Coriolis parameter',e:'f  =  2Ω sin(φ),   Ω = 7.27×10⁻⁵ rad/s'},
    {n:'Ekman transport',e:'M_E  =  τ / (ρf)   [m²/s]'},
    {sep:1},
    {n:'Geostrophic balance',e:'fv  =  (1/ρ) ∂P/∂x,   fu  =  −(1/ρ) ∂P/∂y'},
    {n:'Sverdrup balance',e:'βV  =  (1/ρ) (∂τ_y/∂x − ∂τ_x/∂y)'},
    {sep:1},
    {n:'Density (seawater)',e:'ρ  =  ρ(T, S, P)   ≈  1025  kg/m³'},
    {n:'Brunt-Väisälä freq.',e:'N²  =  −(g/ρ) dρ/dz   (stability measure)'},
   ]},sim:'ocean'},

  scholar:{icon:'∇',title:'Ocean-atmosphere coupling, ENSO, and abyssal mixing',
   body:`<p>The ocean and atmosphere exchange heat, moisture, and momentum continuously. The <strong>bulk formula</strong> for air-sea heat flux includes sensible heat Q_S = ρ_a c_pa C_H U(T_s−T_a), latent heat Q_L = ρ_a L_v C_E U(q_s−q_a), longwave radiation, and shortwave absorption. The net flux drives sea surface temperature (SST) anomalies, which in turn feed back on the atmosphere. The strongest coupled mode is <strong>ENSO</strong> (El Niño-Southern Oscillation): the Bjerknes feedback loop — warm SST in the east Pacific weakens trade winds → reduces upwelling → further warming — generates multi-year climate variability affecting precipitation patterns globally. ENSO is modelled by the Zebiak-Cane reduced-gravity model and predicted ~6–9 months ahead by coupled GCMs.</p>
<p><strong>Abyssal mixing</strong> is crucial but poorly understood. The buoyancy flux needed to maintain the THC requires diapycnal diffusivity κ ~ 10⁻⁴ m²/s in the abyssal ocean — orders of magnitude above molecular diffusivity. The energy source is tidal dissipation (~1 TW) over rough topography, generating internal tides that propagate, break, and mix the interior. The <strong>Internal wave continuum</strong> (Garrett-Munk spectrum) describes the universal background internal wave field; its power-law form GM79 fits observations from Arctic to tropics. Quantifying where and how much mixing occurs — the "mixing problem" — is one of the central challenges of physical oceanography.</p>
<p>The <strong>primitive equations</strong> of ocean circulation are the Navier-Stokes equations on a rotating sphere with the Boussinesq approximation (density variations only in buoyancy term) and hydrostatic balance (∂P/∂z = −ρg, valid for horizontal scales ≫ depth). Ocean general circulation models (OGCMs — MOM, NEMO, ROMS) solve these on grids of 1/12° (~8 km) resolution, resolving mesoscale eddies but requiring parameterisations for submesoscale processes, boundary layer mixing, and tidal dissipation. Coupled Earth System Models add biogeochemistry, sea ice, and land surface — the basis of IPCC projections.</p>`,
   facts:[{e:'⚡',t:'Internal tides generated where tidal currents flow over the Hawaiian Ridge carry ~20 GW of energy into the open Pacific — a major source of abyssal mixing.'},{e:'🌍',t:'The ocean has absorbed ~93% of the excess heat from anthropogenic greenhouse forcing since 1955 — without this buffering, Earth\'s surface would be ~36°C warmer today.'},{e:'🔬',t:'Argo floats — 4,000 autonomous profiling robots drifting in every ocean — measure temperature and salinity from 0–2000 m every 10 days, transforming ocean observing since 2000.'}],
   formula:{rows:[
    {n:'Primitive equations',e:'Du/Dt − fv  =  −(1/ρ)∂P/∂x + ν∇²u'},
    {n:'Hydrostatic balance',e:'∂P/∂z  =  −ρg'},
    {sep:1},
    {n:'Rossby wave speed',e:'c_R  =  −βL_d²   (westward propagation)'},
    {n:'Deformation radius',e:'L_d  =  NH/f   (N = Brunt-Väisälä freq.)'},
    {sep:1},
    {n:'ENSO Bjerknes',e:'warm SST → weak trades → less upwelling → warmer SST'},
    {n:'Diapycnal diffusivity',e:'κ  ~  10⁻⁴ m²/s  (abyssal, vs 10⁻⁷ molecular)'},
   ]},sim:'ocean'},
 }},

{id:'volcano',group:'🌍 Earth Science',emoji:'🌋',color:'#dc2626',light:'#fef2f2',
 title:'Volcanology',teaser:'A volcano is a window into the interior of our planet. The same process that destroys cities built the continents, created the oceans, and made the atmosphere we breathe.',chips:['Magma','Eruptions','Geohazards'],
 lvls:{
  junior:{icon:'🌋',title:'Fire mountains — Earth\'s most powerful builders!',
   body:`<p>A volcano is one of the most dramatic and terrifying forces in nature — and one of the most important. Deep inside the Earth, rock melts under enormous heat and pressure to form <strong>magma</strong> — a thick, glowing liquid that is less dense than the solid rock around it. Like a bubble in honey, magma slowly rises through cracks in the Earth's crust. When it reaches the surface, it erupts as <strong>lava</strong>, ash, and volcanic gas, building new land and reshaping landscapes.</p>
<p>Volcanoes come in very different shapes. <strong>Shield volcanoes</strong>, like those in Hawaii, have gentle slopes and produce runny lava that flows for kilometres — they are built up slowly over millions of years and are rarely explosive. <strong>Stratovolcanoes</strong> (or composite volcanoes), like Mount Vesuvius or Krakatoa, are steep, beautiful cones built from layers of ash and thick lava — and they can erupt with catastrophic explosive violence.</p>
<p>Volcanoes are destructive, but they are also the reason life exists on Earth. Over billions of years, volcanic eruptions have released the gases that formed our atmosphere and oceans. The carbon dioxide that plants use for photosynthesis, the nitrogen in the air we breathe, even the water in the oceans — all ultimately came from volcanoes. Without them, Earth would be a barren rock, as lifeless as the Moon. In the simulation below, watch a magma chamber pressurise and erupt.</p>`,
   facts:[{e:'🌍',t:'There are about 1,500 potentially active volcanoes on Earth — 500 have erupted in recorded history, and 50–70 erupt every year.'},{e:'❄️',t:'The 1815 eruption of Mount Tambora injected so much ash into the atmosphere that 1816 became "The Year Without a Summer" — crops failed globally and 100,000 people starved.'},{e:'🌊',t:'The largest volcano on Earth is Mauna Loa in Hawaii — measured from its base on the ocean floor, it is taller than Mount Everest by more than 1 kilometre.'}],
   formula:null,sim:'volcano'},

  student:{icon:'🌋',title:'Magma genesis, eruption styles, and volcanic hazards',
   body:`<p>Magma forms by <strong>partial melting</strong> of the mantle or crust. Three mechanisms lower rock's melting point: (1) <em>decompression melting</em> — as mantle upwells at mid-ocean ridges, pressure drops below the solidus, generating basaltic magma (most common globally); (2) <em>flux melting</em> — water released from subducting oceanic crust lowers the solidus of overlying mantle wedge, generating arc magmas richer in silica and volatiles; (3) <em>heat transfer</em> — injection of hot mafic magma into the crust melts silicic material, producing granite batholiths. Magma composition ranges from mafic basalt (SiO₂ ~50%, low viscosity) to felsic rhyolite (SiO₂ ~75%, very high viscosity).</p>
<p>Eruption style is controlled by <strong>magma viscosity</strong> η and dissolved volatile content. Viscosity follows an Arrhenius relationship with temperature and increases exponentially with SiO₂ content. As magma rises, confining pressure drops, volatiles (H₂O, CO₂, SO₂) exsolve forming bubbles. If viscosity is low (basalt), bubbles escape easily → effusive eruption (lava flows). If viscosity is high (rhyolite), bubbles cannot escape → pressure builds → explosive eruption (Plinian column). The <strong>Volcanic Explosivity Index</strong> (VEI) is a logarithmic scale 0–8; each unit represents ~10× more ejecta volume. VEI 8 "supervolcanic" eruptions (Yellowstone, Toba) eject >1,000 km³ of material.</p>
<p>Primary volcanic hazards: <em>lava flows</em> (slow but unstoppable, 1000–1200°C); <em>pyroclastic density currents</em> (PDCs — fast-moving avalanches of hot gas + rock at 200–700°C, travelling at 100–300 km/h, the deadliest hazard); <em>tephra fall</em> (ash and larger fragments); <em>lahars</em> (volcanic mudflows triggered by eruptions into ice or heavy rainfall); <em>volcanic gases</em> (SO₂, CO₂, H₂S — Laki 1783 released enough SO₂ to kill 25% of Iceland's population via acid rain and fluorine poisoning). Monitoring uses seismometers (magma migration), GPS (ground deformation), gas sensors (SO₂ flux), and satellite InSAR (mm-scale deformation).</p>`,
   facts:[{e:'💨',t:'The 1991 Pinatubo eruption injected 20 million tonnes of SO₂ into the stratosphere, forming sulfate aerosols that cooled Earth by 0.5°C for two years.'},{e:'🔥',t:'Pyroclastic flows from Vesuvius in 79 AD reached Herculaneum in 4 minutes at ~300°C — death was instantaneous from thermal shock, not asphyxiation as previously thought.'},{e:'📡',t:'Ground deformation at Yellowstone caldera is monitored by 30+ GPS stations; it inflates and deflates by up to 20 cm/year as hydrothermal fluids move — but there is no sign of an impending eruption.'}],
   formula:{rows:[
    {n:'Viscosity (Arrhenius)',e:'η  =  A · exp(E_a / RT)',c:'increases with SiO₂, decreases with T'},
    {n:'Bubble growth',e:'dR/dt  =  (P_b − P_∞) / (4η/R)',c:'drives explosive eruptions'},
    {sep:1},
    {n:'VEI scale',e:'VEI  =  log₁₀(V_ejecta[km³]) + 8   (approx.)'},
    {n:'Plinian column height',e:'H  ≈  0.236 · Q^{1/4}',c:'Q = mass flux (kg/s)'},
    {sep:1},
    {n:'Decompression melting',e:'dT_solidus/dP  <  dT_adiabat/dP   →  melting'},
    {n:'SO₂ radiative forcing',e:'ΔF  ≈  −0.03 · M_{SO₂}  [W/m²]  per Tg'},
   ]},sim:'volcano'},

  scholar:{icon:'∂',title:'Magma chamber dynamics, volatile saturation, and supereruptions',
   body:`<p>Magma chambers are not simple pools of melt but complex, partially crystalline <strong>mush zones</strong> — regions where melt fraction φ ranges from ~0.4 (rigid crystal framework) to ~1 (pure melt). The <strong>critical melt fraction</strong> (φ_c ~ 0.4–0.5) marks the rheological transition from solid-like to liquid-like behaviour (the "lock-up" threshold). Thermomechanical models of magma chambers solve the coupled heat equation, crystal nucleation-growth kinetics (Avrami equation), and elastic-viscoplastic host rock deformation. Recharge of hot mafic magma into a cooler, crystal-rich felsic chamber can rapidly remobilise the mush, compress volatiles, and trigger eruption — a process inferred from timescales of weeks to years recorded in zoning profiles of plagioclase crystals.</p>
<p><strong>Volatile saturation</strong> controls eruption dynamics. For H₂O in silicic melts, solubility follows <span class="mk">X_{H₂O} = a · P^{0.5}</span> (a ~ 3.07×10⁻⁴ at 800°C, P in Pa). As magma ascends, decompression drives exsolution; the nucleation and growth of bubbles depends on the supersaturation ratio and melt viscosity. The <strong>fragmentation threshold</strong> occurs when strain rate ε̇ > G/η (brittle-ductile transition at the glass transition temperature T_g), where G is the elastic shear modulus. Above this threshold, melt fragments explosively into pyroclasts. The ratio of viscous to inertial forces — <span class="mk">We = ρv²R/σ</span> (Weber number) — governs droplet fragmentation in the eruption column.</p>
<p><strong>Supereruptions</strong> (VEI ≥ 8, V > 1,000 km³) require rapid mobilisation of a huge mush body. The <strong>Yellowstone caldera system</strong> has produced three supereruptions (2.1 Ma, 1.3 Ma, 640 ka Lava Creek Tuff — 1,000 km³ of rhyolite). Climate impact is severe: injection of sulfate precursors into the stratosphere produces sulfate aerosols with e-folding lifetime ~1–2 years, potentially reducing photosynthesis globally and triggering "volcanic winter." The Toba supereruption (~74 ka, ~2,800 km³) may have reduced global human population to ~10,000 individuals — the genetic bottleneck visible in human mitochondrial diversity.</p>`,
   facts:[{e:'🧬',t:'Genetic evidence suggests the Toba supereruption 74,000 years ago may have reduced the human population to fewer than 10,000 breeding pairs — explaining a bottleneck visible in our DNA.'},{e:'🔬',t:'Diffusion chronometry in olivine crystals can measure how long magma spent at eruption temperature — sometimes just days to weeks before a major eruption.'},{e:'🌍',t:'The Deccan Traps flood basalts (India, ~66 Ma) erupted 500,000 km³ of lava over ~1 Myr — coinciding with the K-Pg extinction and possibly contributing alongside the Chicxulub impact.'}],
   formula:{rows:[
    {n:'H₂O solubility',e:'X_{H₂O}  =  a · P^{0.5}',c:'a ≈ 3.07×10⁻⁴ (800°C)'},
    {n:'Fragmentation crit.',e:'ε̇  >  G/η   (brittle transition)'},
    {sep:1},
    {n:'Avrami crystallisation',e:'φ(t)  =  1 − exp(−K·tⁿ)',c:'n = Avrami exponent'},
    {n:'Critical melt fraction',e:'φ_c  ≈  0.4–0.5   (rheological lock-up)'},
    {sep:1},
    {n:'Column height',e:'H  =  0.236 · Q^{0.25},   Q = mass flux'},
    {n:'Climate forcing',e:'ΔT  ≈  −0.03 · M_{SO₂}  per Tg injected'},
   ]},sim:'volcano'},
 }},

{id:'chem',group:'⚗️ Chemistry',emoji:'⚗️',color:'#059669',light:'#ecfdf5',
 title:'Atoms & Chemical Bonds',teaser:'Why does water dissolve salt but not oil? It all comes down to how atoms share electrons.',chips:['Atoms','Bonds','Reactions'],
 lvls:{
  junior:{icon:'🧪',title:'Tiny building blocks of everything!',
   body:`<p>Everything around you — the air you breathe, the food you eat, the water you drink — is made of incredibly tiny particles called <strong>atoms</strong>. Atoms are so small that a single drop of water contains more atoms than there are grains of sand on all of Earth's beaches combined!</p>
<p>Atoms love to stick together to form groups called <strong>molecules</strong>. When atoms join together they form a <strong>chemical bond</strong> — like tiny invisible hands holding them in place. Water is made of two hydrogen atoms and one oxygen atom: H₂O. Table salt is sodium and chlorine bonded together: NaCl.</p>
<p>Different combinations produce wildly different substances. Carbon atoms can arrange as soft, slippery graphite (pencil lead) or the hardest natural material known — diamond — just by bonding differently! In the simulation below, watch atoms bounce, attract each other, and form molecules.</p>`,
   facts:[{e:'💧',t:'A glass of water contains roughly 8,000,000,000,000,000,000,000,000 molecules — that\'s 8 septillion!'},{e:'💎',t:'Diamond and graphite are both pure carbon. The difference? Only how the atoms are arranged!'},{e:'🌬️',t:'Air is 78% nitrogen (N₂) and 21% oxygen (O₂) — two completely different molecules made of just two elements.'}],
   formula:null,sim:'chem'},
  student:{icon:'⚗️',title:'Covalent and Ionic Bonds: electron sharing vs electron transfer',
   body:`<p>Atoms bond because doing so lowers their total energy. The driving force is reaching a stable electron configuration — ideally a complete outer shell (the <strong>octet rule</strong>). Two main bonding strategies exist depending on the electronegativity difference (Δχ) between atoms.</p>
<p><strong>Covalent bonds</strong> (Δχ &lt; 1.7): atoms <em>share</em> electron pairs. In H₂, two hydrogen atoms each contribute one electron to a shared pair, lowering total energy by ~436 kJ/mol. Bond order (single, double, triple) determines length and energy. VSEPR theory predicts molecular geometry from electron-pair repulsion.</p>
<p><strong>Ionic bonds</strong> (Δχ &gt; 1.7): electron transfer occurs. In NaCl, Na (χ=0.93) donates an electron to Cl (χ=3.16); the resulting Na⁺ and Cl⁻ ions attract electrostatically. Lattice energy <span class="mk">U = −k·Q₁Q₂/r</span> governs stability. Ionic compounds dissolve in polar solvents like water, where the dielectric constant reduces the Coulomb attraction.</p>
<p>Polarity explains why "like dissolves like." Water (μ = 1.85 D) dissolves ionic and polar solutes via hydrogen bonding; nonpolar solvents dissolve nonpolar solutes via dispersion forces. Hess's law states that ΔH is path-independent — only initial and final states matter.</p>`,
   facts:[{e:'🔋',t:'Electronegativity (Pauling scale): 0.7 (Cs) to 4.0 (F). The higher the difference between atoms, the more ionic the bond.'},{e:'🫧',t:'Soap works because one end is polar (loves water) and the other nonpolar (loves oil) — bridging the two worlds.'},{e:'🌡️',t:'Breaking bonds always absorbs energy; forming bonds always releases it. Exothermic reactions release more than they absorb overall.'}],
   formula:{rows:[
    {n:'Coulomb (ionic)',e:'U  =  k · Q₁Q₂ / r',c:'k = 8.99×10⁹ N·m²·C⁻²'},
    {sep:1},
    {n:'Bond energies (avg)',e:'C−C: 347   C=C: 614   C≡C: 839  kJ/mol'},
    {n:'Hess\'s law',e:'ΔH_rxn  =  Σ ΔH_f(products) − Σ ΔH_f(reactants)'},
    {sep:1},
    {n:'Dipole moment',e:'μ  =  q · d   [debye, D]'},
    {n:'Water',e:'μ(H₂O)  =  1.85 D   (strongly polar)'},
   ]},sim:'chem'},
  scholar:{icon:'ψ',title:'Quantum mechanics of bonding: MO theory and reaction dynamics',
   body:`<p><strong>Molecular Orbital (MO) theory</strong> constructs approximate wavefunctions as linear combinations of atomic orbitals (LCAO): <span class="mk">ψ = c_A φ_A + c_B φ_B</span>. For H₂, combining the 1s AOs yields a bonding MO <span class="mk">σ_{1s} = (φ_A + φ_B)/√2</span> (constructive interference, lower energy) and antibonding MO <span class="mk">σ*_{1s} = (φ_A − φ_B)/√2</span> (node, higher energy). Bond order = (bonding e⁻ − antibonding e⁻)/2.</p>
<p>The <strong>Born-Oppenheimer approximation</strong> (nuclei move far slower than electrons) permits solving the electronic Schrödinger equation at fixed nuclear geometry, mapping out the <em>potential energy surface</em> (PES). Reactants sit in a potential well, must surmount the <strong>transition state</strong> (saddle point) of activation energy E_a, and descend to the product well. The Arrhenius equation <span class="mk">k = A · e^{−E_a/RT}</span> quantifies the temperature dependence of reaction rate.</p>
<p>Modern quantum chemistry uses <strong>Density Functional Theory (DFT)</strong>: instead of the N-electron wavefunction (3N coordinates), DFT works with the electron density ρ(r) (3 coordinates). The Hohenberg-Kohn theorems guarantee the ground-state density uniquely determines all ground-state properties. The Kohn-Sham equations use an exchange-correlation functional E_xc[ρ] to convert the interacting problem into effective one-electron equations. DFT now drives drug discovery, materials design, and catalyst screening.</p>`,
   facts:[{e:'💻',t:'DFT can predict the melting point of new materials before they are synthesised — accelerating discovery from decades to months.'},{e:'🧬',t:'All modern drug-receptor binding simulations use quantum mechanical / molecular mechanical (QM/MM) methods derived from MO theory.'},{e:'⚡',t:'The transition state exists for ~10⁻¹³ seconds — too fast to observe directly, but detectable by femtochemistry (Nobel Prize 1999).'}],
   formula:{rows:[
    {n:'LCAO bonding MO',e:'ψ_b  =  (φ_A + φ_B) / √(2 + 2S)',c:'S = overlap integral'},
    {n:'Bond order',e:'BO  =  (N_b − N_a) / 2'},
    {sep:1},
    {n:'Arrhenius',e:'k  =  A · exp(−E_a / RT)'},
    {sep:1},
    {n:'Hohenberg-Kohn',e:'E[ρ]  =  T[ρ] + V_ne[ρ] + J[ρ] + E_xc[ρ]'},
    {n:'Kohn-Sham',e:'[−½∇² + v_eff(r)] ψ_i  =  ε_i ψ_i'},
   ]},sim:'chem'},
 }},

{id:'electrochem',group:'⚗️ Chemistry',emoji:'🔋',color:'#ca8a04',light:'#fefce8',
 title:'Electrochemistry & Batteries',teaser:'Every time you charge your phone, chemistry converts electrons into stored energy. The same reactions that power your devices also rust iron, refine aluminium, and keep your heart beating.',chips:['Redox','Batteries','Electrolysis'],
 lvls:{
  junior:{icon:'⚡',title:'Electricity from chemistry — and chemistry from electricity!',
   body:`<p>Imagine two different metals sitting in a glass of salty water, connected by a wire. Something remarkable happens: electrons start flowing through the wire from one metal to the other — creating an electric current! This is exactly how the very first battery worked, invented by Alessandro Volta in 1800. He stacked discs of zinc and copper separated by salty cloth, and created the first steady source of electric current in history.</p>
<p>The secret is a type of chemical reaction called <strong>oxidation-reduction</strong> (or <strong>redox</strong>). In a redox reaction, one substance loses electrons (it is <em>oxidised</em>) and another gains those electrons (it is <em>reduced</em>). When zinc sits in acid, zinc atoms lose electrons and dissolve — those electrons travel through a wire to where they are needed. This flow of electrons <em>is</em> electricity.</p>
<p>Modern batteries — from the AA battery in your remote control to the enormous lithium-ion pack in an electric car — all work on this same principle. The lithium-ion battery in your phone stores energy by moving lithium ions between two materials; when you use the phone, ions flow back and electrons travel through the circuit powering your screen. When you plug it in, the process reverses — using electrical energy to push the ions back. In the simulation below, watch a battery discharge and recharge in real time.</p>`,
   facts:[{e:'⚡',t:'The lithium-ion batteries in a Tesla Model S contain about 7,000 individual cells — each one a small redox reaction happening simultaneously.'},{e:'🧠',t:'Your brain runs on electrochemistry: neurons fire by pumping sodium and potassium ions across membranes, generating the electrical signals that are your every thought.'},{e:'🌍',t:'Electrolysis of aluminium ore uses so much electricity that aluminium smelters consume about 3.5% of all electricity generated globally — more than most countries.'}],
   formula:null,sim:'electrochem'},

  student:{icon:'🔋',title:'Electrochemical cells, the Nernst equation, and Li-ion batteries',
   body:`<p>An electrochemical cell converts chemical energy to electrical energy via spontaneous redox reactions. The <strong>standard cell potential</strong> E°_cell = E°_cathode − E°_anode is calculated from standard reduction potentials (measured vs the standard hydrogen electrode, SHE, defined as 0 V). A positive E°_cell indicates a spontaneous reaction; the relationship to Gibbs energy is <span class="mk">ΔG° = −nFE°_cell</span> (n = moles of electrons transferred, F = 96,485 C/mol = Faraday's constant). At equilibrium, ΔG = 0, giving <span class="mk">E°_cell = (RT/nF)ln K</span> — connecting electrochemistry to thermodynamics.</p>
<p>The <strong>Nernst equation</strong> corrects cell potential for non-standard conditions: <span class="mk">E = E° − (RT/nF)ln Q</span>, where Q is the reaction quotient. At 25°C this simplifies to <span class="mk">E = E° − (0.0592/n)log Q</span>. As a battery discharges, Q increases (reactants consumed, products accumulate) and E decreases — explaining why battery voltage drops as it drains. Concentration cells (same half-reactions, different concentrations) have E° = 0 but non-zero E from the Nernst equation, demonstrating that concentration differences alone can drive current.</p>
<p><strong>Lithium-ion batteries</strong> store energy via intercalation: Li⁺ ions insert into the crystal lattice of electrode materials. At the anode (graphite, LiC₆), Li⁺ + e⁻ → Li intercalated (charging). At the cathode (LiCoO₂, LiFePO₄, or NMC), Li₁₋ₓCoO₂ + xLi⁺ + xe⁻ → LiCoO₂ (charging). The electrolyte (LiPF₆ in organic carbonate solvent) conducts Li⁺ but not electrons, forcing electrons through the external circuit. Energy density is ~250 Wh/kg (cell level); theoretical limit for lithium metal anodes is ~3,800 Wh/kg — the target driving solid-state battery research.</p>`,
   facts:[{e:'🔬',t:'The solid-electrolyte interphase (SEI) — a nanometre-thin film forming on the anode in the first charge cycle — is crucial for battery longevity and is still not fully understood.'},{e:'🌡️',t:'Lithium-ion batteries lose ~20% capacity permanently if charged above 45°C or discharged below −10°C — why phones slow down in cold weather.'},{e:'♻️',t:'Less than 5% of lithium-ion batteries are currently recycled. As EV adoption grows, this represents both an environmental challenge and a trillion-dollar opportunity.'}],
   formula:{rows:[
    {n:'Cell potential',e:'E°_cell  =  E°_cathode  −  E°_anode'},
    {n:'Gibbs energy link',e:'ΔG°  =  −nF·E°_cell'},
    {sep:1},
    {n:'Nernst equation',e:'E  =  E°  −  (RT/nF) ln Q'},
    {n:'At 25°C',e:'E  =  E°  −  (0.0592/n) log Q'},
    {sep:1},
    {n:'Faraday\'s law',e:'m  =  (M · I · t) / (n · F)',c:'mass deposited'},
    {n:'Equilibrium',e:'E°_cell  =  (RT/nF) ln K'},
   ]},sim:'electrochem'},

  scholar:{icon:'∂',title:'Electrode kinetics, Butler-Volmer equation, and beyond Li-ion',
   body:`<p>Real electrodes do not behave reversibly — current flow requires an <strong>overpotential</strong> η = E − E_eq to drive the reaction at a finite rate. The <strong>Butler-Volmer equation</strong> describes the current density as a function of overpotential: <span class="mk">j = j₀[exp(αFη/RT) − exp(−(1−α)Fη/RT)]</span>, where j₀ is the exchange current density (a measure of intrinsic electrode kinetics) and α is the transfer coefficient (typically ~0.5). At large positive η, the cathodic term dominates and j → j₀exp(αFη/RT) — the <strong>Tafel equation</strong> <span class="mk">η = a + b·log j</span> with Tafel slope b = 2.303RT/(αF) ≈ 120 mV/decade for α = 0.5. Tafel analysis diagnoses reaction mechanisms by revealing the rate-determining step.</p>
<p>Electrode kinetics involves the <strong>Marcus theory</strong> of electron transfer: the rate constant k_ET = (2π/ℏ)|H_DA|²(4πλk_BT)^{-1/2}exp[−(ΔG° + λ)²/(4λk_BT)], where H_DA is the electronic coupling, λ is the reorganisation energy (inner-sphere + outer-sphere contributions), and ΔG° is the reaction free energy. The remarkable <strong>Marcus inverted region</strong> — where increasing driving force (more negative ΔG°) slows the reaction when |ΔG°| > λ — was confirmed experimentally by Miller et al. (1984) and underlies photosynthetic charge separation efficiency.</p>
<p>Beyond Li-ion: <strong>solid-state batteries</strong> replace liquid electrolytes with ceramic (LLZO, LGPS) or polymer (PEO) conductors, enabling lithium metal anodes and eliminating flammability. <strong>Na-ion</strong> and <strong>K-ion</strong> batteries exploit abundant alkali metals; <strong>multivalent</strong> batteries (Mg²⁺, Al³⁺, Ca²⁺) offer higher theoretical energy density but face sluggish intercalation kinetics. <strong>Flow batteries</strong> (vanadium redox, RFB) store energy in dissolved redox-active species in external tanks, decoupling power and energy for grid-scale storage. The electrochemical CO₂ reduction reaction (CO₂RR) converts captured CO₂ to fuels and chemicals using renewable electricity — potentially closing the carbon cycle.</p>`,
   facts:[{e:'🔬',t:'The exchange current density j₀ for the hydrogen evolution reaction varies by 10 orders of magnitude across metals — explaining why platinum is catalytically unique and why finding cheaper alternatives is so difficult.'},{e:'⚡',t:'Vanadium flow batteries at grid scale can store GWh of energy with 20,000+ cycle lifetimes — a century of daily cycling — making them ideal for long-duration renewable energy storage.'},{e:'🧪',t:'Electrochemical CO₂ reduction to ethylene on copper catalysts achieves ~70% Faradaic efficiency — converting a greenhouse gas directly into a valuable industrial feedstock using only electricity.'}],
   formula:{rows:[
    {n:'Butler-Volmer',e:'j  =  j₀[exp(αFη/RT) − exp(−(1−α)Fη/RT)]'},
    {n:'Tafel equation',e:'η  =  a  +  b·log j,   b = 2.303RT/(αF)'},
    {sep:1},
    {n:'Marcus rate',e:'k_ET  =  A · exp[−(ΔG° + λ)² / (4λk_BT)]'},
    {n:'Inverted region',e:'k_ET decreases when |ΔG°| > λ'},
    {sep:1},
    {n:'Energy density',e:'E  =  V_cell · Q / m   [Wh/kg]'},
    {n:'Li-ion theoretical',e:'LiCoO₂/graphite: ~370 Wh/kg (cell theoretical)'},
   ]},sim:'electrochem'},
 }},

{id:'kinetics',group:'⚗️ Chemistry',emoji:'⚖️',color:'#0891b2',light:'#ecfeff',
 title:'Kinetics & Equilibrium',teaser:'Why does food rot faster in summer? Why do some reactions explode and others take centuries? The answers reveal how chemistry controls time itself.',chips:['Reaction rates','Equilibrium','Catalysis'],
 lvls:{
  junior:{icon:'⏱️',title:'How fast does chemistry happen — and when does it stop?',
   body:`<p>Put milk in the fridge and it lasts a week. Leave it on the counter on a hot day and it sours in hours. Both situations involve the same chemical reactions — bacteria breaking down the milk's sugars and proteins — but the <strong>temperature</strong> makes all the difference. This is chemical <strong>kinetics</strong>: the study of how fast reactions go, and why.</p>
<p>For a reaction to happen, molecules must collide — and not just any collision will do. The molecules must hit each other with enough energy and in the right orientation to break old chemical bonds and form new ones. This minimum energy is called the <strong>activation energy</strong>. Higher temperature means molecules move faster, collide more often, and with more energy — dramatically speeding up the reaction. As a rough rule of thumb, every 10°C rise in temperature roughly <em>doubles</em> the reaction rate.</p>
<p>But most reactions don't simply run to completion. Instead they reach a state of <strong>chemical equilibrium</strong> — where the forward reaction (reactants → products) and the reverse reaction (products → reactants) happen at exactly the same rate. It looks like the reaction has stopped, but actually both directions are still happening simultaneously, perfectly balanced. You can shift this balance by changing temperature, pressure, or concentration — a trick chemists use constantly to get more of the products they want. In the simulation below, watch molecules react, reach equilibrium, and respond to changes.</p>`,
   facts:[{e:'💎',t:'Diamond is thermodynamically unstable at room temperature and pressure — it should spontaneously convert to graphite. But the activation energy is so enormous that it effectively never happens.'},{e:'🧪',t:'The Haber process (making ammonia for fertilisers) uses an iron catalyst to lower activation energy — without it, the reaction is too slow to be useful even at high temperature.'},{e:'🌡️',t:'The chemical reactions in fireflies produce light at nearly 100% efficiency — almost no heat wasted. Human lightbulbs waste ~90% of energy as heat.'}],
   formula:null,sim:'kinetics'},

  student:{icon:'⚖️',title:'Rate laws, the Arrhenius equation, and Le Chatelier\'s principle',
   body:`<p>The <strong>rate law</strong> expresses how reaction rate depends on concentration: for aA + bB → products, the rate r = k[A]^m[B]^n, where m and n are the reaction orders (determined experimentally, not from stoichiometry) and k is the rate constant. The <strong>integrated rate laws</strong> predict how concentrations change with time: zero-order [A] = [A]₀ − kt; first-order <span class="mk">ln[A] = ln[A]₀ − kt</span> (half-life t_{1/2} = ln2/k, independent of concentration); second-order <span class="mk">1/[A] = 1/[A]₀ + kt</span>. Radioactive decay and drug elimination are first-order processes; t_{1/2} of ¹⁴C = 5,730 years enables radiocarbon dating.</p>
<p>The <strong>Arrhenius equation</strong> k = Ae^{−Ea/RT} quantifies temperature dependence: A is the pre-exponential factor (collision frequency × steric factor), E_a is activation energy, R is the gas constant, T is absolute temperature. Taking the logarithm: <span class="mk">ln k = ln A − E_a/RT</span> — an Arrhenius plot of ln k vs 1/T gives a straight line with slope −E_a/R. Transition state theory (Eyring equation) provides a more detailed picture: <span class="mk">k = (k_BT/h)exp(−ΔG‡/RT)</span>, where ΔG‡ = ΔH‡ − TΔS‡ is the Gibbs energy of activation — revealing entropic contributions invisible to Arrhenius analysis.</p>
<p>At <strong>chemical equilibrium</strong>, the equilibrium constant K_c = [products]^ν/[reactants]^ν (using stoichiometric coefficients ν). K is related to ΔG°: <span class="mk">ΔG° = −RT ln K</span>. <strong>Le Chatelier's principle</strong>: if a system at equilibrium is disturbed, it shifts to partially counteract the disturbance. Adding reactant → shifts right; increasing pressure (for gas-phase reactions) → shifts toward fewer moles of gas; increasing temperature → shifts in endothermic direction. The Haber process (N₂ + 3H₂ ⇌ 2NH₃) uses high pressure (150–300 atm) and moderate temperature (400–500°C) plus iron catalyst — a compromise between thermodynamics (low T favours products) and kinetics (high T needed for useful rates).</p>`,
   facts:[{e:'🧲',t:'An enzyme can speed up a reaction by a factor of 10¹⁷ — equivalent to turning a process that would take 3 billion years into one that takes a second.'},{e:'⚗️',t:'The Haber-Bosch process for making ammonia fertiliser feeds roughly half of humanity — and consumes about 1.5% of global energy production.'},{e:'🔬',t:'Femtochemistry (Nobel 1999) uses laser pulses of 10⁻¹⁵ seconds to photograph molecules at the transition state — the fleeting instant when bonds are half-broken.'}],
   formula:{rows:[
    {n:'Rate law',e:'r  =  k[A]^m[B]^n'},
    {n:'Arrhenius',e:'k  =  A · exp(−E_a / RT)'},
    {sep:1},
    {n:'1st order integrated',e:'ln[A]  =  ln[A]₀  −  kt,   t½ = ln2/k'},
    {n:'Eyring equation',e:'k  =  (k_BT/h) · exp(−ΔG‡/RT)'},
    {sep:1},
    {n:'Equilibrium constant',e:'K_c  =  Π[products]^ν / Π[reactants]^ν'},
    {n:'Thermodynamic link',e:'ΔG°  =  −RT ln K'},
   ]},sim:'kinetics'},

  scholar:{icon:'∂',title:'Transition state theory, reaction mechanisms, and enzyme kinetics',
   body:`<p><strong>Transition state theory</strong> (Eyring, Evans & Polanyi, 1935) treats the activated complex [AB]‡ as a quasi-equilibrium species at the energy maximum of the reaction coordinate. The rate constant <span class="mk">k = κ(k_BT/h)exp(ΔS‡/R)exp(−ΔH‡/RT)</span>, where κ is the transmission coefficient (~1 for classical systems, <1 for quantum tunnelling). The <strong>Evans-Polanyi relation</strong> <span class="mk">E_a = E_a° + αΔH_rxn</span> (α ≈ 0–1 is the Brønsted-Evans-Polanyi parameter) connects activation energy to reaction enthalpy across a series of similar reactions — enabling linear free energy relationships (Hammett equation, Marcus equation) to predict rate constants for unknown reactions from thermodynamic data.</p>
<p><strong>Reaction mechanisms</strong> describe the elementary steps comprising an overall reaction. The rate-determining step (RDS) — the slowest elementary step — governs the overall rate. The steady-state approximation (SSA) sets d[intermediate]/dt ≈ 0 to eliminate intermediates algebraically. For a mechanism A → I → P with fast first step and slow second: d[P]/dt ≈ k₂K₁[A], where K₁ = k₁/k₋₁ is the pre-equilibrium constant. Microscopic reversibility (principle of detailed balance) constrains mechanisms: at equilibrium every elementary step must individually balance forward and reverse rates, restricting plausible mechanisms.</p>
<p><strong>Michaelis-Menten enzyme kinetics</strong>: E + S ⇌ ES → E + P. The SSA gives the celebrated result <span class="mk">v = V_max[S]/(K_M + [S])</span>, where V_max = k_cat[E]_total and K_M = (k₋₁ + k_cat)/k₁. The catalytic efficiency k_cat/K_M — the "specificity constant" — reaches a diffusion limit of ~10⁸–10⁹ M⁻¹s⁻¹ for the most efficient enzymes (diffusion-controlled reactions). Allosteric enzymes deviate from Michaelis-Menten behaviour, exhibiting sigmoidal v vs [S] curves described by the Hill equation <span class="mk">v = V_max[S]^n/(K_{0.5}^n + [S]^n)</span>, where n > 1 indicates positive cooperativity. Inhibition patterns (competitive, uncompetitive, mixed) are diagnosed by Lineweaver-Burk double-reciprocal plots.</p>`,
   facts:[{e:'⚡',t:'Carbonic anhydrase catalyses CO₂ + H₂O ⇌ H₂CO₃ at 10⁶ reactions per second — one of the fastest enzymes known, operating at the diffusion limit.'},{e:'🧬',t:'CRISPR-Cas9 is an enzyme — its mechanism involves precisely controlled kinetics: binding DNA, unwinding the helix, checking for complementarity, and cleaving only when all criteria are met.'},{e:'🔬',t:'Single-molecule kinetics (using fluorescence microscopy) can now watch individual enzyme molecules catalysing one reaction at a time — revealing hidden heterogeneity invisible to bulk measurements.'}],
   formula:{rows:[
    {n:'Eyring (full)',e:'k  =  κ(k_BT/h) · exp(ΔS‡/R) · exp(−ΔH‡/RT)'},
    {n:'Evans-Polanyi',e:'E_a  =  E_a°  +  α·ΔH_rxn'},
    {sep:1},
    {n:'Michaelis-Menten',e:'v  =  V_max[S] / (K_M + [S])'},
    {n:'Catalytic efficiency',e:'k_cat/K_M  →  10⁸–10⁹ M⁻¹s⁻¹ (diffusion limit)'},
    {sep:1},
    {n:'Hill equation',e:'v  =  V_max[S]^n / (K_{0.5}^n + [S]^n)'},
    {n:'Hammett equation',e:'log(k/k₀)  =  ρ·σ   (linear free energy)'},
   ]},sim:'kinetics'},
 }},

{id:'organic',group:'⚗️ Chemistry',emoji:'🧪',color:'#16a34a',light:'#f0fdf4',
 title:'Organic Chemistry & Molecules of Life',teaser:'Carbon is the most versatile atom in the universe. With just one element and a few rules, nature builds everything from aspirin to DNA, from silk to spider venom.',chips:['Carbon','Biomolecules','Synthesis'],
 lvls:{
  junior:{icon:'🌱',title:'Carbon — the master builder of life!',
   body:`<p>Of the 118 elements in the periodic table, one stands apart as uniquely special: <strong>carbon</strong>. A carbon atom can form four strong bonds simultaneously — with other carbon atoms, with hydrogen, oxygen, nitrogen, and many more. This remarkable ability means carbon can build chains, rings, branches, and cages of almost unlimited complexity. Over 10 million different carbon-containing compounds are known — more than all other elements combined. The chemistry of carbon compounds is called <strong>organic chemistry</strong>.</p>
<p>Life chose carbon as its building material for good reason. The proteins that make your muscles, the DNA that carries your genes, the sugars that fuel your cells, the fats that insulate your nerves — all are carbon-based molecules of breathtaking complexity, built from simple rules repeated millions of times. A single protein molecule can contain thousands of carbon atoms arranged in a precise three-dimensional shape that determines exactly what it does.</p>
<p>The same carbon chemistry that runs inside your cells also runs in a chemist's laboratory. Aspirin was first synthesised in 1897 from a compound found in willow bark. Penicillin's structure was unravelled in 1945. Today, chemists design and build molecules that never existed in nature — medicines, plastics, dyes, perfumes, and materials with extraordinary properties. Organic chemistry is the science of building with the universe's most versatile atom. In the simulation below, watch carbon atoms link together into chains and rings.</p>`,
   facts:[{e:'💊',t:'Over 90% of all pharmaceutical drugs contain carbon — organic chemistry is literally the science that keeps you healthy.'},{e:'🕷️',t:'Spider silk is stronger than steel by weight: its secret is a protein with a precisely folded carbon backbone that stretches before breaking, absorbing enormous energy.'},{e:'🌈',t:'The colours of flowers, fruits, and autumn leaves are all organic molecules — carbon-ring structures called pigments that absorb specific wavelengths of light.'}],
   formula:null,sim:'organic'},

  student:{icon:'🧪',title:'Functional groups, reaction mechanisms, and stereochemistry',
   body:`<p>Organic molecules are classified by <strong>functional groups</strong> — specific arrangements of atoms that determine reactivity: alcohols (−OH), aldehydes (−CHO), ketones (C=O), carboxylic acids (−COOH), amines (−NH₂), esters (−COO−), and alkenes (C=C). Functional groups react predictably regardless of the rest of the molecule, enabling chemists to plan multi-step syntheses. The <strong>carbonyl group</strong> (C=O) — the most important in biochemistry — is electrophilic at carbon (δ+) and nucleophilic at oxygen (δ−), making it susceptible to nucleophilic addition (aldehydes, ketones) or substitution (esters, acids).</p>
<p>Organic reaction <strong>mechanisms</strong> track electron flow using curved arrow notation. Key mechanism types: <em>SN2</em> (bimolecular nucleophilic substitution — one-step backside attack, inverts stereochemistry, favoured for primary alkyl halides); <em>SN1</em> (unimolecular — carbocation intermediate, racemisation, favoured for tertiary); <em>E2</em> (elimination — anti-periplanar geometry required, gives trans-alkene); <em>addition</em> to alkenes (Markovnikov's rule: nucleophile adds to less substituted carbon, giving more stable carbocation intermediate); <em>aromatic electrophilic substitution</em> (EAS) — the benzene ring acts as nucleophile attacking an electrophile, with the ring regenerated by deprotonation.</p>
<p><strong>Stereochemistry</strong> — the three-dimensional arrangement of atoms — is crucial in biology. Chiral centres (sp³ carbon bonded to four different groups) give rise to enantiomers (non-superimposable mirror images) with identical physical properties but different interactions with biological receptors. The R/S configuration system assigns priority by atomic number. <strong>Thalidomide</strong> is the most famous example: the R-enantiomer is a sedative; the S-enantiomer causes severe birth defects — yet the drug racemises in the body. Modern drug development requires enantiopure synthesis; asymmetric catalysis (Noyori, Sharpless — Nobel 2001) provides elegant solutions.</p>`,
   facts:[{e:'🔬',t:'The total synthesis of vitamin B₁₂ (Woodward & Eschenmoser, 1972) required 72 steps and 11 years — a landmark of human intellectual achievement.'},{e:'🧬',t:'All amino acids in proteins (except glycine) are chiral, and life uses exclusively the L-form — a 50/50 mixture of L and D forms cannot fold into functional proteins.'},{e:'💊',t:'Ibuprofen is sold as a 50/50 mixture of enantiomers — only the S-form is active. Producing the pure S-form would halve the dose needed but is currently too expensive at scale.'}],
   formula:{rows:[
    {n:'Carbonyl reactivity',e:'C=O: δ+ on C (electrophile), δ− on O (nucleophile)'},
    {n:'Markovnikov\'s rule',e:'H adds to less substituted C  (more stable carbocation)'},
    {sep:1},
    {n:'SN2 rate',e:'rate  =  k[substrate][nucleophile]   (inversion)'},
    {n:'SN1 rate',e:'rate  =  k[substrate]   (racemisation via carbocation)'},
    {sep:1},
    {n:'E2 geometry',e:'anti-periplanar H and LG required  →  trans alkene'},
    {n:'Chiral centre',e:'sp³-C bonded to 4 different groups → R or S configuration'},
   ]},sim:'organic'},

  scholar:{icon:'ψ',title:'Pericyclic reactions, total synthesis, and computational chemistry',
   body:`<p><strong>Pericyclic reactions</strong> proceed through cyclic transition states with simultaneous bond making and breaking, governed by orbital symmetry (Woodward-Hoffmann rules, 1965 — Nobel 1981). The three main classes: <em>electrocyclic reactions</em> (ring opening/closing of conjugated polyenes), <em>cycloadditions</em> (Diels-Alder [4+2] is thermally allowed, [2+2] requires photochemistry), and <em>sigmatropic rearrangements</em> ([1,5]-H shift, Cope/Claisen rearrangements). Allowedness is determined by the correlation of frontier molecular orbitals (HOMO of one component, LUMO of the other): thermally allowed if HOMO-LUMO interaction is bonding (constructive overlap). The Diels-Alder reaction — concerted, stereospecific (endo/exo selectivity), and generating up to four stereocentres simultaneously — is the most powerful bond-forming reaction in synthetic chemistry.</p>
<p><strong>Retrosynthetic analysis</strong> (Corey, Nobel 1990) is the logic of total synthesis: working backwards from target to available starting materials using known disconnections (C−C bonds are priority targets), identifying key strategic bonds whose formation simplifies the problem most. Modern total synthesis of complex natural products (palytoxin with 64 stereocentres, maitotoxin MW 3,422 g/mol) requires orchestrating dozens of reactions with exquisite selectivity — chemo-, regio-, and stereoselective throughout. Protecting group strategies manage functional group compatibility; oxidation state mapping tracks carbon transformations.</p>
<p><strong>Computational organic chemistry</strong> uses density functional theory (DFT, typically B3LYP/6-311+G** or ωB97X-D/def2-TZVP) to calculate transition state geometries, activation energies, and reaction pathways. The <strong>distortion-interaction model</strong> (Houk) decomposes activation barriers into distortion energy (deforming reactants to TS geometry) and interaction energy (stabilising orbital overlap at TS) — explaining selectivity trends across reaction series. Machine learning force fields (ANI, MACE) are now accurate enough to run nanosecond molecular dynamics on drug-sized molecules, and transformer-based models (Molecular Transformer) predict reaction products and retrosynthetic routes with >90% accuracy on benchmark datasets.</p>`,
   facts:[{e:'🔬',t:'Palytoxin — a natural toxin from coral — has MW 2,680 g/mol, 64 stereocentres (2⁶⁴ possible stereoisomers), and its total synthesis took 20 years and required unprecedented selectivity control.'},{e:'🤖',t:'AI-driven retrosynthesis tools (ASKCOS, IBM RXN) can now propose viable synthesis routes for complex molecules in seconds — compressing what once took expert chemists weeks.'},{e:'⚡',t:'Femtosecond laser spectroscopy can now directly observe bond-breaking in organic reactions — watching the transition state in real time for the first time in chemical history.'}],
   formula:{rows:[
    {n:'Diels-Alder',e:'diene (4π) + dienophile (2π)  →  cyclohexene   [4+2]'},
    {n:'WH thermal rule',e:'[4n+2] thermal ✓   [4n] thermal ✗  (suprafacial)'},
    {sep:1},
    {n:'Distortion-interaction',e:'ΔE‡  =  ΔE_dist(DA) + ΔE_dist(Di) + ΔE_int'},
    {n:'FMO criterion',e:'thermal: HOMO_diene overlaps LUMO_dienophile'},
    {sep:1},
    {n:'DFT energy',e:'E[ρ]  =  T_s[ρ] + V_ne[ρ] + J[ρ] + E_xc[ρ]'},
    {n:'Activation (Eyring)',e:'k  =  (k_BT/h) · exp(−ΔG‡/RT)'},
   ]},sim:'organic'},
 }},
