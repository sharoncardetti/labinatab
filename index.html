{id:'astro',group:'🌌 Astronomy',emoji:'🌌',color:'#7c3aed',light:'#f5f3ff',
 title:'Stars & The Universe',teaser:'A star is a nuclear furnace 700,000 km across. How are they born, and what happens when they die?',chips:['Stars','Big Bang','Spacetime'],
 lvls:{
  junior:{icon:'⭐',title:'Suns, supernovas and the story of everything!',
   body:`<p>Look up at the night sky. Every single star you can see is a sun — a colossal ball of hot glowing gas, held together by its own gravity and blazing with nuclear fusion. Our Sun is so large that one million Earths would fit inside it. And it's actually a fairly average-sized star!</p>
<p>Stars are born inside giant clouds of gas and dust called <strong>nebulae</strong>. Gravity slowly squeezes the cloud tighter and tighter until the centre becomes so incredibly hot that atoms start fusing together — and a star switches on! This is the same process as a hydrogen bomb, happening continuously for billions of years.</p>
<p>Eventually, a star runs out of fuel. Small stars like our Sun will slowly expand into a <strong>red giant</strong> and then gently puff out a beautiful cloud — a planetary nebula — leaving behind a tiny dense white dwarf. But massive stars go out with a bang: a <strong>supernova</strong> so bright it can outshine an entire galaxy for weeks. The explosion scatters all the atoms made inside the star — including the iron in your blood and the calcium in your bones — across space to build new worlds.</p>`,
   facts:[{e:'☀️',t:'Our Sun fuses 620 million tonnes of hydrogen every second — and has enough fuel for another 5 billion years.'},{e:'💥',t:'A supernova releases more energy in a few seconds than the Sun will emit in its entire 10-billion-year lifetime.'},{e:'⭐',t:'The nearest star (Proxima Centauri) is 4.24 light-years away — at the speed of light, you\'d arrive in 4.24 years!'}],
   formula:null,sim:'astro'},
  student:{icon:'🔭',title:'Stellar structure, the H-R Diagram, and nucleosynthesis',
   body:`<p>A star is in <strong>hydrostatic equilibrium</strong>: outward pressure (radiation + gas) exactly balances inward gravitational compression. For a star of mass M, luminosity scales as <span class="mk">L ∝ M⁴</span> — a star twice as massive burns 16× more brightly and lives only 1/8 as long. The Sun will spend ~10 Gyr on the main sequence; a 10M_☉ star only ~30 Myr.</p>
<p>The <strong>Hertzsprung-Russell (H-R) Diagram</strong> plots luminosity vs surface temperature. The main sequence is a diagonal band from cool red dwarfs to hot blue giants. A star's colour reveals surface temperature via Wien's law: <span class="mk">λ_max = b/T</span> (b = 2.898×10⁻³ m·K). Red giants, white dwarfs, and supergiants occupy distinct regions off the main sequence.</p>
<p><strong>Stellar nucleosynthesis</strong>: the Big Bang produced H, He, and trace Li. Stars fuse H→He on the main sequence (pp chain or CNO cycle). In red giant cores, triple-alpha fusion makes carbon (<span class="mk">3⁴He → ¹²C</span>). Successive burning in massive stars builds up to iron (Fe-56), which has the highest binding energy per nucleon — beyond iron, fusion absorbs energy, triggering core collapse and a <strong>Type II supernova</strong>. Elements heavier than iron are forged by rapid neutron capture (r-process) in supernovae or neutron star mergers.</p>`,
   facts:[{e:'🪙',t:'Gold and platinum on Earth were made in neutron star collisions — confirmed by gravitational wave event GW170817 (2017).'},{e:'🔵',t:'The most massive known star, R136a1, is ~300 solar masses — so luminous it pushes against the Eddington limit.'},{e:'🌀',t:'Neutron stars are ~20 km across but 1.4 solar masses — a teaspoon of neutron star material would weigh a billion tonnes.'}],
   formula:{rows:[
    {n:'Hydrostatic eq.',e:'dP/dr  =  −G · M(r) · ρ / r²'},
    {n:'Luminosity-mass',e:'L / L_☉  ≈  (M / M_☉)⁴'},
    {sep:1},
    {n:'Wien\'s law',e:'λ_max  =  b / T,   b = 2.898×10⁻³ m·K'},
    {n:'Stefan-Boltzmann',e:'L  =  4π R² · σ · T⁴'},
    {sep:1},
    {n:'Triple-alpha',e:'3 ⁴He  →  ¹²C  +  γ  (7.275 MeV)'},
    {n:'Lifetime',e:'τ  ≈  M / L  ∝  M⁻³'},
   ]},sim:'astro'},
  scholar:{icon:'∞',title:'General Relativity, black holes, and the large-scale structure of the universe',
   body:`<p>When a stellar core exceeding ~3M_☉ collapses, no known force halts the implosion; spacetime curvature diverges at a <em>singularity</em> concealed behind an <strong>event horizon</strong> at the Schwarzschild radius <span class="mk">r_S = 2GM/c²</span>. Inside r_S, the future lightcone points inward — escape is causally forbidden. Hawking (1974) showed quantum field theory near the horizon implies thermal emission at temperature <span class="mk">T_H = ℏc³/(8πGMk_B)</span>, causing black holes to slowly evaporate — an unresolved paradox (information loss problem).</p>
<p>The universe is described by the <strong>ΛCDM model</strong>: a flat expanding spacetime whose dynamics follow the <strong>Friedmann equations</strong>. The Hubble parameter <span class="mk">H(z) = H_0√[Ω_m(1+z)³ + Ω_r(1+z)⁴ + Ω_Λ]</span> encodes matter (Ω_m ≈ 0.31), radiation (Ω_r ≈ 9×10⁻⁵), and dark energy (Ω_Λ ≈ 0.69). The Hubble tension — H_0 = 67 km/s/Mpc from CMB vs 73 from the distance ladder — is one of the sharpest open problems in cosmology.</p>
<p>The <strong>Cosmic Microwave Background (CMB)</strong> is the thermal relic of last scattering at z ≈ 1100 (~380,000 yr after the Big Bang). Temperature anisotropies δT/T ∼ 10⁻⁵ encode the primordial power spectrum of quantum fluctuations amplified during inflation. The angular power spectrum C_ℓ measured by Planck constrains all cosmological parameters simultaneously: acoustic peak positions confirm flatness; peak heights constrain baryon density; peak spacing gives H_0.</p>`,
   facts:[{e:'🌑',t:'The first image of a black hole (M87*, 2019) matched GR predictions precisely — confirming the photon ring and shadow size.'},{e:'🔭',t:'JWST has observed galaxies at z > 13, corresponding to light emitted just 320 million years after the Big Bang.'},{e:'🌌',t:'Dark matter (27% of the universe\'s energy) has never been directly detected as a particle, despite overwhelming gravitational evidence.'}],
   formula:{rows:[
    {n:'Schwarzschild radius',e:'r_S  =  2GM/c²',c:'event horizon'},
    {n:'Hawking temperature',e:'T_H  =  ℏc³ / (8πGMk_B)'},
    {sep:1},
    {n:'Friedmann eq.',e:'H²  =  (8πG/3)ρ  −  k/a²  +  Λ/3'},
    {n:'Hubble law',e:'v  =  H_0 · d   (H_0 ≈ 70 km/s/Mpc)'},
    {sep:1},
    {n:'CMB temperature',e:'T_0  =  2.725  K'},
    {n:'Last scattering',e:'z_*  ≈  1100,   t_*  ≈  380,000  yr'},
   ]},sim:'astro'},
 }},

{id:'blackholes',group:'🌌 Astronomy',emoji:'⚫',color:'#4c1d95',light:'#f5f3ff',
 title:'Black Holes & Relativity',teaser:'A region of space where gravity is so extreme that not even light can escape. Einstein predicted them in 1915. We photographed one in 2019.',chips:['General Relativity','Event Horizon','Spacetime'],
 lvls:{
  junior:{icon:'🌀',title:'The universe\'s ultimate trap — nothing escapes!',
   body:`<p>Imagine squeezing the entire mass of the Sun into a ball just 6 kilometres across. The gravity would be so overwhelming, so absolute, that nothing — not a rocket, not a laser beam, not even light itself — could escape. This is a <strong>black hole</strong>: not a hole in space, but an object so incredibly dense that it warps the very fabric of space and time around it.</p>
<p>Black holes form when a massive star — at least 20 times heavier than our Sun — runs out of nuclear fuel. With nothing to push back against gravity, the star's core collapses catastrophically in less than a second, triggering a supernova explosion. The remaining core is crushed to an unimaginable density: a <strong>singularity</strong>, where our current understanding of physics completely breaks down. Surrounding the singularity is the <strong>event horizon</strong> — an invisible boundary of no return. Cross it, and you can never come back.</p>
<p>For decades, black holes were purely theoretical. Then, in April 2019, the Event Horizon Telescope — a network of radio telescopes spanning the entire Earth, working together as one planet-sized instrument — captured the first ever image of a black hole's shadow. The target was M87*, a supermassive black hole 6.5 billion times the mass of our Sun, 55 million light-years away. The image matched Einstein's predictions from 1915 with stunning precision.</p>`,
   facts:[{e:'📸',t:'The first image of a black hole (M87*, 2019) required a telescope the size of Earth — eight radio observatories on four continents linked together by atomic clocks.'},{e:'⏱️',t:'Time runs slower near a black hole. At the event horizon of a stellar-mass black hole, one hour would equal thousands of years for a distant observer.'},{e:'🌌',t:'The Milky Way contains a supermassive black hole — Sagittarius A* — 4 million solar masses, 26,000 light-years from Earth. Its shadow was imaged in 2022.'}],
   formula:null,sim:'blackholes'},

  student:{icon:'⚫',title:'General relativity, the Schwarzschild metric, and gravitational waves',
   body:`<p>Einstein's <strong>General Relativity (GR, 1915)</strong> replaces Newton's gravitational force with the geometry of curved spacetime. The Einstein field equations <span class="mk">G_μν + Λg_μν = (8πG/c⁴)T_μν</span> relate the Einstein tensor G_μν (encoding spacetime curvature) to the stress-energy tensor T_μν (encoding matter and energy distribution). The cosmological constant Λ, originally introduced to allow a static universe, now represents dark energy. For a non-rotating, uncharged mass M, the exact solution is the <strong>Schwarzschild metric</strong>: <span class="mk">ds² = −(1−r_S/r)c²dt² + (1−r_S/r)⁻¹dr² + r²dΩ²</span>, where r_S = 2GM/c² is the Schwarzschild radius (event horizon). The metric diverges at r = r_S (coordinate singularity, removable by a change of coordinates) and at r = 0 (true physical singularity).</p>
<p>Near a black hole, time dilation is extreme: a stationary clock at r experiences proper time <span class="mk">dτ = √(1−r_S/r) dt</span> — approaching zero at the event horizon. Photons climbing out of a gravitational well are <strong>gravitationally redshifted</strong>: <span class="mk">z = (1−r_S/r)^{-1/2} − 1</span>. Light bending — predicted by GR to be twice the Newtonian value — was confirmed by Eddington's 1919 solar eclipse expedition, making Einstein world-famous overnight. The innermost stable circular orbit (ISCO) for a Schwarzschild black hole is at r = 3r_S = 6GM/c²; matter spiralling inward is heated in the accretion disc, reaching millions of Kelvin and radiating X-rays.</p>
<p><strong>Gravitational waves</strong> — ripples in spacetime — were predicted by GR in 1916 and first detected by LIGO on 14 September 2015 (GW150914): two black holes of 36 and 29 solar masses merging 1.3 billion light-years away, radiating 3 solar masses of energy as gravitational waves in 0.2 seconds — briefly outshining all stars in the observable universe in gravitational wave luminosity. LIGO's mirrors moved by 10⁻¹⁸ m — 1/1000th the diameter of a proton — during the event.</p>`,
   facts:[{e:'🔬',t:'LIGO\'s sensitivity is so extreme that quantum fluctuations of individual photons limit its precision — squeezed light (a quantum optics technique) is used to push below this limit.'},{e:'🌊',t:'The gravitational wave signal GW170817 (two neutron stars merging, 2017) was simultaneously detected in gravitational waves, gamma rays, X-rays, optical, and radio — the birth of multi-messenger astronomy.'},{e:'⚫',t:'Sagittarius A* has a mass of 4.15 million suns compressed into a region smaller than our Solar System — yet it is surprisingly quiet, accreting at just 10⁻⁸ of its theoretical maximum rate.'}],
   formula:{rows:[
    {n:'Einstein field eqs.',e:'G_μν + Λg_μν  =  (8πG/c⁴) T_μν'},
    {n:'Schwarzschild radius',e:'r_S  =  2GM/c²',c:'event horizon'},
    {sep:1},
    {n:'Schwarzschild metric',e:'ds²  =  −(1−r_S/r)c²dt²  +  (1−r_S/r)⁻¹dr²  +  r²dΩ²'},
    {n:'Time dilation',e:'dτ  =  √(1 − r_S/r) · dt'},
    {sep:1},
    {n:'Gravitational redshift',e:'z  =  (1 − r_S/r)^{−1/2}  −  1'},
    {n:'ISCO (Schwarzschild)',e:'r_ISCO  =  3r_S  =  6GM/c²'},
   ]},sim:'blackholes'},

  scholar:{icon:'∞',title:'Kerr metric, Hawking radiation, and the black hole information paradox',
   body:`<p>Most astrophysical black holes rotate. The <strong>Kerr metric</strong> (Roy Kerr, 1963) describes a rotating black hole with mass M and angular momentum J = aMc (a = spin parameter, 0 ≤ a ≤ GM/c²): <span class="mk">ds² = −(1−r_Sr/Σ)c²dt² − (2r_Sra sin²θ/Σ)c·dt·dφ + (Σ/Δ)dr² + Σdθ² + (r²+a²+r_Sra²sin²θ/Σ)sin²θdφ²</span>, where Σ = r²+a²cos²θ and Δ = r²−r_Sr+a². The cross term dt·dφ (frame dragging) means spacetime itself is dragged in the direction of rotation. The <strong>ergosphere</strong> (r < r_S/2 + √(r_S²/4−a²cos²θ)) is a region where nothing can remain stationary — the Penrose process extracts rotational energy by splitting objects in the ergosphere, theoretically powering relativistic jets in active galactic nuclei.</p>
<p><strong>Hawking radiation</strong> (Hawking, 1974) arises from quantum field theory in curved spacetime: near the event horizon, virtual particle-antiparticle pairs are created by vacuum fluctuations; occasionally one falls in while the other escapes, appearing as thermal radiation at temperature <span class="mk">T_H = ℏc³/(8πGMk_B)</span>. For stellar-mass black holes T_H ~ 10⁻⁸ K — utterly negligible against the 2.7 K CMB. But as the black hole radiates, it loses mass and heats up, eventually evaporating in a runaway process. The evaporation time τ ~ G²M³/(ℏc⁴) ~ 10⁶⁴ years for a solar-mass black hole.</p>
<p>The <strong>black hole information paradox</strong> (Hawking 1976): if Hawking radiation is exactly thermal (carrying no information), then information about matter that fell in is permanently destroyed — violating quantum mechanical unitarity. Decades of debate yielded the <strong>holographic principle</strong> (Susskind, 't Hooft): all information in a volume of space is encoded on its boundary surface, with entropy S_BH = k_B·A/(4l_P²) (Bekenstein-Hawking formula, A = horizon area, l_P = Planck length). The recent <strong>Page curve</strong> calculation (using replica wormholes and gravitational path integrals, 2019) suggests information is indeed preserved — unitarity is upheld — but the mechanism remains deeply controversial.</p>`,
   facts:[{e:'🔬',t:'The Page curve calculation (2019) used replica wormholes — saddle points in the gravitational path integral connecting different replicas of the system — to show unitarity is preserved, but required summing over topologically non-trivial spacetime geometries.'},{e:'🌌',t:'M87* rotates at ~90% of the maximum possible spin (a ≈ 0.9 GM/c²), inferred from the asymmetry of its 2019 image — frame dragging at near-maximum rate, powering a 5,000 light-year relativistic jet.'},{e:'🎯',t:'The Event Horizon Telescope achieves an angular resolution of 20 microarcseconds — equivalent to reading a newspaper in New York from a café in Paris.'}],
   formula:{rows:[
    {n:'Hawking temperature',e:'T_H  =  ℏc³ / (8πGMk_B)',c:'~10⁻⁸ K for 1 M_☉'},
    {n:'Evaporation time',e:'τ  =  5120π G²M³ / (ℏc⁴)',c:'~10⁶⁴ yr for 1 M_☉'},
    {sep:1},
    {n:'Bekenstein-Hawking S',e:'S_BH  =  k_B · A / (4 l_P²)',c:'l_P = √(ℏG/c³)'},
    {n:'Penrose process',e:'ΔE_extracted  ≤  Mc²(1 − 1/√2)  ≈  29% Mc²'},
    {sep:1},
    {n:'Kerr ergosphere',e:'r_ergo  =  r_S/2 + √(r_S²/4 − a²cos²θ)'},
    {n:'Frame dragging (ω)',e:'ω  =  dφ/dt  =  r_S·a·r / (2Σ·(r²+a²) + r_S·a²·r·sin²θ)'},
   ]},sim:'blackholes'},
 }},

{id:'cosmology',group:'🌌 Astronomy',emoji:'🌌',color:'#0c4a6e',light:'#e0f2fe',
 title:'Cosmology & The Big Bang',teaser:'13.8 billion years ago, all the matter, energy, space, and time in the universe exploded from a point smaller than an atom. How do we know — and what came before?',chips:['Big Bang','Dark Energy','CMB'],
 lvls:{
  junior:{icon:'💥',title:'The universe had a beginning — and we can still see its glow!',
   body:`<p>Everything you have ever seen — every star, galaxy, planet, and atom — was once compressed into a space unimaginably smaller than the full stop at the end of this sentence. About <strong>13.8 billion years ago</strong>, this impossibly hot, dense point began expanding in an event we call the <strong>Big Bang</strong>. Space itself expanded — and has been expanding ever since.</p>
<p>In the first few minutes, the universe was so hot that protons and neutrons fused together, making hydrogen and helium. But it was still too hot for atoms to form properly — the universe was a glowing fog of plasma, opaque like the inside of a star. Then, 380,000 years after the Big Bang, the universe had cooled enough for electrons to combine with protons to make neutral hydrogen. Suddenly, the fog cleared. Light streamed freely across the universe for the first time. <strong>We can still detect that ancient light today</strong> — it fills the entire sky as a faint glow of microwave radiation called the <strong>Cosmic Microwave Background (CMB)</strong>.</p>
<p>The CMB is a photograph of the baby universe, 380,000 years old. It is almost perfectly uniform in every direction — but not quite. Tiny temperature variations of 1 part in 100,000 are the seeds of everything: those slight density differences grew under gravity over billions of years into galaxies, galaxy clusters, and the vast cosmic web of structure we see today. In the simulation below, watch the universe expand from the Big Bang to today.</p>`,
   facts:[{e:'📡',t:'The CMB was accidentally discovered in 1964 by Penzias and Wilson, who thought the mysterious noise in their radio antenna was pigeon droppings. It won them the Nobel Prize in 1978.'},{e:'🌌',t:'The observable universe is 93 billion light-years across — even though it is only 13.8 billion years old. The expansion of space itself carries distant regions beyond what light could reach.'},{e:'🔭',t:'The James Webb Space Telescope has observed galaxies forming just 320 million years after the Big Bang — earlier than most models predicted, challenging our understanding of early galaxy formation.'}],
   formula:null,sim:'cosmology'},

  student:{icon:'🌌',title:'The Friedmann equations, inflation, and dark energy',
   body:`<p>The universe's expansion is governed by the <strong>Friedmann equations</strong>, derived from GR with the Friedmann-Lemaître-Robertson-Walker (FLRW) metric — assuming homogeneity and isotropy (the cosmological principle). The first Friedmann equation: <span class="mk">H² = (ȧ/a)² = (8πG/3)ρ − kc²/a² + Λc²/3</span>, where H is the Hubble parameter, a(t) is the scale factor (relative size of the universe), ρ is total energy density, k is spatial curvature (0=flat, ±1=curved), and Λ is the cosmological constant. Observations show k ≈ 0 (flat universe) and the energy budget: ~5% ordinary matter, ~27% dark matter, ~68% dark energy (Λ).</p>
<p><strong>Cosmic inflation</strong> (Guth, 1981) posits an epoch of exponential expansion (a ∝ e^{Ht}) lasting ~10⁻³² seconds starting at ~10⁻³⁶ seconds after the Big Bang, driven by a scalar inflaton field slow-rolling down its potential. Inflation solves three classic puzzles: the <em>horizon problem</em> (why the CMB is uniform to 1 in 10⁵ across causally disconnected regions), the <em>flatness problem</em> (why k ≈ 0 to extraordinary precision), and the <em>monopole problem</em>. Crucially, quantum fluctuations of the inflaton during inflation seeded the density perturbations observed in the CMB power spectrum — the origin of all cosmic structure.</p>
<p><strong>Dark energy</strong> (Λ) drives the accelerating expansion of the universe, discovered via Type Ia supernova distance measurements in 1998 (Riess, Perlmutter, Schmidt — Nobel 2011). The equation of state w = p/(ρc²) = −1 for a cosmological constant; observations constrain w = −1.03 ± 0.03. The <strong>Hubble tension</strong> — H₀ = 67.4 ± 0.5 km/s/Mpc from CMB (Planck) vs 73.2 ± 1.3 from the distance ladder (Cepheid+SNIa) — is a 5σ discrepancy that may signal physics beyond ΛCDM.</p>`,
   facts:[{e:'🔭',t:'Type Ia supernovae are "standard candles" because they all explode with almost identical peak luminosity — their apparent brightness reveals their distance, proving the universe is accelerating.'},{e:'🌡️',t:'The CMB temperature today is 2.7255 K — the most precisely measured blackbody spectrum in nature, with deviations of less than 1 part in 100,000.'},{e:'⚛️',t:'Big Bang nucleosynthesis in the first 3 minutes produced 75% hydrogen and 25% helium by mass — exactly matching the observed primordial abundances, a stunning confirmation of the model.'}],
   formula:{rows:[
    {n:'Friedmann equation',e:'H²  =  (8πG/3)ρ  −  kc²/a²  +  Λc²/3'},
    {n:'Hubble parameter',e:'H(z)  =  H₀√[Ω_m(1+z)³ + Ω_r(1+z)⁴ + Ω_Λ]'},
    {sep:1},
    {n:'Scale factor (Λ-dom)',e:'a(t)  ∝  exp(H₀√Ω_Λ · t)   (accelerating)'},
    {n:'Dark energy EoS',e:'w  =  p/(ρc²)  =  −1   (Λ = const.)'},
    {sep:1},
    {n:'CMB temperature',e:'T_CMB  =  2.7255  K   (today)'},
    {n:'Inflation e-folds',e:'N  =  ∫H dt  ≥  60   (solves horizon problem)'},
   ]},sim:'cosmology'},

  scholar:{icon:'∂',title:'CMB anisotropies, large-scale structure, and quantum gravity',
   body:`<p>The CMB temperature anisotropies δT/T ~ 10⁻⁵ are decomposed into spherical harmonics: <span class="mk">δT/T(n̂) = Σ_{ℓm} a_{ℓm} Y_{ℓm}(n̂)</span>. The angular power spectrum C_ℓ = ⟨|a_{ℓm}|²⟩ encodes the physics of the early universe. The acoustic peaks arise from oscillations in the baryon-photon fluid before recombination: modes that completed an integer number of half-oscillations at recombination appear as peaks (compressed or rarefied). The first peak at ℓ ~ 220 (angular scale ~1°) corresponds to the sound horizon at recombination r_s = c_s·t_rec — its observed angular position confirms spatial flatness. Polarisation of the CMB (E-modes from scalar perturbations, B-modes from tensor perturbations / gravitational waves) provides additional constraints; primordial B-modes would directly measure the inflation energy scale via the tensor-to-scalar ratio r.</p>
<p><strong>Large-scale structure</strong> forms by gravitational amplification of primordial fluctuations. The matter power spectrum P(k) — measured by galaxy surveys (SDSS, DESI) — encodes: the Harrison-Zel'dovich primordial spectrum P(k) ∝ k^{n_s} (n_s ≈ 0.965, slight red tilt confirming slow-roll inflation); the transfer function encoding damping by radiation pressure (Silk damping, Jeans scale); and baryon acoustic oscillations (BAO) — the same acoustic physics as CMB peaks, imprinted as a ~150 Mpc preferred galaxy separation scale, providing a standard ruler for measuring H(z) across cosmic time. The DESI survey (2024) has measured BAO across 11 billion years of cosmic history, constraining dark energy evolution with unprecedented precision.</p>
<p>The reconciliation of GR with quantum mechanics — <strong>quantum gravity</strong> — remains the deepest unsolved problem in physics. Loop quantum cosmology (LQC) replaces the Big Bang singularity with a quantum bounce (Big Bounce), where the prior contracting universe reached a maximum density of ~0.41 ρ_Planck before rebounding. String theory's landscape (~10⁵⁰⁰ vacua) suggests eternal inflation — our universe as one bubble in a vast multiverse — potentially explaining the fine-tuning of physical constants. The <strong>swampland conjectures</strong> (distance conjecture, de Sitter conjecture) suggest that metastable de Sitter space (our Λ > 0 universe) may be impossible in string theory — a profound tension that remains unresolved.</p>`,
   facts:[{e:'🔬',t:'DESI\'s 2024 BAO measurement across 6 million galaxies shows hints that dark energy may not be constant — w may be evolving with time, potentially overturning the cosmological constant interpretation.'},{e:'🌌',t:'The observable universe contains ~2 trillion galaxies (revised upward from 200 billion in 2016), each containing hundreds of billions of stars — yet ordinary matter is only 5% of the total energy budget.'},{e:'⚡',t:'The Planck length (10⁻³⁵ m) and Planck time (10⁻⁴³ s) represent the scale at which quantum gravitational effects become dominant — 20 orders of magnitude beyond the reach of any conceivable particle accelerator.'}],

{id:'solarsystem',group:'🌌 Astronomy',emoji:'🪐',color:'#b45309',light:'#fffbeb',
 title:'The Solar System',teaser:'Eight planets, 200+ moons, millions of asteroids, and a star that contains 99.86% of all the mass. Our cosmic neighbourhood is far stranger than it looks.',chips:['Planets','Orbits','Moons'],
 lvls:{
  junior:{icon:'🪐',title:'Our cosmic neighbourhood — eight worlds and counting!',
   body:`<p>Our Solar System is a family of worlds orbiting a single star — our Sun. It contains <strong>eight planets</strong>, over 200 moons, millions of asteroids, billions of comets, and a vast cloud of icy debris at its edges. All of it formed from the same swirling disc of gas and dust about 4.6 billion years ago, from the explosion of a nearby star that seeded our nebula with heavy elements.</p>
<p>The four inner planets — Mercury, Venus, Earth, and Mars — are small, rocky worlds. The four outer planets — Jupiter, Saturn, Uranus, and Neptune — are enormous balls of gas and ice. Jupiter alone is so massive that all the other planets could fit inside it, with room to spare. Saturn's iconic rings are made of billions of chunks of ice and rock, ranging from the size of a grain of sand to that of a house, all orbiting in a thin disc just tens of metres thick.</p>
<p>Some of the most exciting places in the Solar System are not the planets themselves, but their moons. Europa (moon of Jupiter) has a global ocean of liquid water beneath its icy crust — kept liquid by tidal heating — and is considered one of the most promising places to search for extraterrestrial life in the Solar System. Titan (moon of Saturn) has a thick atmosphere and lakes of liquid methane on its surface, with a weather cycle eerily similar to Earth's water cycle — but made of hydrocarbons.</p>`,
   facts:[{e:'🪐',t:'Saturn\'s rings span 282,000 km — wide enough to fit 22 Earths side by side — yet are only about 10 metres thick in places. If scaled to a sheet of paper, they would be thinner than the paper.'},{e:'🌋',t:'Io, a moon of Jupiter, is the most volcanically active body in the Solar System — with hundreds of active volcanoes driven by tidal squeezing from Jupiter\'s immense gravity.'},{e:'🌊',t:'Europa\'s subsurface ocean contains more liquid water than all of Earth\'s oceans combined — kept warm by tidal flexing, with a rocky seafloor that could support hydrothermal vents.'}],
   formula:null,sim:'solarsystem'},

  student:{icon:'🪐',title:'Orbital mechanics, Kepler\'s laws, and planetary formation',
   body:`<p><strong>Kepler's three laws</strong> (derived empirically from Tycho Brahe's data, 1609–1619; later derived theoretically by Newton from his law of gravitation): (1) Planets orbit the Sun in ellipses with the Sun at one focus. (2) A line joining a planet to the Sun sweeps equal areas in equal times (conservation of angular momentum — planets move faster at perihelion). (3) T² ∝ a³: the square of the orbital period is proportional to the cube of the semi-major axis; specifically <span class="mk">T² = (4π²/GM_☉)a³</span>. For Earth: T = 1 yr, a = 1 AU = 1.496×10¹¹ m — this ratio calibrates distances throughout the Solar System.</p>
<p><strong>Planetary formation</strong> (core accretion model): the protoplanetary disc of gas and dust undergoes gravitational instabilities forming planetesimals (~km scale); planetesimals collide and grow into protoplanets; runaway accretion builds terrestrial planets in ~10–100 Myr. Beyond the snow line (~2.7 AU from the Sun, where water ice condenses), rocky cores grow rapidly to ~10 Earth masses, triggering runaway gas accretion and forming gas giants. The <strong>Nice model</strong> (2005) explains the Late Heavy Bombardment (~3.9 Gya) as a consequence of orbital resonance migration of Jupiter and Saturn (crossing their 1:2 resonance), destabilising the outer Solar System and scattering a bombardment of planetesimals inward.</p>
<p><strong>Tidal forces</strong> arise from the gradient of gravitational attraction across an extended body: tidal acceleration <span class="mk">a_tidal ≈ 2GMd/r³</span> (where d is the body's radius, r is the distance to the source). Tidal locking — where the rotation period equals the orbital period — affects most large moons (including Earth's Moon). Inside the <strong>Roche limit</strong> <span class="mk">d_Roche = a(2M_planet/M_satellite)^{1/3}</span>, tidal forces overcome the satellite's self-gravity, preventing accretion or disintegrating existing bodies — explaining planetary ring systems.</p>`,
   facts:[{e:'🔭',t:'The Voyager 1 spacecraft, launched in 1977, is now 23 billion km from the Sun — the most distant human-made object — and still transmitting data using a 22-watt radio (equivalent to a fridge light).'},{e:'💥',t:'The Moon formed when a Mars-sized body (Theia) struck the young Earth ~4.5 billion years ago, ejecting material that coalesced into the Moon — confirmed by lunar rock isotopic ratios identical to Earth\'s mantle.'},{e:'🌀',t:'Jupiter\'s Great Red Spot is a storm wider than Earth that has raged continuously for at least 350 years — though it has been shrinking and is now only 1.3 times Earth\'s diameter.'}],
   formula:{rows:[
    {n:'Kepler\'s 3rd law',e:'T²  =  (4π²/GM_☉) · a³'},
    {n:'Orbital velocity',e:'v_orb  =  √(GM_☉/r)   [circular orbit]'},
    {sep:1},
    {n:'Tidal acceleration',e:'a_tidal  ≈  2GMd / r³'},
    {n:'Roche limit',e:'d_Roche  =  a · (2M_planet/M_sat)^{1/3}'},
    {sep:1},
    {n:'Escape velocity',e:'v_esc  =  √(2GM/r)'},
    {n:'Hill sphere radius',e:'r_H  =  a(1−e)(m/3M)^{1/3}',c:'gravitational influence zone'},
   ]},sim:'solarsystem'},

  scholar:{icon:'∂',title:'N-body dynamics, resonances, and planetary habitability',
   body:`<p>The gravitational N-body problem — the coupled equations of motion for N mutually attracting masses — has no general closed-form solution for N ≥ 3 (Poincaré, 1890). The Solar System is chaotic on timescales of ~5 Myr: Lyapunov exponent λ ~ 1/(5 Myr), meaning orbital elements diverge exponentially and long-term prediction is fundamentally impossible. Mercury's orbit is particularly unstable; numerical integrations (Laskar, Gastineau 2009) show a ~1% probability of Mercury's orbit becoming sufficiently eccentric over 5 Gyr to cause a collision with Venus or Earth — making planetary instability a low-probability but real existential risk. The <strong>Kolmogorov-Arnold-Moser (KAM) theorem</strong> guarantees that many quasi-periodic orbits persist under small perturbations, providing islands of stability amid the chaos.</p>
<p><strong>Mean-motion resonances</strong> (MMRs) occur when orbital periods ratio to small integers (e.g. 1:2, 2:3). The Laplace resonance of Io:Europa:Ganymede (1:2:4) is maintained by tidal dissipation and drives Io's extreme volcanism: orbital eccentricity forced by the resonance causes periodic tidal squeezing (tidal dissipation rate P_tidal = (21/2)(k₂/Q)(GM_J²R⁵/a⁶)e²), heating Io's interior at ~2 W/m² — 30× Earth's geothermal flux. The <strong>Kirkwood gaps</strong> in the asteroid belt at 3:1, 5:2, 7:3, 2:1 MMRs with Jupiter are cleared by chaotic diffusion; asteroids entering these resonances are scattered onto planet-crossing orbits, providing a steady flux of near-Earth objects.</p>
<p><strong>Planetary habitability</strong> depends on multiple factors beyond the classical "habitable zone" (HZ, where liquid water can exist on the surface). The HZ for the Sun spans ~0.95–1.67 AU (optimistic estimate); Earth lies comfortably inside. However, habitability also requires: sufficient planetary mass (retain atmosphere, drive plate tectonics); a magnetic field (protect from stellar wind); tidal effects (not too extreme — Io vs Europa); carbonate-silicate cycle (long-term CO₂ thermostat stabilising climate); and possibly a large moon stabilising obliquity. The <strong>galactic habitable zone</strong> (GHZ) restricts suitable stellar environments: too close to the galactic centre risks sterilising radiation; too far lacks sufficient heavy elements for rocky planets and complex chemistry.</p>`,
   facts:[{e:'🔬',t:'The James Webb Space Telescope has detected CO₂, SO₂, and possible dimethyl sulphide (a potential biosignature) in the atmosphere of K2-18b — a sub-Neptune in the habitable zone — though the interpretation remains debated.'},{e:'💫',t:'Numerical simulations show that without Jupiter acting as a gravitational shield, Earth would experience 1,000× more asteroid impacts — Jupiter deflects or ejects most potential impactors before they reach the inner Solar System.'},{e:'🌍',t:'Earth\'s axial tilt (23.5°) is stabilised by the Moon to within ~±1.3° over millions of years. Without the Moon, chaotic obliquity variations of 0°–85° would cause extreme climate swings, possibly preventing complex life.'}],
   formula:{rows:[
    {n:'Lyapunov time (Solar System)',e:'τ_L  ~  5  Myr   (Mercury most unstable)'},
    {n:'Tidal dissipation',e:'P_tidal  =  (21/2)(k₂/Q)(GM²R⁵/a⁶)e²'},
    {sep:1},
    {n:'Habitable zone (inner)',e:'r_HZ  =  √(L/L_☉) · 0.95  AU'},
    {n:'Habitable zone (outer)',e:'r_HZ  =  √(L/L_☉) · 1.67  AU'},
    {sep:1},
    {n:'MMR condition',e:'n₁/n₂  =  p/(p+q),   p,q ∈ ℤ'},
    {n:'Hill sphere',e:'r_H  =  a(m/3M)^{1/3}   (gravitational influence)'},
   ]},sim:'solarsystem'},
 }},

{id:'neuro',group:'🧠 Neuroscience',emoji:'🧠',color:'#db2777',light:'#fdf2f8',
 title:'The Brain & Neurons',teaser:'86 billion neurons, 100 trillion connections — how does electrochemical noise become thought, memory, and consciousness?',chips:['Neurons','Synapses','Cognition'],
 lvls:{
  junior:{icon:'⚡',title:'Your brain: the universe\'s most amazing computer!',
   body:`<p>Inside your skull sits the most complex object in the known universe — your <strong>brain</strong>. It weighs about 1.4 kg but contains roughly <em>86 billion</em> nerve cells called <strong>neurons</strong>. Each neuron can connect to thousands of others, creating up to 100 trillion connections — more than the number of stars in the Milky Way galaxy!</p>
<p>Neurons communicate by sending tiny electrical pulses called <strong>action potentials</strong>. When you touch something hot, neurons in your hand fire a signal to your brain in milliseconds. When you think of a word, millions of neurons fire in a carefully orchestrated pattern. When you learn something new — like riding a bike — the connections between specific neurons physically strengthen, and that\'s literally what a memory is.</p>
<p>Your brain never truly switches off. Even while you sleep, it replays the day\'s events, strengthens important memories, clears out waste products, and prepares you for tomorrow. Dreams are thought to be part of this nightly maintenance. In the simulation below, you can watch neurons fire and send signals to each other in a simple network — just like the real thing!</p>`,
   facts:[{e:'⚡',t:'A single neuron can fire up to 1,000 times per second — sending electrical signals at up to 120 metres per second along the fastest fibres.'},{e:'💤',t:'During deep sleep, the brain flushes out toxic waste products through the glymphatic system — a kind of nightly brain-wash.'},{e:'🎸',t:'Playing a musical instrument uses more of the brain simultaneously than almost any other activity — like a full-body workout for neurons.'}],
   formula:null,sim:'neuro'},
  student:{icon:'🔬',title:'Action potentials, synaptic transmission, and neural coding',
   body:`<p>The neuron\'s resting membrane potential is approximately −70 mV (inside negative) maintained by Na⁺/K⁺-ATPase pumps and selective ion channels. An <strong>action potential</strong> is triggered when depolarisation reaches the threshold (~−55 mV): voltage-gated Na⁺ channels open, driving the membrane to +40 mV; they then inactivate while K⁺ channels open, repolarising the cell. The <strong>all-or-none law</strong> means APs are stereotyped — information is encoded in firing <em>rate</em> and <em>timing</em>, not amplitude.</p>
<p>At the <strong>synapse</strong>, an AP arriving at the presynaptic terminal triggers Ca²⁺ influx via voltage-gated channels, causing synaptic vesicles to fuse and release neurotransmitter (e.g. glutamate, GABA) into the synaptic cleft (~20 nm wide). Neurotransmitter binds postsynaptic receptors: ionotropic receptors (AMPA, NMDA, GABA_A) open ion channels directly; metabotropic receptors (mGluR, GABA_B) act via G-protein cascades. NMDA receptors are doubly gated (voltage + ligand) and are central to <strong>long-term potentiation (LTP)</strong> — the synaptic mechanism of learning and memory.</p>
<p><strong>LTP</strong> requires coincident pre- and postsynaptic activity (Hebb\'s rule: "neurons that fire together, wire together"). NMDA receptor activation at depolarised potentials causes Ca²⁺ influx, activating CaMKII, which phosphorylates AMPA receptors and inserts new ones, strengthening the synapse. This is the molecular basis of <strong>synaptic plasticity</strong> — the physical substrate of memory formation.</p>`,
   facts:[{e:'🔵',t:'The NMDA receptor is called a "coincidence detector" — it only opens when both the presynaptic cell fires AND the postsynaptic cell is already active.'},{e:'🌿',t:'Neurogenesis — the birth of new neurons — occurs in the adult hippocampus and is enhanced by exercise, sleep, and novelty.'},{e:'🎯',t:'Dopamine does not signal "pleasure" directly — it signals prediction error: the difference between expected and actual reward.'}],
   formula:{rows:[
    {n:'Nernst equation',e:'E_ion  =  (RT/zF) · ln([X]_out / [X]_in)'},
    {n:'Resting potential',e:'V_rest  ≈  −70 mV   (Na⁺/K⁺ pump)'},
    {sep:1},
    {n:'Goldman equation',e:'V_m  =  (RT/F) · ln( P_K[K⁺]_o + P_Na[Na⁺]_o + P_Cl[Cl⁻]_i ) / (...)'},
    {n:'Threshold',e:'V_threshold  ≈  −55 mV'},
    {sep:1},
    {n:'Hebb\'s rule',e:'"Neurons that fire together, wire together"'},
    {n:'LTP induction',e:'NMDA Ca²⁺ influx  →  CaMKII  →  AMPA insertion'},
   ]},sim:'neuro'},
  scholar:{icon:'∂',title:'Computational neuroscience: Hodgkin-Huxley, neural field theory, and the connectome',
   body:`<p>The <strong>Hodgkin-Huxley model</strong> (1952, Nobel Prize 1963) describes the action potential as a set of coupled nonlinear ODEs: <span class="mk">C_m dV/dt = −g_Na·m³h(V−E_Na) − g_K·n⁴(V−E_K) − g_L(V−E_L) + I</span>, where m, h, n are gating variables with voltage-dependent kinetics. The model predicts AP shape, refractory period, and threshold with quantitative accuracy. It remains the foundation of all conductance-based neuron models. The FitzHugh-Nagumo equations are a 2D reduction capturing the qualitative phase-plane structure (nullclines, limit cycle) at lower computational cost.</p>
<p>At the population level, <strong>neural field theory</strong> describes spatially extended neural tissue via integro-differential equations: <span class="mk">τ ∂u(x,t)/∂t = −u + ∫w(x−y)F[u(y,t)]dy + I(x,t)</span>, where u is local mean activity, w is the synaptic weight kernel (typically Mexican-hat: local excitation, lateral inhibition), and F is a sigmoidal firing-rate function. Spatially periodic activity patterns — <em>Turing-like instabilities</em> — arise when the spatial Fourier transform of w has a maximum at non-zero wavenumber, potentially explaining cortical columns, working memory bump attractors, and grid cell periodicity in entorhinal cortex.</p>
<p>The <strong>Human Connectome Project</strong> aims to map all ~100 trillion synaptic connections in the human brain. The only complete connectome so far is C. elegans (302 neurons, 7,000 synapses, published 1986 by White et al.). For the human cortex, electron microscopy of a 1 mm³ cube yields ~130 TB of image data (H01 dataset, Google/Harvard 2021); graph-theoretic analysis reveals small-world topology (high clustering, short path lengths), rich-club organisation (highly connected hub regions), and hierarchical modular structure. These properties are disrupted in Alzheimer\'s disease, schizophrenia, and autism spectrum disorder.</p>`,
   facts:[{e:'🔬',t:'A 1 mm³ cube of human cortex contains ~57,000 cells, ~230 mm of blood vessels, and ~1.5 km of axons — all in a volume smaller than a grain of sand.'},{e:'🌐',t:'The human brain operates at roughly 20 W — equivalent to a dim light bulb — yet outperforms any existing computer on pattern recognition tasks.'},{e:'💡',t:'Hebbian plasticity, spike-timing-dependent plasticity (STDP), and the backpropagation algorithm in deep learning are all formally equivalent under certain conditions.'}],
   formula:{rows:[
    {n:'Hodgkin-Huxley',e:'C_m dV/dt  =  −g_Na m³h(V−E_Na) − g_K n⁴(V−E_K) − g_L(V−E_L) + I'},
    {n:'Gating variable',e:'dm/dt  =  α_m(V)(1−m) − β_m(V)·m'},
    {sep:1},
    {n:'Neural field eq.',e:'τ ∂u/∂t  =  −u  +  ∫ w(x−y)·F[u(y)]dy  +  I'},
    {n:'Turing instability',e:'ŵ(k*)  >  0  for some  k* ≠ 0'},
    {sep:1},
    {n:'Integrate-and-fire',e:'C dV/dt  =  −(V−V_rest)/R  +  I   (fire when V ≥ V_thr)'},
   ]},sim:'neuro'},
 }},

(function buildGrid(){
  const main=document.getElementById('mainGrid');
  const groups={};
  S.forEach(s=>{if(!groups[s.group])groups[s.group]=[];groups[s.group].push(s);});
  let gi=0;
  for(const[grp,subs] of Object.entries(groups)){
    const lbl=document.createElement('div');lbl.className='glbl';lbl.textContent=grp;main.appendChild(lbl);
    const grid=document.createElement('div');grid.className='cgrid';
    subs.forEach((s,si)=>{
      const c=document.createElement('div');c.className='scard';c.tabIndex=0;
      c.innerHTML=`<div class="sc-stripe" style="background:linear-gradient(90deg,${s.color},${s.color}88)"></div>
<div class="sc-body">
  <div class="sc-emoji" style="background:${s.light}">${s.emoji}</div>
  <div class="sc-tag" style="background:${s.light};color:${s.color}">${s.group.replace(/^./,'').trim()}</div>
  <div class="sc-title">${s.title}</div>
  <div class="sc-teaser">${s.teaser}</div>
</div>
<div class="sc-foot">
  <div class="sc-chips">${s.chips.map(ch=>`<span class="chip">${ch}</span>`).join('')}</div>
  <span class="sc-arr" style="color:${s.color}">→</span>
</div>`;
      c.addEventListener('click',()=>openModal(s));
      c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openModal(s);});
      grid.appendChild(c);
      setTimeout(()=>c.classList.add('vis'),120+(gi*4+si)*65);
    });
    main.appendChild(grid);gi++;
  }
})();

const OV=document.getElementById('ov');

function openModal(s, refresh=false){
  ACTIVE=s;
  stopSims();

  const lc=s.lvls[LVL];
  document.getElementById('pico').textContent=s.emoji;
  document.getElementById('pico').style.background=s.light;
  document.getElementById('ptitle').textContent=s.title;
  document.getElementById('psub').textContent=
    s.group.replace(/^./,'').trim()+' · '+{junior:'Junior 🌱',student:'Student 🔬',scholar:'Scholar 🎓'}[LVL];
  document.getElementById('psub').style.color=s.color;

  // Tabs
  const tabsEl=document.getElementById('ptabs');
  tabsEl.innerHTML=['Discover','Simulate','Go Deeper'].map((t,i)=>
    `<button class="ptab${i===0?' on':''}" data-i="${i}">${t}</button>`
  ).join('');
  tabsEl.querySelectorAll('.ptab').forEach(btn=>{
    if(btn.classList.contains('on')){btn.style.color=s.color;btn.style.borderBottomColor=s.color;}
    btn.addEventListener('click',function(){
      tabsEl.querySelectorAll('.ptab').forEach(b=>{b.classList.remove('on');b.style.color='';b.style.borderBottomColor='';});
      this.classList.add('on');this.style.color=s.color;this.style.borderBottomColor=s.color;
      document.querySelectorAll('.tpanel').forEach(p=>p.classList.remove('on'));
      document.getElementById('tp_'+s.id+'_'+this.dataset.i).classList.add('on');
    });
  });

  const body=document.getElementById('pbody');
  body.innerHTML='';

  // Tab 0 — Discover
  const t0=newEl('div','tpanel on','tp_'+s.id+'_0');
  const eb=newEl('div','eblock');
  eb.style.cssText=`background:${s.light};border:1.5px solid ${s.color}22`;
  eb.innerHTML=`<div class="eicon">${lc.icon}</div><div class="etitle" style="color:${s.color}">${lc.title}</div><div class="ebody">${lc.body}</div>`;
  t0.appendChild(eb);
  if(lc.formula){
    const fs=newEl('div','fsec');
    fs.innerHTML='<div class="flbl">Key Formulas</div>';
    const fb=newEl('div','fbox');
    lc.formula.rows.forEach(r=>{
      if(r.sep){const d=newEl('div','fsep');fb.appendChild(d);return;}
      const row=newEl('div','frow');
      row.innerHTML=`<span class="fname">${r.n}</span><span class="feq">${r.e}</span><span class="fcmt">${r.c||''}</span>`;
      fb.appendChild(row);
    });
    fs.appendChild(fb);t0.appendChild(fs);
  }
  if(lc.facts&&lc.facts.length){
    const fg=newEl('div','facts');
    lc.facts.forEach(f=>{
      const fc=newEl('div','fact');
      fc.innerHTML=`<div class="fact-e">${f.e}</div><div class="fact-t">${f.t}</div>`;
      fg.appendChild(fc);
    });
    t0.appendChild(fg);
  }
  body.appendChild(t0);

  // Tab 1 — Simulate (built after append so container has width)
  const t1=newEl('div','tpanel','tp_'+s.id+'_1');
  const sh=newEl('div','sim-hint');sh.textContent='🕹️ Interactive simulation — use the controls below to explore';
  t1.appendChild(sh);
  body.appendChild(t1);
  requestAnimationFrame(()=>requestAnimationFrame(()=>buildSim(s.id,t1,s.color,LVL)));

  // Tab 2 — Go Deeper
  const t2=newEl('div','tpanel','tp_'+s.id+'_2');
  t2.appendChild(buildDeeper(s,LVL));
  body.appendChild(t2);

  if(!refresh){
    OV.classList.add('open');
    document.body.style.overflow='hidden';
    PANEL.scrollTop=0;body.scrollTop=0;
  }
}

function buildDeeper(s,lvl){
  const links={

function newEl(tag,cls,id){const e=document.createElement(tag);if(cls)e.className=cls;if(id)e.id=id;return e;}

// SIMULATION ENGINE
// Key rule: canvas is sized ONCE. Controls live OUTSIDE canvas wrapper.
// No layout-triggering calls inside rAF.
// ═══════════════════════════════════════════════════════════════════
const SIMS={};
function stopSims(){
  for(const k in SIMS){
    const s=SIMS[k];
    if(s.raf) cancelAnimationFrame(s.raf);
    if(s.timer) clearTimeout(s.timer);
    if(s.int) clearInterval(s.int);
    delete SIMS[k];
  }
}

// Setup canvas with fixed W×H, scaled for DPR. Returns {canvas,ctx,W,H,dpr}
function mkCanvas(container, W, H){
  const dpr=window.devicePixelRatio||1;
  const wrap=newEl('div','sim-canvas-wrap');
  wrap.style.width=W+'px'; wrap.style.height=H+'px';
  const c=document.createElement('canvas');
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  wrap.appendChild(c);
  container.appendChild(wrap);
  return{canvas:c,ctx,W,H,dpr};
}

// Controls row (sibling of canvas wrap, inside container)
function mkCtrl(container){
  const d=newEl('div','sim-controls');
  container.appendChild(d);
  return d;
}
function mkPills(container){const d=newEl('div','sim-pills');container.appendChild(d);return d;}
function pill(lbl){
  const d=newEl('div','spill');d.innerHTML=lbl+': <b>—</b>';
  return{el:d,set(v){d.querySelector('b').textContent=v}};
}
function mkBtn(txt,pri=false,clr=''){
  const b=newEl('button','cbtn'+(pri?' pri':''));
  b.textContent=txt;
  if(pri&&clr)b.style.background=clr;
  return b;
}
function mkRange(ctrl,lbl,min,max,val,step,clr){
  const w=newEl('div','rng-wrap'); const top=newEl('div','rng-top');
  const l=newEl('span','rng-lbl');l.textContent=lbl;
  const v=newEl('span','rng-v');v.textContent=val;if(clr)v.style.color=clr;
  top.appendChild(l);top.appendChild(v);
  const inp=document.createElement('input');inp.type='range';
  inp.min=min;inp.max=max;inp.value=val;inp.step=step||1;
  w.appendChild(top);w.appendChild(inp);
  ctrl.appendChild(w);
  inp.addEventListener('input',()=>{v.textContent=parseFloat(inp.value).toFixed(step<1?2:0);});
  return{inp,v,get val(){return+inp.value}};
}

function getSimWidth(container){
  // Use the panel body width, capped at 800
  const w=document.getElementById('pbody').offsetWidth||500;
  return Math.min(w-4,820);
}

/* ── ORBIT ── */
function simOrbit(container,color,lvl){
  // 1. Fallback colore: se color è null o non è una stringa, usa un default
  const safeColor = (typeof color === 'string' && color.startsWith('#')) ? color : '#3b82f6';
  // 2. Inizializzazione sicura dell'oggetto globale
  window.SIMS = window.SIMS || {};
  if (window.SIMS.orbit?.raf) cancelAnimationFrame(window.SIMS.orbit.raf);
  const W=getSimWidth(container),H=290;
  const {canvas,ctx}=mkCanvas(container,W,H);
  if (!canvas.parentNode) container.appendChild(canvas);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pPer=pill('Period'); const pVel=pill('Speed');
  pRow.appendChild(pPer.el); pRow.appendChild(pVel.el);
  const rR=mkRange(ctrl,'Orbit Radius',40,130,80,1,color);
  const rM=mkRange(ctrl,'Star Mass',0.5,5,2,0.1,color);

  let angle=0, trail=[];
  const S=SIMS.orbit={raf:null};

  rR.inp.addEventListener('input',()=>trail=[]);
  rM.inp.addEventListener('input',()=>trail=[]);

  function frame(){
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2, r=rR.val, m=rM.val;
    const spd=Math.sqrt(m*900/r);
    angle+=spd/r*0.016;
    const px=cx+r*Math.cos(angle), py=cy+r*Math.sin(angle);
    trail.push({x:px,y:py}); if(trail.length>220)trail.shift();

    // Star glow
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,40+m*9);
    g.addColorStop(0,'rgba(255,200,60,0.4)');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,40+m*9,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Orbit ring
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1.5;ctx.stroke();
    // Trail
    for(let i=1;i<trail.length;i++){
      const t=i/trail.length;
      const hex=Math.round(t*150+30).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);
      ctx.strokeStyle=color+hex;ctx.lineWidth=2;ctx.stroke();
    }
    // Star
    ctx.beginPath();ctx.arc(cx,cy,9+m*2.5,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    // Planet
    ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(px,py,13,0,Math.PI*2);ctx.fillStyle=color+'33';ctx.fill();
    // Gravity arrow
    const dx=cx-px,dy=cy-py,dl=Math.sqrt(dx*dx+dy*dy);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+dx/dl*22,py+dy/dl*22);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2.5;ctx.stroke();

    pPer.set(((2*Math.PI*r)/spd).toFixed(1)+'s');
    pVel.set(spd.toFixed(1)+' u/s');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── WAVES ── */
function simWaves(container,color){
  const W=getSimWidth(container),H=260;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pType=pill('Interference'); const pAmp=pill('Max amplitude');
  pRow.appendChild(pType.el); pRow.appendChild(pAmp.el);
  const rF=mkRange(ctrl,'Frequency 2',0.5,3,1,0.05,color);
  const rP=mkRange(ctrl,'Phase Shift',0,6.28,0,0.05,color);

  let t=0;
  const S=SIMS.waves={raf:null};

  function frame(){
    ctx.clearRect(0,0,W,H);
    const cy=H/2, A=Math.min(H/2-8,50);
    const f2=rF.val, ph=rP.val;

    // Centre line
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);
    ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=1;ctx.stroke();

    // Wave 1
    ctx.beginPath();
    for(let x=0;x<W;x++){const xi=x/W*Math.PI*8;const y=cy+A*Math.sin(xi-t);x?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle=color+'88';ctx.lineWidth=2;ctx.stroke();

    // Wave 2
    ctx.beginPath();
    for(let x=0;x<W;x++){const xi=x/W*Math.PI*8;const y=cy+A*Math.sin(f2*xi-t+ph);x?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle='rgba(124,58,237,0.55)';ctx.lineWidth=2;ctx.stroke();

    // Superposition
    let maxA=0;
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const xi=x/W*Math.PI*8;
      const sum=A*Math.sin(xi-t)+A*Math.sin(f2*xi-t+ph);
      if(Math.abs(sum)>maxA)maxA=Math.abs(sum);
      x?ctx.lineTo(x,cy+sum):ctx.moveTo(x,cy+sum);
    }
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();

    pType.set(maxA>A*1.6?'Constructive ✓':maxA<A*0.4?'Destructive ✗':'Partial ~');
    pAmp.set((maxA/A).toFixed(2)+'×');
    t+=0.04; S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── THERMODYNAMICS ── */
function simThermo(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pHits=pill('Wall hits/s'); const pAvg=pill('Avg speed');
  pRow.appendChild(pHits.el); pRow.appendChild(pAvg.el);
  const rT=mkRange(ctrl,'Temperature (K)',50,1200,300,10,color);
  const rN=mkRange(ctrl,'Particles',5,90,30,5,color);

  let particles=[], wallHits=0, frames=0;
  function initP(){
    particles=[];
    const n=rN.val;
    for(let i=0;i<n;i++) particles.push({
      x:18+Math.random()*(W-36),y:18+Math.random()*(H-36),
      vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3
    });
  }
  rN.inp.addEventListener('input',initP);
  initP();

  const S=SIMS.thermo={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(10,10,W-20,H-20);
    const sc=Math.sqrt(rT.val/300)*2;
    let tv=0;
    for(const p of particles){
      p.x+=p.vx*sc; p.y+=p.vy*sc;
      if(p.x<15){p.vx=Math.abs(p.vx);wallHits++;}
      if(p.x>W-15){p.vx=-Math.abs(p.vx);wallHits++;}
      if(p.y<15){p.vy=Math.abs(p.vy);wallHits++;}
      if(p.y>H-15){p.vy=-Math.abs(p.vy);wallHits++;}
      p.x=Math.max(15,Math.min(W-15,p.x));
      p.y=Math.max(15,Math.min(H-15,p.y));
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)*sc; tv+=spd;
      const h=Math.max(0,220-rT.val*0.18);
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fillStyle=`hsl(${h},76%,58%)`;ctx.fill();
    }
    frames++;
    if(frames%30===0){
      pHits.set(wallHits);
      pAvg.set((tv/particles.length).toFixed(2)+' u/s');
      wallHits=0;
    }
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── GALTON BOARD ── */
function simGalton(container,color){
  const W=getSimWidth(container),H=300;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pTot=pill('Total balls'); const pMean=pill('Mean bin');
  pRow.appendChild(pTot.el); pRow.appendChild(pMean.el);

  const bDrop=mkBtn('▶ Drop balls',true,color);
  const bReset=mkBtn('↺ Reset');
  const rRows=mkRange(ctrl,'Rows of pegs',4,10,7,1,color);
  ctrl.prepend(bReset); ctrl.prepend(bDrop);

  let numRows=7, bins, balls=[], total=0, dropping=false, dropInt;
  function reset(){bins=new Array(numRows+1).fill(0);balls=[];total=0;pTot.set('0');pMean.set('—');}
  reset();

  rRows.inp.addEventListener('input',()=>{numRows=rRows.val;reset();});
  bDrop.addEventListener('click',()=>{
    dropping=!dropping;
    bDrop.textContent=dropping?'⏸ Stop':'▶ Drop balls';
    if(dropping)dropInt=setInterval(()=>{
      balls.push({x:W/2,y:6,row:0,col:0,vy:0,hue:180+Math.random()*70});
    },120);
    else clearInterval(dropInt);
  });
  bReset.addEventListener('click',()=>{
    dropping=false;clearInterval(dropInt);bDrop.textContent='▶ Drop balls';reset();
  });

  function pp(r,c){
    const sp=Math.min(24,(W-60)/(numRows+1));
    const sy=(H-90)/(numRows+2);
    return{x:W/2+(c-r/2)*sp, y:26+r*sy};
  }

  const S=SIMS.prob={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    // Pegs
    for(let r=0;r<=numRows;r++) for(let c=0;c<=r;c++){
      const p=pp(r,c);
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();
    }
    // Bins
    const maxB=Math.max(...bins,1);
    const lastY=pp(numRows,0).y+14;
    const maxBH=H-lastY-8;
    const bw=Math.min(22,(W-60)/(numRows+1));
    for(let i=0;i<=numRows;i++){
      const p=pp(numRows,i), bx=p.x-bw/2;
      // Gaussian ghost
      const g=Math.exp(-0.5*Math.pow((i-numRows/2)/(numRows*0.2),2));
      ctx.fillStyle=color+'18'; ctx.fillRect(bx,H-8-g*maxBH,bw-2,g*maxBH);
      // Data bar
      if(bins[i]>0){
        const bh=(bins[i]/maxB)*maxBH;
        ctx.fillStyle=color+'cc'; ctx.fillRect(bx,H-8-bh,bw-2,bh);
      }
      ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;
      ctx.strokeRect(bx,lastY,bw-2,maxBH);
    }
    // Animate balls
    const alive=[];
    for(const b of balls){
      b.vy+=0.65; b.y+=b.vy;
      if(b.row<=numRows){
        const pin=pp(b.row,b.col);
        if(b.y>=pin.y){b.vy=2.5;b.col+=(Math.random()<.5?1:0);b.row++;b.x=pp(b.row,b.col).x+(Math.random()-.5)*3;}
      }
      if(b.row>numRows&&b.y>H-10){
        bins[b.col]++; total++;
        pTot.set(total);
        pMean.set((bins.reduce((s,v,i)=>s+v*i,0)/total).toFixed(2));
      } else {
        ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);
        ctx.fillStyle=`hsl(${b.hue},76%,55%)`;ctx.fill();
        alive.push(b);
      }
    }
    balls=alive;
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── MANDELBROT ── */
function simFractal(container,color,lvl){
  const W=getSimWidth(container),H=300;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pZoom=pill('Zoom level'); pRow.appendChild(pZoom.el);
  let maxIter=lvl==='junior'?50:lvl==='student'?90:160;
  const rI=mkRange(ctrl,'Detail (iterations)',20,240,maxIter,5,color);
  const bR=mkBtn('↺ Reset view');
  ctrl.appendChild(bR);

  let cx=-0.5,cy=0,zoom=Math.min(W,H)*0.44, dirty=true;

  rI.inp.addEventListener('input',()=>{maxIter=rI.val;dirty=true;});
  bR.addEventListener('click',()=>{cx=-0.5;cy=0;zoom=Math.min(W,H)*0.44;pZoom.set('1×');dirty=true;});

  canvas.style.cursor='crosshair';
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/(rect.width*dpr), sy=canvas.height/(rect.height*dpr);
    const mx=(e.clientX-rect.left)*dpr*sx/dpr;
    const my=(e.clientY-rect.top)*dpr*sy/dpr;
    cx+=(mx-W/2)/zoom; cy+=(my-H/2)/zoom;
    zoom*=2.2;
    pZoom.set((zoom/(Math.min(W,H)*0.44)).toFixed(1)+'×');
    dirty=true;
  });

  function drawM(){
    const RW=W*dpr, RH=H*dpr;
    const id=ctx.createImageData(RW,RH);
    const d=id.data;
    for(let py=0;py<RH;py++){
      for(let px=0;px<RW;px++){
        const cr=(px/dpr-W/2)/zoom+cx, ci=(py/dpr-H/2)/zoom+cy;
        let zr=0,zi=0,it=0;
        while(it<maxIter&&zr*zr+zi*zi<4){const t=zr*zr-zi*zi+cr;zi=2*zr*zi+ci;zr=t;it++;}
        const idx=(py*RW+px)*4;
        if(it===maxIter){d[idx]=10;d[idx+1]=8;d[idx+2]=20;d[idx+3]=255;}
        else{
          const t=it/maxIter;
          d[idx]=Math.round(9+230*Math.pow(Math.sin(t*3.14),1.5));
          d[idx+1]=Math.round(220*Math.pow(Math.sin(t*3.14+2.1),1.5));
          d[idx+2]=Math.round(30+220*Math.pow(Math.sin(t*3.14+4.2),1.5));
          d[idx+3]=255;
        }
      }
    }
    ctx.putImageData(id,0,0);
    // overlay hint
    ctx.save();ctx.scale(1/dpr,1/dpr);
    ctx.font=`bold ${13*dpr}px Nunito,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText('Click anywhere to zoom in',10*dpr,(H-10)*dpr);
    ctx.restore();
    dirty=false;
  }

  const S=SIMS.fractal={raf:null};
  function frame(){if(dirty)drawM();S.raf=requestAnimationFrame(frame);}
  frame();
}

/* ── GAME OF LIFE ── */
function simLife(container,color){
  const W=getSimWidth(container),H=290;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pGen=pill('Generation'); const pAlive=pill('Alive cells');
  pRow.appendChild(pGen.el); pRow.appendChild(pAlive.el);

  const bTog=mkBtn('⏸ Pause');bTog.style.cssText=`border-color:${color};color:${color}`;
  const bClear=mkBtn('✕ Clear');
  const bRand=mkBtn('⚡ Random');
  const bGlider=mkBtn('🛸 Glider',true,color);
  [bTog,bClear,bRand,bGlider].forEach(b=>ctrl.appendChild(b));

  const CELL=9;
  const cols=Math.floor(W/CELL), rows=Math.floor(H/CELL);
  let grid=new Uint8Array(cols*rows), next=new Uint8Array(cols*rows);
  let running=true, gen=0;

  const idx=(r,c)=>r*cols+c;
  const N=(r,c)=>{ let n=0; for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;n+=grid[idx((r+dr+rows)%rows,(c+dc+cols)%cols)];}return n;};

  function randomize(){for(let i=0;i<grid.length;i++)grid[i]=Math.random()<0.28?1:0;gen=0;}
  function clearG(){grid.fill(0);gen=0;}
  function glider(r,c){[[0,1],[1,2],[2,0],[2,1],[2,2]].forEach(([dr,dc])=>{if(r+dr<rows&&c+dc<cols)grid[idx(r+dr,c+dc)]=1;});}
  function step(){
    let alive=0;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const n=N(r,c), cur=grid[idx(r,c)];
      next[idx(r,c)]=(cur&&(n===2||n===3))||(!cur&&n===3)?1:0;
      if(next[idx(r,c)])alive++;
    }
    [grid,next]=[next,grid];gen++;
    pGen.set(gen);pAlive.set(alive);
  }

  bTog.addEventListener('click',()=>{running=!running;bTog.textContent=running?'⏸ Pause':'▶ Play';});
  bClear.addEventListener('click',clearG);
  bRand.addEventListener('click',randomize);
  bGlider.addEventListener('click',()=>{clearG();glider(2,2);glider(3,Math.floor(cols/2));glider(Math.floor(rows/2),Math.floor(cols/3));});
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const c2=Math.floor((e.clientX-rect.left)/CELL), r2=Math.floor((e.clientY-rect.top)/CELL);
    if(r2>=0&&r2<rows&&c2>=0&&c2<cols) grid[idx(r2,c2)]^=1;
  });
  randomize();

  const S=SIMS.life={raf:null,timer:null};
  function frame(){
    ctx.fillStyle='#f4f9f4';ctx.fillRect(0,0,W*dpr,H*dpr);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(!grid[idx(r,c)])continue;
      ctx.fillStyle=color+'e0';
      ctx.fillRect((c*CELL+1)*dpr,(r*CELL+1)*dpr,(CELL-2)*dpr,(CELL-2)*dpr);
    }
    if(running) step();
    S.timer=setTimeout(()=>{S.raf=requestAnimationFrame(frame);},72);
  }
  frame();
}

/* ── SORTING ── */
function simSorting(container,color){
  const W=getSimWidth(container),H=260;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pAlgo=pill('Algorithm'); const pComp=pill('Comparisons'); const pSwap=pill('Swaps');
  pRow.appendChild(pAlgo.el); pRow.appendChild(pComp.el); pRow.appendChild(pSwap.el);

  const bBubble=mkBtn('Bubble Sort',true,color);
  const bMerge=mkBtn('Merge Sort');
  const bRand=mkBtn('↺ Shuffle');
  const rN=mkRange(ctrl,'Array size',10,80,40,5,color);
  [bBubble,bMerge,bRand].forEach(b=>ctrl.prepend(b));

  let arr=[], n=40, gen=null, active=false, comps=0, swaps=0;
  function shuffle(){n=rN.val;arr=Array.from({length:n},()=>Math.floor(Math.random()*95)+5);comps=0;swaps=0;active=false;gen=null;pComp.set(0);pSwap.set(0);}

  function* bubble(a){
    for(let i=0;i<a.length;i++) for(let j=0;j<a.length-i-1;j++){
      comps++;if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;}
      yield;
    }
  }
  function* merge(a){
    function*ms(l,r){
      if(l>=r)return;const m=(l+r)>>1;yield*ms(l,m);yield*ms(m+1,r);
      const L=a.slice(l,m+1),R=a.slice(m+1,r+1);
      let i=0,j=0,k=l;
      while(i<L.length&&j<R.length){comps++;if(L[i]<=R[j])a[k++]=L[i++];else{a[k++]=R[j++];swaps++;}yield;}
      while(i<L.length){a[k++]=L[i++];yield;}
      while(j<R.length){a[k++]=R[j++];yield;}
    }
    yield*ms(0,a.length-1);
  }

  bBubble.addEventListener('click',()=>{shuffle();pAlgo.set('Bubble O(n²)');gen=bubble(arr);active=true;});
  bMerge.addEventListener('click',()=>{shuffle();pAlgo.set('Merge O(n log n)');gen=merge(arr);active=true;});
  bRand.addEventListener('click',shuffle);
  rN.inp.addEventListener('input',shuffle);
  shuffle();

  const S=SIMS.sorting={raf:null,timer:null};
  function frame(){
    ctx.clearRect(0,0,W*dpr,H*dpr);
    const bw=W/arr.length;
    arr.forEach((v,i)=>{
      const bh=(v/100)*(H-12)*dpr;
      ctx.fillStyle=`hsl(${210+i*120/arr.length},65%,55%)`;
      ctx.fillRect(i*bw*dpr,(H-6)*dpr-bh,Math.max(1,(bw-1.5)*dpr),bh);
    });
    if(active&&gen){
      const steps=gen===bubble?4:10;
      for(let i=0;i<steps;i++){const r=gen.next();if(r.done){active=false;break;}}
      pComp.set(comps);pSwap.set(swaps);
    }
    S.timer=setTimeout(()=>{S.raf=requestAnimationFrame(frame);},16);
  }
  frame();
}

/* ── CLIMATE ── */
function simClimate(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pCO2=pill('CO₂'); const pF=pill('Forcing'); const pDT=pill('ΔT');
  pRow.appendChild(pCO2.el); pRow.appendChild(pF.el); pRow.appendChild(pDT.el);

  const rC=mkRange(ctrl,'CO₂ concentration (ppm)',280,800,280,5,color);
  const bPre=mkBtn('↺ Pre-industrial (280)');
  const bNow=mkBtn('Set to 2024 (420)',true,color);
  ctrl.appendChild(bPre); ctrl.appendChild(bNow);

  bPre.addEventListener('click',()=>{rC.inp.value=280;rC.v.textContent='280';});
  bNow.addEventListener('click',()=>{rC.inp.value=420;rC.v.textContent='420';});

  let t=0;
  const S=SIMS.climate={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    t+=0.03;
    const co2=rC.val;
    const dF=5.35*Math.log(co2/280);
    const dT=dF*0.8;

    // Sky gradient
    const skyH=H*0.72;
    const g=ctx.createLinearGradient(0,0,0,skyH);
    const warmth=Math.min((co2-280)/520,1);
    g.addColorStop(0,`hsl(${200-warmth*30},${60+warmth*20}%,${70-warmth*15}%)`);
    g.addColorStop(1,`hsl(${200-warmth*20},40%,85%)`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,skyH);

    // Ground
    const groundH=H*0.28;
    const gh=ctx.createLinearGradient(0,skyH,0,H);
    gh.addColorStop(0,`hsl(${120-warmth*40},${50+warmth*10}%,${35-warmth*8}%)`);
    gh.addColorStop(1,`hsl(${100-warmth*40},40%,25%)`);
    ctx.fillStyle=gh;ctx.fillRect(0,skyH,W,groundH);

    // Sun
    const sx=W*0.12,sy=H*0.17;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,25);
    sg.addColorStop(0,'rgba(255,240,80,1)');sg.addColorStop(1,'rgba(255,200,50,0)');
    ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fillStyle='#fbbf24';ctx.fill();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2+t*0.3;ctx.beginPath();ctx.moveTo(sx+26*Math.cos(a),sy+26*Math.sin(a));ctx.lineTo(sx+36*Math.cos(a),sy+36*Math.sin(a));ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.5;ctx.stroke();}

    // Atmosphere layer (thicker = more CO₂)
    const atmoAlpha=0.08+(warmth*0.38);
    const atmoY=H*0.24, atmoH=H*0.16;
    ctx.fillStyle=`rgba(100,180,80,${atmoAlpha})`;
    ctx.fillRect(0,atmoY,W,atmoH);
    ctx.font='bold 11px Nunito,sans-serif';ctx.fillStyle=`rgba(0,80,0,${0.4+atmoAlpha})`;ctx.textAlign='center';
    ctx.fillText(`Atmosphere  CO₂: ${co2} ppm`,W/2,atmoY+atmoH*0.62);

    // Incoming solar rays (yellow dots)
    for(let i=0;i<5;i++){
      const prog=(t*0.38+i*0.2)%1;
      const rx=W*0.2+W*0.6*(i/4.5);const ry=sy+prog*(skyH*0.88-sy);
      ctx.beginPath();ctx.arc(rx,ry,3.5,0,Math.PI*2);ctx.fillStyle='rgba(255,220,40,0.85)';ctx.fill();
    }

    // Outgoing IR rays (orange) — some trapped
    for(let i=0;i<5;i++){
      const prog=(t*0.3+i*0.2)%1;
      const rx=W*0.25+W*0.5*(i/4.5);const ry=skyH-prog*(skyH*0.75);
      const trapped=warmth>0.3&&Math.random()<warmth*0.7;
      ctx.beginPath();ctx.arc(rx,ry,3.5,0,Math.PI*2);
      ctx.fillStyle=trapped?'rgba(255,80,30,0.85)':'rgba(255,160,60,0.65)';ctx.fill();
    }

    // Labels
    ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 12px Nunito,sans-serif';
    ctx.fillText('🟡 Solar radiation',W*0.02,H*0.55);
    ctx.fillStyle='rgba(255,120,50,0.9)';
    ctx.fillText('🔴 Trapped IR heat',W*0.02,H*0.62);

    // Ground label
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='center';ctx.font='bold 11px Nunito,sans-serif';
    ctx.fillText(`Earth surface — ΔT: ${dT>0?'+':''}${dT.toFixed(2)} °C vs pre-industrial`,W/2,H*0.88);

    pCO2.set(co2+' ppm');pF.set(dF.toFixed(2)+' W/m²');pDT.set((dT>0?'+':'')+dT.toFixed(2)+'°C');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}
/* ── CHEMISTRY SIM ── */
function simChem(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pMol=pill('Molecules'); const pTemp=pill('Temp');
  pRow.appendChild(pMol.el); pRow.appendChild(pTemp.el);
  const rT=mkRange(ctrl,'Temperature',1,10,5,1,color);
  const bReset=mkBtn('↺ Reset',true,color);
  ctrl.appendChild(bReset);
  const ATOMS=[];
  const TYPES=[
    {sym:'H',r:10,col:'#ef4444'},{sym:'O',r:14,col:'#3b82f6'},
    {sym:'C',r:13,col:'#6b7280'},{sym:'N',r:12,col:'#8b5cf6'}
  ];
  function init(){
    ATOMS.length=0;
    for(let i=0;i<28;i++){
      const t=TYPES[Math.floor(Math.random()*TYPES.length)];
      ATOMS.push({x:t.r+Math.random()*(W-2*t.r),y:t.r+Math.random()*(H-2*t.r),
        vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,
        r:t.r,sym:t.sym,col:t.col,bond:null});
    }
  }
  bReset.addEventListener('click',init);
  init();
  const S=SIMS.chem={raf:null};
  let molCount=0;
  function frame(){
    const spd=rT.val/5;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,W,H);
    // draw bonds
    ATOMS.forEach(a=>{
      if(a.bond&&a.bond>a){
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(a.bond.x,a.bond.y);
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.stroke();
      }
    });
    // move & draw
    molCount=0;
    ATOMS.forEach(a=>{
      a.vx+=((Math.random()-.5)*0.4)*spd;
      a.vy+=((Math.random()-.5)*0.4)*spd;
      const maxV=4*spd;
      const v=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      if(v>maxV){a.vx=a.vx/v*maxV;a.vy=a.vy/v*maxV;}
      if(a.bond){a.x+=(a.bond.x+(a.r+a.bond.r+2)*Math.cos(Math.atan2(a.y-a.bond.y,a.x-a.bond.x))-a.x)*.12+a.vx*.15;}
      else{a.x+=a.vx;a.y+=a.vy;}
      if(a.x<a.r){a.x=a.r;a.vx=Math.abs(a.vx);}
      if(a.x>W-a.r){a.x=W-a.r;a.vx=-Math.abs(a.vx);}
      if(a.y<a.r){a.y=a.r;a.vy=Math.abs(a.vy);}
      if(a.y>H-a.r){a.y=H-a.r;a.vy=-Math.abs(a.vy);}
      // bonding
      if(!a.bond&&spd<4){
        for(const b of ATOMS){
          if(b===a||b.bond)continue;
          const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
          if(d<(a.r+b.r+8)&&Math.random()<0.01*(5-spd)){a.bond=b;b.bond=a;break;}
        }
      } else if(a.bond&&Math.random()<0.005*spd){a.bond.bond=null;a.bond=null;}
      // draw
      ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle=a.col;ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(a.r)}px Nunito,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(a.sym,a.x,a.y);
      if(a.bond)molCount++;
    });
    pMol.set(Math.floor(molCount/2)+' bonds');
    pTemp.set(Math.round(rT.val*100)+'K');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── ASTRONOMY SIM ── */
function simAstro(container,color){
  const W=getSimWidth(container),H=300;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pAge=pill('Age'); const pStage=pill('Stage');
  pRow.appendChild(pAge.el); pRow.appendChild(pStage.el);
  const rMass=mkRange(ctrl,'Star Mass (solar masses)',0.5,20,1,0.5,color);
  const bReset=mkBtn('↺ Reset star',true,color);
  ctrl.appendChild(bReset);
  let t=0; let tOffset=0;
  bReset.addEventListener('click',()=>{t=0;tOffset=Date.now();});
  const S=SIMS.astro={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    // starfield
    ctx.fillStyle='#000814';ctx.fillRect(0,0,W,H);
    for(let i=0;i<80;i++){
      const sx=(i*137.5)%W,sy=(i*97.3)%H;
      ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.3+0.5*(i%3)/3})`;ctx.fill();
    }
    t+=0.012;
    const M=rMass.val;
    const life=10/Math.pow(M,3); // Gyr
    const phase=t%(life*4);
    const frac=phase/(life*4);
    let stage,radius,r,g,b;
    if(frac<0.6){stage='Main Sequence';radius=20*Math.pow(M,0.8);r=M>3?100:255;g=M>3?150:220;b=M>3?255:80;}
    else if(frac<0.75){stage='Red Giant';radius=50+60*(frac-0.6)/0.15;r=220;g=80;b=40;}
    else if(M>8&&frac<0.85){stage='Supergiant';radius=80;r=255;g=60;b=20;}
    else if(M>8&&frac<0.88){stage='💥 Supernova!';radius=120*(1-(frac-0.85)/0.03);r=255;g=200;b=100;}
    else if(M>8){stage=M>15?'Black Hole':'Neutron Star';radius=M>15?0:5;r=20;g=20;b=20;}
    else if(frac<0.9){stage='Planetary Nebula';radius=55;r=150;g=100;b=220;}
    else{stage='White Dwarf';radius=8;r=200;g=220;b=255;}
    const cx=W/2,cy=H/2;
    // nebula glow for supernova/nebula
    if(stage.includes('Supernova')||stage==='Planetary Nebula'){
      const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,radius*1.5);
      gr.addColorStop(0,`rgba(${r},${g},${b},0.5)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(cx,cy,radius*1.5,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    }
    if(radius>0){
      const gr=ctx.createRadialGradient(cx-radius*.3,cy-radius*.3,0,cx,cy,radius);
      gr.addColorStop(0,`rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`);
      gr.addColorStop(0.6,`rgb(${r},${g},${b})`);
      gr.addColorStop(1,`rgba(${Math.floor(r*.5)},${Math.floor(g*.5)},${Math.floor(b*.5)},0.3)`);
      ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    } else {
      // accretion disk for BH
      ctx.beginPath();ctx.ellipse(cx,cy,40,8,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,140,0,0.6)';ctx.lineWidth=3;ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
    }
    // corona rays for main sequence
    if(stage==='Main Sequence'){
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2+t*0.5;
        ctx.beginPath();ctx.moveTo(cx+(radius+4)*Math.cos(a),cy+(radius+4)*Math.sin(a));
        ctx.lineTo(cx+(radius+14)*Math.cos(a),cy+(radius+14)*Math.sin(a));
        ctx.strokeStyle=`rgba(${r},${g},${b},0.4)`;ctx.lineWidth=2;ctx.stroke();
      }
    }
    // HR position dot
    const hrX=W*.82, hrY=H*.1, hrW=W*.15, hrH=H*.82;
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(hrX,hrY,hrW,hrH);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(hrX,hrY,hrW,hrH);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px Nunito,sans-serif';ctx.textAlign='center';
    ctx.fillText('H-R',hrX+hrW/2,hrY+10);
    const tx=hrX+(1-Math.min(M,20)/20)*hrW;
    const ty=hrY+Math.min(M/20,1)*hrH;
    ctx.beginPath();ctx.arc(tx,ty,4,0,Math.PI*2);
    ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fill();
    const ageGyr=(frac*life*4).toFixed(1);
    pAge.set(ageGyr+' Gyr');pStage.set(stage);
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── CALCULUS SIM ── */
function simCalculus(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pDeriv=pill('f′(x)'); const pInteg=pill('∫f dx');
  pRow.appendChild(pDeriv.el); pRow.appendChild(pInteg.el);
  const rX=mkRange(ctrl,'x position',-3,3,0,0.1,color);
  const rN=mkRange(ctrl,'Riemann rectangles',2,40,8,1,color);
  const S=SIMS.calculus={raf:null};
  const PAD=40, PW=W-PAD*2, PH=H-PAD*2;
  function f(x){return Math.sin(x)+0.4*x;}
  function df(x){return Math.cos(x)+0.4;}
  function toC(x,y){return{px:PAD+((x+4)/8)*PW, py:PAD+((2-y)/4)*PH};}
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,W,H);
    // axes
    const o=toC(0,0);
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD,o.py);ctx.lineTo(W-PAD,o.py);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.px,PAD);ctx.lineTo(o.px,H-PAD);ctx.stroke();
    // axis labels
    ctx.fillStyle='#64748b';ctx.font='11px Nunito,sans-serif';ctx.textAlign='center';
    for(let xi=-3;xi<=3;xi++){const p=toC(xi,0);ctx.fillText(xi,p.px,p.py+14);}
    // Riemann rectangles
    const n=rN.val; const a=-3,b=3, dx=(b-a)/n;
    let area=0;
    for(let i=0;i<n;i++){
      const xi=a+i*dx; const yi=f(xi+dx/2); area+=yi*dx;
      const p1=toC(xi,Math.max(0,yi)), p2=toC(xi+dx,0);
      const p1b=toC(xi,Math.min(0,yi));
      const ph=Math.abs(toC(xi,yi).py-o.py);
      ctx.fillStyle=yi>=0?'rgba(99,102,241,0.2)':'rgba(239,68,68,0.15)';
      ctx.fillRect(Math.min(toC(xi,0).px,toC(xi+dx,0).px), Math.min(toC(xi,yi).py,o.py), Math.abs(toC(xi+dx,0).px-toC(xi,0).px), ph);
      ctx.strokeStyle=yi>=0?'rgba(99,102,241,0.5)':'rgba(239,68,68,0.4)';ctx.lineWidth=0.5;
      ctx.strokeRect(Math.min(toC(xi,0).px,toC(xi+dx,0).px), Math.min(toC(xi,yi).py,o.py), Math.abs(toC(xi+dx,0).px-toC(xi,0).px), ph);
    }
    // function curve
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
    for(let xi=-4;xi<=4;xi+=0.05){const p=toC(xi,f(xi));xi===-4?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py);}
    ctx.stroke();
    // tangent line at x
    const xv=rX.val, yv=f(xv), slope=df(xv);
    const p0=toC(xv,yv);
    ctx.beginPath();ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([6,3]);
    const x1=xv-1.5,x2=xv+1.5;
    const p1=toC(x1,yv+slope*(x1-xv)), p2=toC(x2,yv+slope*(x2-xv));
    ctx.moveTo(p1.px,p1.py);ctx.lineTo(p2.px,p2.py);ctx.stroke();ctx.setLineDash([]);
    // point

}
