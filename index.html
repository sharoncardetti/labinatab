/* ── PARTICLE PHYSICS SIM ── */
function simParticles(container,color){
  const W=getSimWidth(container),H=290;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pColl=pill('Collisions'); const pEnergy=pill('Energy');
  pRow.appendChild(pColl.el); pRow.appendChild(pEnergy.el);
  const rE=mkRange(ctrl,'Beam energy (TeV)',0.5,14,7,0.5,color);
  const bCollide=mkBtn('💥 Collide!',true,color);
  ctrl.appendChild(bCollide);
  const particles=[];
  let collisions=0; let t=0;
  const QUARKS=[{n:'u',c:'#ef4444'},{n:'d',c:'#3b82f6'},{n:'s',c:'#10b981'},
                {n:'g',c:'#f59e0b'},{n:'e⁻',c:'#8b5cf6'},{n:'γ',c:'#fbbf24'},
                {n:'ν',c:'rgba(200,200,255,0.8)'},{n:'H',c:'#ec4899'}];
  function spawnDecay(cx,cy,energy){
    const n=4+Math.floor(energy/2);
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2;
      const spd=2+Math.random()*4*(energy/7);
      const q=QUARKS[Math.floor(Math.random()*QUARKS.length)];
      particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        r:q.n==='H'?8:4+Math.random()*3,col:q.c,sym:q.n,life:80+Math.random()*60,age:0});
    }
    collisions++;
  }
  // initial particles
  function init(){
    particles.length=0;
    for(let i=0;i<30;i++){
      const q=QUARKS[Math.floor(Math.random()*5)];
      particles.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,
        r:4,col:q.c,sym:q.n,life:999,age:0});
    }
  }
  bCollide.addEventListener('click',()=>{
    spawnDecay(W/2,H/2,rE.val);
    // two beams
    particles.push({x:0,y:H/2,vx:18,vy:0,r:6,col:'rgba(99,102,241,0.9)',sym:'p',life:30,age:0});
    particles.push({x:W,y:H/2,vx:-18,vy:0,r:6,col:'rgba(239,68,68,0.9)',sym:'p̄',life:30,age:0});
  });
  init();
  const S=SIMS.particles={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);
    // detector rings
    const cx=W/2,cy=H/2;
    [60,100,140].forEach((r,i)=>{
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(30,58,138,${0.2+i*.1})`;ctx.lineWidth=8;ctx.stroke();
    });
    t++;
    // update & draw particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.99; p.vy*=0.99;
      p.age++;
      if(p.age>p.life||p.x<-20||p.x>W+20||p.y<-20||p.y>H+20){particles.splice(i,1);continue;}
      const alpha=Math.min(1,(p.life-p.age)/20);
      // trail
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*4,p.y-p.vy*4);
      ctx.strokeStyle=p.col.replace(')',`,${alpha*.5})`).replace('rgb','rgba');
      ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font=`bold ${p.r+1}px Nunito,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=alpha;
      ctx.fillText(p.sym,p.x,p.y);ctx.globalAlpha=1;
    }
    // auto random decay
    if(t%120===0) spawnDecay(cx+(Math.random()-.5)*40,cy+(Math.random()-.5)*40,rE.val*.3);
    pColl.set(collisions);pEnergy.set(rE.val+' TeV');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── GRAPH THEORY SIM ── */
function simGraphs(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pInfected = pill('Reached'); const pSteps = pill('Steps'); const pClustr = pill('Hubs');
  pRow.appendChild(pInfected.el); pRow.appendChild(pSteps.el); pRow.appendChild(pClustr.el);

  const rNodes = mkRange(ctrl, 'Nodes', 10, 40, 22, 1, color);
  const rHubs  = mkRange(ctrl, 'Hub connections', 1, 6, 3, 1, color);
  const bSpread = mkBtn('▶ Spread signal', true, color);
  const bReset  = mkBtn('↺ New graph');
  ctrl.appendChild(bSpread); ctrl.appendChild(bReset);

  let nodes = [], edges = [], spreading = false, step = 0, timer = null;

  function buildGraph() {
    spreading = false; step = 0;
    if (timer) { clearInterval(timer); timer = null; }
    nodes = []; edges = [];
    const n = rNodes.val;
    const margin = 36;
    for (let i = 0; i < n; i++) {
      nodes.push({
        x: margin + Math.random() * (W - margin * 2),
        y: margin + Math.random() * (H - margin * 2),
        state: 'S', // S=susceptible I=infected R=recovered
        deg: 0, isHub: false
      });
    }
    // Barabási-Albert preferential attachment
    const hubK = rHubs.val;
    const edgeSet = new Set();
    function addEdge(a, b) {
      if (a === b) return;
      const key = Math.min(a,b) + '_' + Math.max(a,b);
      if (!edgeSet.has(key)) { edgeSet.add(key); edges.push([a, b]); nodes[a].deg++; nodes[b].deg++; }
    }
    // seed with small clique
    for (let i = 0; i < Math.min(4, n); i++)
      for (let j = i+1; j < Math.min(4, n); j++) addEdge(i, j);
    // attach new nodes preferentially
    for (let i = 4; i < n; i++) {
      const totalDeg = nodes.slice(0, i).reduce((s, nd) => s + nd.deg + 1, 0);
      const targets = new Set();
      let attempts = 0;
      while (targets.size < Math.min(hubK, i) && attempts < 200) {
        let r = Math.random() * totalDeg, cum = 0;
        for (let j = 0; j < i; j++) {
          cum += nodes[j].deg + 1;
          if (r <= cum) { targets.add(j); break; }
        }
        attempts++;
      }
      targets.forEach(j => addEdge(i, j));
    }
    // mark hubs (top 15% by degree)
    const sorted = [...nodes].sort((a, b) => b.deg - a.deg);
    const hubThresh = sorted[Math.floor(n * 0.15)].deg;
    nodes.forEach(nd => { nd.isHub = nd.deg >= hubThresh && hubThresh > 0; });
    pInfected.set('0 / ' + n); pSteps.set(0); pClustr.set(nodes.filter(nd => nd.isHub).length);
  }

  function startSpread() {
    if (spreading) return;
    nodes.forEach(nd => nd.state = 'S');
    // infect a random hub if possible, else random node
    const hubs = nodes.filter(nd => nd.isHub);
    const seed = hubs.length ? hubs[Math.floor(Math.random() * hubs.length)] : nodes[Math.floor(Math.random() * nodes.length)];
    seed.state = 'I';
    step = 0; spreading = true;
    timer = setInterval(() => {
      step++;
      // BFS-style spread: each infected node tries to infect neighbours
      const newlyInfected = [];
      edges.forEach(([a, b]) => {
        if (nodes[a].state === 'I' && nodes[b].state === 'S' && Math.random() < 0.55) newlyInfected.push(b);
        if (nodes[b].state === 'I' && nodes[a].state === 'S' && Math.random() < 0.55) newlyInfected.push(a);
      });
      newlyInfected.forEach(i => nodes[i].state = 'I');
      // some infected → recovered
      nodes.forEach(nd => { if (nd.state === 'I' && Math.random() < 0.18) nd.state = 'R'; });
      const inf = nodes.filter(nd => nd.state === 'I').length;
      const rec = nodes.filter(nd => nd.state === 'R').length;
      pInfected.set((inf + rec) + ' / ' + nodes.length);
      pSteps.set(step);
      if (inf === 0) { spreading = false; clearInterval(timer); timer = null; }
    }, 320);
  }

  bSpread.addEventListener('click', startSpread);
  bReset.addEventListener('click', buildGraph);
  rNodes.inp.addEventListener('input', buildGraph);
  rHubs.inp.addEventListener('input', buildGraph);
  buildGraph();

  // ── physics layout (force-directed) ──────────────────────────────
  const vx = [], vy = [];
  nodes.forEach(() => { vx.push(0); vy.push(0); });

  const S = SIMS.graphs = { raf: null };

  function frame() {
    // force-directed layout (runs every frame for smooth settling)
    const k = 60, rep = 2800, damp = 0.82;
    nodes.forEach((a, i) => {
      let fx = 0, fy = 0;
      // repulsion
      nodes.forEach((b, j) => {
        if (i === j) return;
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx * dx + dy * dy) + 0.1;
        const f = rep / (d * d);
        fx += (dx / d) * f; fy += (dy / d) * f;
      });
      // attraction along edges
      edges.forEach(([p, q]) => {
        const other = p === i ? q : q === i ? p : -1;
        if (other < 0) return;
        const dx = nodes[other].x - a.x, dy = nodes[other].y - a.y;
        const d = Math.sqrt(dx * dx + dy * dy) + 0.1;
        const f = (d - k) * 0.03;
        fx += (dx / d) * f; fy += (dy / d) * f;
      });
      // centre pull
      fx += (W / 2 - a.x) * 0.004; fy += (H / 2 - a.y) * 0.004;
      vx[i] = (vx[i] + fx) * damp; vy[i] = (vy[i] + fy) * damp;
    });
    nodes.forEach((nd, i) => {
      nd.x = Math.max(24, Math.min(W - 24, nd.x + vx[i]));
      nd.y = Math.max(24, Math.min(H - 24, nd.y + vy[i]));
    });

    // ── draw ─────────────────────────────────────────────────────
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    // edges
    edges.forEach(([a, b]) => {
      const na = nodes[a], nb = nodes[b];
      const active = na.state !== 'S' || nb.state !== 'S';
      ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = active ? 'rgba(251,191,36,0.35)' : 'rgba(148,163,184,0.18)';
      ctx.lineWidth = active ? 1.8 : 1;
      ctx.stroke();
    });

    // nodes
    nodes.forEach(nd => {
      const r = nd.isHub ? 13 : 8;
      // glow for hubs
      if (nd.isHub) {
        ctx.beginPath(); ctx.arc(nd.x, nd.y, r + 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(8,145,178,0.18)'; ctx.fill();
      }
      const fill =
        nd.state === 'I' ? '#f59e0b' :
        nd.state === 'R' ? '#10b981' :
        nd.isHub ? color : '#475569';
      ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2);
      ctx.fillStyle = fill; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.2; ctx.stroke();
      // degree label on hubs
      if (nd.isHub) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px Nunito,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(nd.deg, nd.x, nd.y);
      }
    });

    // legend
    const leg = [['#f59e0b','Infected'],['#10b981','Recovered'],['#475569','Susceptible'],[color,'Hub']];
    leg.forEach(([c, lbl], i) => {
      ctx.beginPath(); ctx.arc(14, 14 + i * 18, 5, 0, Math.PI * 2);
      ctx.fillStyle = c; ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '10px Nunito,sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(lbl, 24, 14 + i * 18);
    });

    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── DNA SIM ── */
function simDNA(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pPairs = pill('Base pairs copied'); const pErrors = pill('Mutations');
  pRow.appendChild(pPairs.el); pRow.appendChild(pErrors.el);
  const rSpeed = mkRange(ctrl, 'Replication speed', 1, 8, 3, 1, color);
  const bReset = mkBtn('↺ Reset', true, color);
  ctrl.appendChild(bReset);

  const BASES = ['A','T','C','G'];
  const PAIR  = {A:'T', T:'A', C:'G', G:'C'};
  const BCOL  = {A:'#ef4444', T:'#3b82f6', C:'#10b981', G:'#f59e0b'};
  const NSTRANDS = 28;
  let strand = [], progress = 0, errors = 0, copied = 0;

  function init() {
    strand = [];
    for (let i = 0; i < NSTRANDS; i++) {
      const b = BASES[Math.floor(Math.random() * 4)];
      strand.push({ base: b, complement: PAIR[b], copied: false, error: false });
    }
    progress = 0; errors = 0; copied = 0;
  }
  bReset.addEventListener('click', init);
  init();

  let t = 0;
  const S = SIMS.dna = { raf: null };

  function frame() {
    t++;
    // advance replication fork
    const spd = rSpeed.val;
    if (t % Math.max(1, Math.round(8 / spd)) === 0 && progress < NSTRANDS) {
      // rare mutation
      if (Math.random() < 0.04) { strand[progress].error = true; errors++; }
      strand[progress].copied = true;
      progress++;
      copied++;
    }

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const yStart = 24, yEnd = H - 24;
    const slotH = (yEnd - yStart) / NSTRANDS;
    const helix_amp = 28;
    const fork = progress / NSTRANDS; // 0..1

    for (let i = 0; i < NSTRANDS; i++) {
      const y = yStart + i * slotH + slotH / 2;
      const phase = (i / NSTRANDS) * Math.PI * 4 + t * 0.04;
      const opened = i < progress;
      const spread = opened ? 1 : 0;

      // helix strands
      const xL = cx - helix_amp * Math.cos(phase);
      const xR = cx + helix_amp * Math.cos(phase);

      // separation (unzipping)
      const openAmt = opened ? helix_amp * 1.6 : 0;
      const xL2 = cx - helix_amp * Math.cos(phase) - openAmt;
      const xR2 = cx + helix_amp * Math.cos(phase) + openAmt;

      const bd = strand[i];
      const col = BCOL[bd.base];
      const colC = BCOL[bd.complement];

      if (!opened) {
        // draw rungs (hydrogen bonds)
        ctx.beginPath(); ctx.moveTo(xL, y); ctx.lineTo(xR, y);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
        // base circles
        ctx.beginPath(); ctx.arc(xL, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = col; ctx.fill();
        ctx.beginPath(); ctx.arc(xR, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = colC; ctx.fill();
        // letters
        ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Nunito,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(bd.base, xL, y);
        ctx.fillText(bd.complement, xR, y);
      } else {
        // opened — draw new complementary bases appearing
        const errCol = '#a855f7';
        // original strands
        ctx.beginPath(); ctx.arc(xL2, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = col; ctx.fill();
        ctx.beginPath(); ctx.arc(xR2, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = colC; ctx.fill();
        // new complementary (copy)
        ctx.beginPath(); ctx.arc(xL2 + 18, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = bd.error ? errCol : colC; ctx.fill();
        ctx.beginPath(); ctx.arc(xR2 - 18, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = bd.error ? errCol : col; ctx.fill();
        // letters
        ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Nunito,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(bd.base, xL2, y);
        ctx.fillText(bd.complement, xR2, y);
        ctx.fillText(bd.error ? '?' : bd.complement, xL2 + 18, y);
        ctx.fillText(bd.error ? '?' : bd.base, xR2 - 18, y);
        // dashed bond lines
        ctx.setLineDash([3, 3]);
        ctx.beginPath(); ctx.moveTo(xL2, y); ctx.lineTo(xL2 + 14, y);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(xR2, y); ctx.lineTo(xR2 - 14, y);
        ctx.stroke(); ctx.setLineDash([]);
      }
    }

    // replication fork indicator
    if (progress < NSTRANDS) {
      const fy = yStart + progress * slotH;
      ctx.beginPath(); ctx.moveTo(cx - 60, fy); ctx.lineTo(cx + 60, fy);
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 10px Nunito,sans-serif';
      ctx.textAlign = 'center'; ctx.fillText('← replication fork →', cx, fy - 6);
    }

    // reset when done
    if (progress >= NSTRANDS && t % 140 === 0) init();

    pPairs.set(copied); pErrors.set(errors);
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── EVOLUTION SIM ── */
function simEvolution(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pGen = pill('Generation'); const pFit = pill('Avg fitness'); const pDiv = pill('Diversity');
  pRow.appendChild(pGen.el); pRow.appendChild(pFit.el); pRow.appendChild(pDiv.el);
  const rSel = mkRange(ctrl, 'Selection pressure', 0, 10, 5, 1, color);
  const rMut = mkRange(ctrl, 'Mutation rate', 0, 10, 3, 1, color);
  const bReset = mkBtn('↺ Reset', true, color);
  ctrl.appendChild(bReset);

  // Each individual: hue (trait) + fitness derived from environment optimum
  const N = 60;
  let pop = [], gen = 0, envHue = 120; // environment optimum hue (green = forest)
  let envDrift = 0.3;

  function initPop() {
    pop = [];
    gen = 0;
    for (let i = 0; i < N; i++) {
      pop.push({ hue: Math.random() * 360, x: 20 + Math.random() * (W - 40), y: 50 + Math.random() * (H - 80), vx: (Math.random() - .5) * .8, vy: (Math.random() - .5) * .8 });
    }
  }
  bReset.addEventListener('click', initPop);
  initPop();

  function hueDist(a, b) { const d = Math.abs(a - b) % 360; return Math.min(d, 360 - d); }
  function fitness(ind) { return Math.max(0, 1 - hueDist(ind.hue, envHue) / 180); }

  let frameCount = 0;
  const S = SIMS.evolution = { raf: null };

  function frame() {
    frameCount++;
    ctx.clearRect(0, 0, W, H);

    // environment background gradient
    const envR = Math.round(Math.sin(envHue * Math.PI / 180) * 40 + 30);
    const envG = Math.round(Math.cos((envHue - 120) * Math.PI / 180) * 40 + 60);
    ctx.fillStyle = `hsl(${envHue}, 35%, 14%)`; ctx.fillRect(0, 0, W, H);

    // env label
    ctx.fillStyle = `hsl(${envHue}, 70%, 70%)`;
    ctx.font = 'bold 11px Nunito,sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('Environment optimum:', 10, 18);
    ctx.beginPath(); ctx.arc(210, 13, 7, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${envHue}, 80%, 55%)`; ctx.fill();

    // slowly drift environment
    envHue = (envHue + envDrift + 360) % 360;
    if (Math.random() < 0.005) envDrift = (Math.random() - .5) * 1.2;

    // generational update every 38 frames
    if (frameCount % 38 === 0) {
      gen++;
      const sel = rSel.val / 10;
      const mut = rMut.val / 10;
      // compute fitnesses
      const fits = pop.map(fitness);
      const totalFit = fits.reduce((a, b) => a + b, 0) || 1;
      // selection: weighted sampling
      const newPop = [];
      for (let i = 0; i < N; i++) {
        let r = Math.random() * totalFit, cum = 0, picked = pop[0];
        for (let j = 0; j < N; j++) {
          cum += fits[j] * sel + (1 - sel) * (totalFit / N);
          if (r <= cum) { picked = pop[j]; break; }
        }
        // mutation
        const newHue = (picked.hue + (Math.random() - .5) * 60 * mut + 360) % 360;
        newPop.push({ hue: newHue, x: 20 + Math.random() * (W - 40), y: 50 + Math.random() * (H - 80), vx: (Math.random() - .5) * .8, vy: (Math.random() - .5) * .8 });
      }
      pop = newPop;
    }

    // move & draw individuals
    let totalFit = 0, hues = [];
    pop.forEach(ind => {
      ind.x += ind.vx; ind.y += ind.vy;
      if (ind.x < 14 || ind.x > W - 14) ind.vx *= -1;
      if (ind.y < 34 || ind.y > H - 14) ind.vy *= -1;
      const f = fitness(ind);
      totalFit += f;
      hues.push(ind.hue);
      const r = 5 + f * 5;
      ctx.beginPath(); ctx.arc(ind.x, ind.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${ind.hue}, 80%, ${40 + f * 30}%)`;
      ctx.globalAlpha = 0.5 + f * 0.5;
      ctx.fill(); ctx.globalAlpha = 1;
    });

    // diversity = std dev of hues (circular)
    const meanHue = hues.reduce((a, b) => a + b, 0) / hues.length;
    const diversity = Math.sqrt(hues.reduce((s, h) => s + hueDist(h, meanHue) ** 2, 0) / hues.length);

    pGen.set(gen);
    pFit.set((totalFit / N).toFixed(2));
    pDiv.set(Math.round(diversity) + '°');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── ECOSYSTEM SIM ── */
function simEcosystem(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pPlants = pill('🌿 Plants'); const pHerb = pill('🐇 Herbivores'); const pPred = pill('🦊 Predators');
  pRow.appendChild(pPlants.el); pRow.appendChild(pHerb.el); pRow.appendChild(pPred.el);
  const rGrowth = mkRange(ctrl, 'Plant growth rate', 1, 10, 5, 1, color);
  const rPred = mkRange(ctrl, 'Predator efficiency', 1, 10, 4, 1, color);
  const bReset = mkBtn('↺ Reset', true, color);
  ctrl.appendChild(bReset);

  // Agent-based: plants (green), herbivores (orange), predators (red)
  let agents = [], time = 0;

  function initAgents() {
    agents = []; time = 0;
    for (let i = 0; i < 60; i++) agents.push({ type: 'plant', x: Math.random() * W, y: Math.random() * H, energy: 1, age: 0 });
    for (let i = 0; i < 18; i++) agents.push({ type: 'herb',  x: Math.random() * W, y: Math.random() * H, energy: 8, vx: (Math.random()-.5)*1.4, vy: (Math.random()-.5)*1.4, age: 0 });
    for (let i = 0; i < 6;  i++) agents.push({ type: 'pred',  x: Math.random() * W, y: Math.random() * H, energy: 12, vx: (Math.random()-.5)*1.8, vy: (Math.random()-.5)*1.8, age: 0 });
  }
  bReset.addEventListener('click', initAgents);
  initAgents();

  const S = SIMS.ecosystem = { raf: null };

  function frame() {
    time++;
    ctx.clearRect(0, 0, W, H);
    // background
    ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, 0, W, H);

    const growthR = rGrowth.val / 10;
    const predEff = rPred.val / 10;

    // spawn new plants
    if (time % Math.round(18 / growthR) === 0 && agents.filter(a => a.type === 'plant').length < 120) {
      agents.push({ type: 'plant', x: Math.random() * W, y: Math.random() * H, energy: 1, age: 0 });
    }

    const toRemove = new Set();
    const toAdd = [];

    agents.forEach((a, i) => {
      a.age++;
      if (a.type === 'plant') {
        // draw plant
        const g = Math.min(1, a.age / 60);
        ctx.beginPath(); ctx.arc(a.x, a.y, 3 + g * 2, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(120, ${50 + g * 30}%, ${25 + g * 20}%)`; ctx.fill();
      } else {
        // move
        a.vx += (Math.random() - .5) * .3;
        a.vy += (Math.random() - .5) * .3;
        const maxV = a.type === 'pred' ? 2.2 : 1.6;
        const spd = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
        if (spd > maxV) { a.vx = a.vx / spd * maxV; a.vy = a.vy / spd * maxV; }
        a.x = (a.x + a.vx + W) % W; a.y = (a.y + a.vy + H) % H;
        a.energy -= 0.04;
        if (a.energy <= 0 || a.age > 600) { toRemove.add(i); return; }

        // eat
        if (a.type === 'herb') {
          for (let j = 0; j < agents.length; j++) {
            if (toRemove.has(j)) continue;
            const b = agents[j];
            if (b.type !== 'plant') continue;
            const dx = b.x - a.x, dy = b.y - a.y;
            if (dx * dx + dy * dy < 100) { a.energy += 4; toRemove.add(j); break; }
          }
          if (a.energy > 16 && Math.random() < 0.008) {
            toAdd.push({ type: 'herb', x: a.x + (Math.random()-.5)*10, y: a.y + (Math.random()-.5)*10, energy: 8, vx: (Math.random()-.5)*1.4, vy: (Math.random()-.5)*1.4, age: 0 });
            a.energy -= 6;
          }
        }
        if (a.type === 'pred') {
          for (let j = 0; j < agents.length; j++) {
            if (toRemove.has(j)) continue;
            const b = agents[j];
            if (b.type !== 'herb') continue;
            const dx = b.x - a.x, dy = b.y - a.y;
            if (dx * dx + dy * dy < 144) { a.energy += 8 * predEff; toRemove.add(j); break; }
          }
          if (a.energy > 20 && Math.random() < 0.006) {
            toAdd.push({ type: 'pred', x: a.x + (Math.random()-.5)*10, y: a.y + (Math.random()-.5)*10, energy: 12, vx: (Math.random()-.5)*1.8, vy: (Math.random()-.5)*1.8, age: 0 });
            a.energy -= 10;
          }
        }

        // draw animal
        const r = a.type === 'pred' ? 7 : 5;
        const fc = a.type === 'pred' ? `hsl(0,75%,${40+a.energy}%)` : `hsl(35,80%,${40+a.energy*.8}%)`;
        ctx.beginPath(); ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
        ctx.fillStyle = fc; ctx.fill();
        // energy bar
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(a.x - r, a.y - r - 4, r * 2, 2);
        ctx.fillStyle = a.type === 'pred' ? '#ef4444' : '#f59e0b';
        ctx.fillRect(a.x - r, a.y - r - 4, r * 2 * Math.min(1, a.energy / 20), 2);
      }
    });

    // rebuild agents array
    const newAgents = agents.filter((_, i) => !toRemove.has(i));
    newAgents.push(...toAdd);
    agents.length = 0; agents.push(...newAgents);

    const nP = agents.filter(a => a.type === 'plant').length;
    const nH = agents.filter(a => a.type === 'herb').length;
    const nPr = agents.filter(a => a.type === 'pred').length;

    pPlants.set(nP); pHerb.set(nH); pPred.set(nPr);

    // trophic collapse warning
    if (nH === 0 || nPr === 0) {
      ctx.fillStyle = 'rgba(239,68,68,0.85)'; ctx.font = 'bold 13px Nunito,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(nH === 0 ? '⚠️ Herbivores extinct — ecosystem collapse!' : '⚠️ Predators gone — herbivore explosion!', W / 2, H / 2);
    }

    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── MACHINE LEARNING SIM ── */
function simML(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pEpoch = pill('Epoch'); const pLoss = pill('Loss'); const pAcc = pill('Accuracy');
  pRow.appendChild(pEpoch.el); pRow.appendChild(pLoss.el); pRow.appendChild(pAcc.el);
  const rLR   = mkRange(ctrl, 'Learning rate', 1, 10, 4, 1, color);
  const rHid  = mkRange(ctrl, 'Hidden units',  2, 12, 5, 1, color);
  const bReset = mkBtn('↺ Reset', true, color);
  ctrl.appendChild(bReset);

  // XOR-style dataset: 4 clusters
  function makeData() {
    const pts = [];
    const centres = [[0.25,0.25,0],[0.75,0.75,0],[0.25,0.75,1],[0.75,0.25,1]];
    centres.forEach(([cx,cy,lbl]) => {
      for (let i = 0; i < 18; i++)
        pts.push({ x: cx + (Math.random()-.5)*.28, y: cy + (Math.random()-.5)*.28, lbl });
    });
    return pts;
  }

  // Tiny 2→H→1 network
  let W1, b1, W2, b2, epoch, loss, data;
  function sigmoid(z) { return 1/(1+Math.exp(-z)); }
  function initNet() {
    const H = rHid.val;
    W1 = Array.from({length:H}, ()=>[Math.random()*.8-.4, Math.random()*.8-.4]);
    b1 = Array.from({length:H}, ()=>Math.random()*.4-.2);
    W2 = Array.from({length:H}, ()=>Math.random()*.8-.4);
    b2 = [Math.random()*.2-.1];
    epoch = 0; loss = 1; data = makeData();
  }
  bReset.addEventListener('click', initNet);
  rHid.inp.addEventListener('input', initNet);
  initNet();

  function forward(x, y) {
    const H = rHid.val;
    const h = W1.map((w,i) => sigmoid(w[0]*x + w[1]*y + b1[i]));
    const o = sigmoid(h.reduce((s,hi,i) => s + W2[i]*hi, b2[0]));
    return { h, o };
  }

  function trainStep() {
    const lr = rLR.val * 0.015;
    const H = rHid.val;
    let totalLoss = 0;
    // mini-batch = full data
    data.forEach(pt => {
      const { h, o } = forward(pt.x, pt.y);
      const err = o - pt.lbl;
      totalLoss += err * err;
      // output layer gradient
      const dO = err * o * (1-o);
      // hidden layer gradients
      const dH = W2.map((w,i) => dO * w * h[i] * (1-h[i]));
      // update output weights
      W2 = W2.map((w,i) => w - lr * dO * h[i]);
      b2[0] -= lr * dO;
      // update hidden weights
      W1 = W1.map((w,i) => [w[0] - lr*dH[i]*pt.x, w[1] - lr*dH[i]*pt.y]);
      b1 = b1.map((b,i) => b - lr*dH[i]);
    });
    loss = Math.sqrt(totalLoss / data.length);
    epoch++;
  }

  const S = SIMS.ml = { raf: null };
  let frameCount = 0;

  function frame() {
    frameCount++;
    // train several steps per frame
    for (let i = 0; i < 4; i++) trainStep();

    ctx.clearRect(0, 0, W, H);
    const PAD = 30, PW = W-PAD*2, PH = H-PAD*2;

    // decision boundary heatmap
    const res = 28;
    for (let i = 0; i < res; i++) {
      for (let j = 0; j < res; j++) {
        const nx = i/res, ny = j/res;
        const { o } = forward(nx, ny);
        const r = Math.round(o*200+30), b2c = Math.round((1-o)*200+30);
        ctx.fillStyle = `rgba(${r},80,${b2c},0.55)`;
        ctx.fillRect(PAD + nx*PW, PAD + ny*PH, PW/res+1, PH/res+1);
      }
    }

    // data points
    let correct = 0;
    data.forEach(pt => {
      const px = PAD + pt.x*PW, py = PAD + pt.y*PH;
      const { o } = forward(pt.x, pt.y);
      const pred = o > 0.5 ? 1 : 0;
      if (pred === pt.lbl) correct++;
      ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2);
      ctx.fillStyle = pt.lbl ? '#f59e0b' : '#6366f1';
      ctx.fill();
      ctx.strokeStyle = pred===pt.lbl ? '#fff' : '#ef4444';
      ctx.lineWidth = 2; ctx.stroke();
    });

    // network diagram (right side overlay)
    const nx0 = W - 90, ny0 = H/2;
    const layers = [2, rHid.val, 1];
    const xPos = [nx0, nx0+28, nx0+56];
    const nodeR = 5;
    ctx.globalAlpha = 0.7;
    layers.forEach((n, li) => {
      const yOff = H/(n+1);
      for (let i = 0; i < n; i++) {
        const ny2 = yOff*(i+1);
        if (li < layers.length-1) {
          const nextN = layers[li+1];
          const nextYOff = H/(nextN+1);
          for (let j = 0; j < nextN; j++) {
            ctx.beginPath();
            ctx.moveTo(xPos[li], ny2);
            ctx.lineTo(xPos[li+1], nextYOff*(j+1));
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1; ctx.stroke();
          }
        }
        ctx.beginPath(); ctx.arc(xPos[li], ny2, nodeR, 0, Math.PI*2);
        ctx.fillStyle = li===0?'#6366f1':li===1?color:'#f59e0b';
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;

    const acc = Math.round(correct/data.length*100);
    pEpoch.set(epoch); pLoss.set(loss.toFixed(3)); pAcc.set(acc+'%');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── CRYPTOGRAPHY SIM ── */
function simCrypto(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pStep = pill('Step'); const pKey = pill('Shared key');
  pRow.appendChild(pStep.el); pRow.appendChild(pKey.el);
  const bStart = mkBtn('▶ Run DH exchange', true, color);
  const bReset = mkBtn('↺ Reset');
  ctrl.appendChild(bStart); ctrl.appendChild(bReset);

  // Diffie-Hellman with small numbers for visualisation
  const p = 23, g = 5;
  let state = 'idle', step = 0, animT = 0;
  let alicePriv, bobPriv, alicePub, bobPub, sharedA, sharedB;
  let msgX = -1, msgY = -1, msgTx = -1, msgTy = -1, msgProg = 0, msgLabel = '';
  let msgCol = '#fff', msgs = [];

  function reset() {
    state = 'idle'; step = 0; animT = 0; msgs = [];
    alicePriv = 2 + Math.floor(Math.random()*8);
    bobPriv   = 2 + Math.floor(Math.random()*8);
    alicePub  = Math.pow(g, alicePriv) % p;
    bobPub    = Math.pow(g, bobPriv)   % p;
    sharedA   = Math.pow(bobPub,   alicePriv) % p;
    sharedB   = Math.pow(alicePub, bobPriv)   % p;
  }
  reset();

  bStart.addEventListener('click', () => { if (state==='idle'||state==='done') { reset(); state='running'; step=0; } });
  bReset.addEventListener('click', () => { reset(); });

  const STEPS = [
    () => ({ from:'alice', to:'public', label:`g=${g}, p=${p}`, col:'#94a3b8', note:'Public parameters agreed' }),
    () => ({ from:'alice', to:'bob',    label:`A = g^a mod p = ${alicePub}`, col:'#818cf8', note:`Alice sends public key A=${alicePub}` }),
    () => ({ from:'bob',   to:'alice',  label:`B = g^b mod p = ${bobPub}`,   col:'#34d399', note:`Bob sends public key B=${bobPub}` }),
    () => ({ from:'alice', to:'alice',  label:`K = B^a mod p = ${sharedA}`,  col:'#fbbf24', note:`Alice computes shared key` }),
    () => ({ from:'bob',   to:'bob',    label:`K = A^b mod p = ${sharedB}`,  col:'#fbbf24', note:`Bob computes shared key` }),
  ];

  const S = SIMS.crypto = { raf: null };
  let frameCount = 0;

  function frame() {
    frameCount++; animT++;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    const aliceX = 80, bobX = W-80, midY = H/2, personR = 28;

    // draw public channel bar
    ctx.fillStyle = 'rgba(148,163,184,0.08)';
    ctx.fillRect(aliceX+personR+5, midY-14, bobX-aliceX-personR*2-10, 28);
    ctx.fillStyle = 'rgba(148,163,184,0.3)';
    ctx.font = '9px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('PUBLIC CHANNEL (eavesdropper can see)', W/2, midY-18);

    // Alice
    ctx.beginPath(); ctx.arc(aliceX, midY, personR, 0, Math.PI*2);
    ctx.fillStyle = '#312e81'; ctx.fill();
    ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Alice', aliceX, midY+4);
    ctx.fillStyle = '#818cf8'; ctx.font = '10px Nunito,sans-serif';
    ctx.fillText(`secret a=${alicePriv}`, aliceX, midY+personR+14);

    // Bob
    ctx.beginPath(); ctx.arc(bobX, midY, personR, 0, Math.PI*2);
    ctx.fillStyle = '#064e3b'; ctx.fill();
    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Nunito,sans-serif';
    ctx.fillText('Bob', bobX, midY+4);
    ctx.fillStyle = '#34d399'; ctx.font = '10px Nunito,sans-serif';
    ctx.fillText(`secret b=${bobPriv}`, bobX, midY+personR+14);

    // Eavesdropper
    const eaveX = W/2, eaveY = 36;
    ctx.beginPath(); ctx.arc(eaveX, eaveY, 16, 0, Math.PI*2);
    ctx.fillStyle = '#450a0a'; ctx.fill();
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#ef4444'; ctx.font = 'bold 9px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Eve', eaveX, eaveY+3);
    ctx.fillStyle = 'rgba(239,68,68,0.5)'; ctx.font = '8px Nunito,sans-serif';
    ctx.fillText('sees everything!', eaveX, eaveY+20);

    // step messages
    msgs.forEach((m, mi) => {
      ctx.fillStyle = m.col;
      ctx.font = 'bold 10px Nunito,sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(m.note, W/2, H-20-mi*16);
    });

    // animate current message packet
    if (state === 'running') {
      if (frameCount % 70 === 0 && step < STEPS.length) {
        const s = STEPS[step]();
        msgs.unshift({ note: s.note, col: s.col });
        if (msgs.length > 4) msgs.pop();
        step++;
        if (step >= STEPS.length) state = 'done';
      }
      // packet animation
      const prog = (frameCount % 70) / 70;
      if (step > 0 && step <= STEPS.length) {
        const s = STEPS[step-1]();
        const fromX = s.from==='alice' ? aliceX : bobX;
        const toX   = s.to==='bob' ? bobX : s.to==='alice' ? aliceX : W/2;
        const px = fromX + (toX - fromX) * prog;
        const py = midY + Math.sin(prog * Math.PI) * -35;
        ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI*2);
        ctx.fillStyle = s.col; ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 7px Nunito,sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(s.label.split('=').pop(), px, py+3);
      }
    }

    if (state === 'done' && sharedA === sharedB) {
      ctx.fillStyle = 'rgba(251,191,36,0.15)';
      ctx.fillRect(aliceX-35, midY-personR-35, 70, 22);
      ctx.fillRect(bobX-35,   midY-personR-35, 70, 22);
      ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 11px Nunito,sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`🔑 K=${sharedA}`, aliceX, midY-personR-20);
      ctx.fillText(`🔑 K=${sharedB}`, bobX,   midY-personR-20);
    }

    pStep.set(step + ' / ' + STEPS.length);
    pKey.set(state==='done' ? sharedA : '?');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── COMPLEXITY SIM ── */
function simComplexity(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pOps = pill('Operations'); const pClass = pill('Class'); const pN = pill('n');
  pRow.appendChild(pOps.el); pRow.appendChild(pClass.el); pRow.appendChild(pN.el);
  const rN    = mkRange(ctrl, 'Input size n', 2, 22, 8, 1, color);
  const rAlgo = mkRange(ctrl, 'Algorithm (1=O(n) … 5=O(2ⁿ))', 1, 5, 2, 1, color);
  const bRun  = mkBtn('▶ Run', true, color);
  ctrl.appendChild(bRun);

  const ALGOS = [
    { name:'O(log n)',  col:'#34d399', ops: n => Math.ceil(Math.log2(n+1)),          ex:'Binary search' },
    { name:'O(n)',      col:'#60a5fa', ops: n => n,                                   ex:'Linear scan' },
    { name:'O(n log n)',col:'#a78bfa', ops: n => Math.ceil(n*Math.log2(n+1)),         ex:'Merge sort' },
    { name:'O(n²)',     col:'#f59e0b', ops: n => n*n,                                 ex:'Bubble sort' },
    { name:'O(2ⁿ)',     col:'#ef4444', ops: n => Math.min(Math.pow(2,n), 1e9),        ex:'Brute force NP' },
  ];

  let running = false, progress = 0, currentOps = 0;
  bRun.addEventListener('click', () => { running = true; progress = 0; currentOps = 0; });

  const S = SIMS.complexity = { raf: null };
  let t = 0;

  function frame() {
    t++;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    const PAD = 48, PW = W-PAD*2, PH = H-PAD*2;
    const n = rN.val;
    const maxN = 22;

    // axes
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, PAD); ctx.lineTo(PAD, PAD+PH); ctx.lineTo(PAD+PW, PAD+PH); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '9px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Input size n →', PAD+PW/2, PAD+PH+16);
    ctx.save(); ctx.translate(12, PAD+PH/2); ctx.rotate(-Math.PI/2);
    ctx.fillText('Operations', 0, 0); ctx.restore();

    // n gridline
    const nX = PAD + (n/maxN)*PW;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(nX, PAD); ctx.lineTo(nX, PAD+PH); ctx.stroke();
    ctx.setLineDash([]);

    // draw all curves
    const selectedIdx = rAlgo.val - 1;
    const maxOps = ALGOS[selectedIdx].ops(maxN) || 1;
    const safeMax = Math.max(maxOps, 1);

    ALGOS.forEach((algo, ai) => {
      ctx.beginPath();
      for (let xi = 1; xi <= maxN; xi++) {
        const ops = algo.ops(xi);
        const px = PAD + (xi/maxN)*PW;
        const py = PAD + PH - Math.min((ops/safeMax)*PH, PH);
        xi === 1 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = ai === selectedIdx ? algo.col : 'rgba(255,255,255,0.12)';
      ctx.lineWidth = ai === selectedIdx ? 2.5 : 1;
      ctx.stroke();

      // label at right end
      const lastOps = algo.ops(maxN);
      const lastY = PAD + PH - Math.min((lastOps/safeMax)*PH, PH);
      ctx.fillStyle = ai === selectedIdx ? algo.col : 'rgba(255,255,255,0.25)';
      ctx.font = ai === selectedIdx ? 'bold 10px Nunito,sans-serif' : '9px Nunito,sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(algo.name, PAD+PW+3, Math.max(PAD+8, Math.min(lastY, PAD+PH-2)));
    });

    // animated dot running along selected curve
    const algo = ALGOS[selectedIdx];
    const totalOps = algo.ops(n);
    if (running) {
      currentOps += Math.max(1, Math.ceil(totalOps/60));
      if (currentOps >= totalOps) { currentOps = totalOps; running = false; }
    }
    const dotOps = running ? currentOps : totalOps;
    const dotX = nX;
    const dotY = PAD + PH - Math.min((dotOps/safeMax)*PH, PH);
    ctx.beginPath(); ctx.arc(dotX, dotY, 7, 0, Math.PI*2);
    ctx.fillStyle = algo.col; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

    // info box
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(PAD+4, PAD+4, 175, 42);
    ctx.fillStyle = algo.col; ctx.font = 'bold 12px Nunito,sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(algo.name + ' — ' + algo.ex, PAD+10, PAD+18);
    ctx.fillStyle = '#cbd5e1'; ctx.font = '10px Nunito,sans-serif';
    ctx.fillText(`n=${n}  →  ${totalOps.toLocaleString()} operations`, PAD+10, PAD+34);

    // complexity class badge
    const cls = selectedIdx <= 2 ? 'P (tractable)' : selectedIdx === 3 ? 'P (slow)' : 'NP-hard ⚠️';
    const clsCol = selectedIdx <= 3 ? '#34d399' : '#ef4444';
    pOps.set(totalOps >= 1e9 ? '>1 billion' : totalOps.toLocaleString());
    pClass.set(cls); pN.set(n);

    // draw class badge on canvas
    ctx.fillStyle = selectedIdx === 4 ? 'rgba(239,68,68,0.15)' : 'rgba(52,211,153,0.1)';
    ctx.fillRect(W-130, PAD+4, 82, 22);
    ctx.fillStyle = clsCol; ctx.font = 'bold 10px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(cls, W-89, PAD+18);

    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── PLATE TECTONICS SIM ── */
function simTectonics(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pStress = pill('Stress'); const pTime = pill('Myr'); const pEvent = pill('Last event');
  pRow.appendChild(pStress.el); pRow.appendChild(pTime.el); pRow.appendChild(pEvent.el);
  const rSpeed = mkRange(ctrl, 'Plate speed', 1, 10, 4, 1, color);
  const rType  = mkRange(ctrl, 'Boundary type (1=diverge 2=transform 3=converge)', 1, 3, 2, 1, color);
  const bQuake = mkBtn('⚡ Trigger quake', true, color);
  ctrl.appendChild(bQuake);

  let stress = 0, myr = 0, lastEvent = 'none', quakeAnim = 0;
  let particles = [];
  for (let i = 0; i < 18; i++)
    particles.push({ x: Math.random()*W, y: 30+Math.random()*(H-60), side: Math.random()<.5?'L':'R', r: 3+Math.random()*3, col: `hsl(${20+Math.random()*30},${50+Math.random()*20}%,${35+Math.random()*20}%)` });

  bQuake.addEventListener('click', () => { stress = 0; quakeAnim = 40; lastEvent = 'M'+(4+Math.floor(Math.random()*4))+'.'+Math.floor(Math.random()*9)+' quake'; });

  const S = SIMS.tectonics = { raf: null };
  let t = 0;

  function frame() {
    t++; myr += 0.001 * rSpeed.val;
    stress = Math.min(100, stress + 0.08 * rSpeed.val);
    if (stress >= 100) { stress = 0; quakeAnim = 35; lastEvent = 'M'+(5+Math.floor(Math.random()*3))+'.'+Math.floor(Math.random()*9)+' quake'; }
    if (quakeAnim > 0) quakeAnim--;

    ctx.clearRect(0, 0, W, H);

    const type = rType.val; // 1=diverge 2=transform 3=converge
    const spd = rSpeed.val * 0.4;
    const midX = W / 2;
    const shake = quakeAnim > 0 ? (Math.random()-.5)*8*(quakeAnim/35) : 0;

    // Left plate
    const lx = shake * -1;
    ctx.fillStyle = '#78350f'; ctx.fillRect(lx, 0, midX+lx, H);
    // Right plate
    const rx = shake;
    ctx.fillStyle = '#92400e'; ctx.fillRect(midX+rx, 0, W-midX, H);

    // plate surface texture
    [lx, rx+midX].forEach((ox, si) => {
      ctx.fillStyle = si===0 ? '#a16207' : '#b45309';
      ctx.fillRect(ox + (si===0?0:0), 0, si===0?midX:W-midX, 22);
    });

    // boundary line
    const bCol = quakeAnim > 0 ? '#ef4444' : type===1?'#f59e0b':type===2?'#60a5fa':'#a855f7';
    ctx.strokeStyle = bCol; ctx.lineWidth = quakeAnim>0?4:2;
    ctx.setLineDash(type===2?[8,6]:[]);
    ctx.beginPath(); ctx.moveTo(midX+shake*.5, 0); ctx.lineTo(midX+shake*.5, H);
    ctx.stroke(); ctx.setLineDash([]);

    // boundary label
    const bLabels = ['','DIVERGENT ←→','TRANSFORM →|←','CONVERGENT →←'];
    ctx.fillStyle = bCol; ctx.font = 'bold 10px Nunito,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(bLabels[type], W/2, H-8);

    // move & draw particles (rock markers)
    particles.forEach(p => {
      if (p.side==='L') {
        p.x += type===1 ? -spd*0.5 : type===3 ? spd*0.3 : 0;
        if (p.x < -20) p.x = midX - 10;
      } else {
        p.x += type===1 ? spd*0.5 : type===3 ? -spd*0.3 : 0;
        if (p.x > W+20) p.x = midX + 10;
      }
      // transform: vertical movement
      if (type===2) { p.y += p.side==='L' ? -spd*0.4 : spd*0.4; if (p.y<10) p.y=H-10; if (p.y>H-10) p.y=10; }
      // quake shake
      const px = p.x + (quakeAnim>0?(Math.random()-.5)*5:0);
      const py = p.y + (quakeAnim>0?(Math.random()-.5)*5:0);
      ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.col; ctx.fill();
    });

    // arrows showing plate motion
    const arrowY = H/2;
    const arrowCol = 'rgba(255,255,255,0.5)';
    const drawArrow = (x1,y,x2) => {
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y);
      ctx.strokeStyle=arrowCol; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); const dir=x2>x1?1:-1;
      ctx.moveTo(x2,y); ctx.lineTo(x2-dir*8,y-5); ctx.lineTo(x2-dir*8,y+5);
      ctx.fillStyle=arrowCol; ctx.fill();
    };
    if (type===1) { drawArrow(midX-20,arrowY,midX-60); drawArrow(midX+20,arrowY,midX+60); }
    else if (type===3) { drawArrow(midX-60,arrowY,midX-20); drawArrow(midX+60,arrowY,midX+20); }
    else { drawArrow(midX-70,arrowY-10,midX-20); drawArrow(midX+20,arrowY+10,midX+70); }

    // stress bar
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(10,10,120,12);
    ctx.fillStyle=`hsl(${120-stress*1.2},80%,50%)`; ctx.fillRect(10,10,stress*1.2,12);
    ctx.fillStyle='#fff'; ctx.font='9px Nunito,sans-serif'; ctx.textAlign='left';
    ctx.fillText('Stress: '+Math.round(stress)+'%', 13, 20);

    // quake flash
    if (quakeAnim > 0) {
      ctx.fillStyle = `rgba(239,68,68,${quakeAnim/35*0.25})`;
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fef3c7'; ctx.font='bold 14px Nunito,sans-serif'; ctx.textAlign='center';
      ctx.fillText('⚡ '+lastEvent, W/2, H/2);
    }

    pStress.set(Math.round(stress)+'%'); pTime.set(myr.toFixed(1)); pEvent.set(lastEvent);
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── OCEAN CURRENTS SIM ── */
function simOcean(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pFlow = pill('Flow rate'); const pTemp = pill('Surf. temp'); const pAMOC = pill('AMOC');
  pRow.appendChild(pFlow.el); pRow.appendChild(pTemp.el); pRow.appendChild(pAMOC.el);
  const rWind   = mkRange(ctrl, 'Wind strength', 1, 10, 5, 1, color);
  const rWarm   = mkRange(ctrl, 'Ocean warming', 0, 10, 2, 1, color);
  ctrl.appendChild(mkBtn(''));  // spacer

  // Particle field simulating gyre + thermohaline
  const N = 120;
  let parts = [];
  for (let i = 0; i < N; i++) {
    parts.push({ x: Math.random()*W, y: Math.random()*H, vx:0, vy:0, depth: Math.random(), age: Math.random()*100 });
  }

  const S = SIMS.ocean = { raf: null };
  let t = 0;

  function oceanVelocity(x, y, wind, warm) {
    // Surface gyre (wind-driven, clockwise NH)
    const cx = W/2, cy = H/2;
    const dx = x-cx, dy = y-cy;
    const r = Math.sqrt(dx*dx+dy*dy)+1;
    const gyre = wind * 0.018;
    let vx = gyre * ( dy/r);
    let vy = gyre * (-dx/r);
    // Gulf Stream: strong northward current on western boundary
    const gsStr = wind * 0.035;
    if (x < W*0.22) { vx += gsStr * 0.3; vy += -gsStr * (1-(x/(W*0.22))); }
    // Equatorial current: westward
    if (y > H*0.45 && y < H*0.65) { vx -= wind*0.012; }
    // AMOC weakening: reduce deep sinking in north
    const amocStr = Math.max(0, 1 - warm/12);
    if (y < H*0.25 && x > W*0.6) { vy += amocStr * wind * 0.02; }
    return { vx, vy };
  }

  function frame() {
    t++;
    const wind = rWind.val, warm = rWarm.val;
    ctx.clearRect(0, 0, W, H);

    // ocean background with temperature gradient
    for (let j = 0; j < H; j += 4) {
      const lat = 1 - j/H; // 0=south, 1=north
      const baseT = 28 - lat*20 - warm*lat*0.5;
      const hue = Math.max(200, 240 - baseT*4);
      ctx.fillStyle = `hsl(${hue},${60+warm*2}%,${15+baseT*.5}%)`;
      ctx.fillRect(0, j, W, 4);
    }

    // update & draw particles
    parts.forEach(p => {
      p.age++;
      const { vx, vy } = oceanVelocity(p.x, p.y, wind, warm);
      p.vx = p.vx*.85 + vx*.15; p.vy = p.vy*.85 + vy*.15;
      p.x = (p.x + p.vx + W) % W; p.y = (p.y + p.vy + H) % H;
      const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const lat = 1 - p.y/H;
      const T = 28 - lat*20;
      const hue = T > 15 ? 30 : T > 5 ? 190 : 220;
      const alpha = Math.min(0.85, 0.3 + spd*8);
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue},80%,65%,${alpha})`;
      ctx.fill();
      // draw velocity arrow every 30 frames
      if (p.age % 30 === 0 && spd > 0.1) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + p.vx*12, p.y + p.vy*12);
        ctx.strokeStyle = `hsla(${hue},80%,80%,0.4)`;
        ctx.lineWidth = 1; ctx.stroke();
      }
    });

    // Labels
    const labels = [
      {x:W*.12, y:H*.35, t:'Gulf\nStream', c:'#fbbf24'},
      {x:W*.5,  y:H*.15, t:'N. Atlantic\nGyre', c:'#93c5fd'},
      {x:W*.5,  y:H*.58, t:'Equatorial\nCurrent', c:'#6ee7b7'},
      {x:W*.75, y:H*.8,  t:'Deep water\nsinking', c:'rgba(255,255,255,0.5)'},
    ];
    labels.forEach(l => {
      ctx.fillStyle = l.c; ctx.font = 'bold 9px Nunito,sans-serif'; ctx.textAlign = 'center';
      l.t.split('\n').forEach((line, i) => ctx.fillText(line, l.x, l.y + i*12));
    });

    // AMOC strength indicator
    const amoc = Math.max(0, 100 - warm*8);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W-90, 8, 82, 30);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(W-86, 22, 74, 10);
    ctx.fillStyle=amoc>60?'#34d399':amoc>30?'#f59e0b':'#ef4444';
    ctx.fillRect(W-86, 22, 74*(amoc/100), 10);
    ctx.fillStyle='#fff'; ctx.font='bold 9px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('AMOC strength', W-49, 19);

    const surfT = (28 - warm*0.4).toFixed(1);
    pFlow.set(Math.round(wind*3)+' Sv'); pTemp.set(surfT+'°C'); pAMOC.set(Math.round(amoc)+'%');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── VOLCANO SIM ── */
function simVolcano(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pPres = pill('Chamber pressure'); const pVEI = pill('VEI'); const pPhase = pill('Phase');
  pRow.appendChild(pPres.el); pRow.appendChild(pVEI.el); pRow.appendChild(pPhase.el);
  const rVisc  = mkRange(ctrl, 'Magma viscosity (1=basalt 10=rhyolite)', 1, 10, 4, 1, color);
  const rRecharge = mkRange(ctrl, 'Magma recharge rate', 1, 10, 4, 1, color);
  const bErupt = mkBtn('💥 Force eruption', true, color);
  ctrl.appendChild(bErupt);

  let pressure = 20, erupting = false, eruptT = 0, eruptPower = 0;
  let particles = [], ashCloud = [];
  let phase = 'Recharging';

  bErupt.addEventListener('click', () => {
    if (!erupting) { erupting = true; eruptT = 0; eruptPower = Math.min(100,pressure); pressure = 5; phase = 'Erupting!'; }
  });

  const S = SIMS.volcano = { raf: null };
  let t = 0;
  const cx = W/2, baseY = H-30;
  const volcH = 140, volcW = 110;

  function frame() {
    t++;
    // pressure build-up
    if (!erupting) {
      pressure += 0.06 * rRecharge.val;
      if (pressure >= 100) { erupting = true; eruptT = 0; eruptPower = 100; pressure = 5; phase = 'Erupting!'; }
      else phase = pressure > 70 ? 'Critical!' : pressure > 40 ? 'Pressurising' : 'Recharging';
    } else {
      eruptT++;
      pressure = Math.max(5, pressure + 0.1 * rRecharge.val);
      if (eruptT > 200) { erupting = false; ashCloud = []; particles = []; phase = 'Cooling'; }
    }

    // spawn eruption particles
    const visc = rVisc.val;
    if (erupting && t % Math.max(1, Math.round(visc/2)) === 0) {
      const explosive = visc > 5;
      for (let i = 0; i < (explosive ? 3 : 1); i++) {
        particles.push({
          x: cx + (Math.random()-.5)*10,
          y: baseY - volcH,
          vx: (Math.random()-.5) * (explosive ? 5 : 2),
          vy: -(4 + Math.random()*6) * (explosive ? 1.4 : 0.8),
          r: 2 + Math.random()*4,
          life: 80 + Math.random()*60,
          age: 0,
          type: explosive ? 'ash' : 'lava',
          col: explosive ? `hsl(${20+Math.random()*20},60%,${40+Math.random()*20}%)` : `hsl(${15+Math.random()*20},90%,${50+Math.random()*20}%)`
        });
      }
    }

    ctx.clearRect(0, 0, W, H);

    // sky gradient — darkens during eruption
    const skyAlpha = erupting ? Math.min(0.6, eruptT/100) : 0;
    const skyG = ctx.createLinearGradient(0,0,0,H);
    skyG.addColorStop(0, `hsl(${210-skyAlpha*180},${60-skyAlpha*40}%,${erupting?20:55}%)`);
    skyG.addColorStop(1, `hsl(${30},${40}%,${erupting?10:30}%)`);
    ctx.fillStyle = skyG; ctx.fillRect(0,0,W,H);

    // ground
    ctx.fillStyle = '#292524'; ctx.fillRect(0, baseY+20, W, H-baseY-20);

    // lava glow underground
    const glow = ctx.createRadialGradient(cx, baseY+10, 0, cx, baseY+10, 60+pressure*0.5);
    glow.addColorStop(0, `rgba(255,${100+pressure},0,${0.3+pressure/200})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow; ctx.fillRect(0, baseY, W, H-baseY);

    // volcano shape
    ctx.beginPath();
    ctx.moveTo(cx-volcW*1.4, baseY+20);
    ctx.lineTo(cx-volcW*.4, baseY-volcH*.35);
    ctx.quadraticCurveTo(cx-volcW*.12, baseY-volcH, cx, baseY-volcH);
    ctx.quadraticCurveTo(cx+volcW*.12, baseY-volcH, cx+volcW*.4, baseY-volcH*.35);
    ctx.lineTo(cx+volcW*1.4, baseY+20);
    ctx.closePath();
    ctx.fillStyle = '#44403c'; ctx.fill();
    ctx.strokeStyle = '#57534e'; ctx.lineWidth = 1.5; ctx.stroke();

    // crater glow
    const craterGlow = ctx.createRadialGradient(cx, baseY-volcH, 0, cx, baseY-volcH, 20+pressure*.15);
    craterGlow.addColorStop(0, `rgba(255,${80+pressure},0,${0.4+pressure/150})`);
    craterGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = craterGlow; ctx.beginPath(); ctx.arc(cx, baseY-volcH, 20+pressure*.15, 0, Math.PI*2); ctx.fill();

    // update & draw particles
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.age++; p.vx *= 0.98; p.vy += 0.12; p.x += p.vx; p.y += p.vy;
      if (p.age > p.life || p.y > baseY+10) { particles.splice(i,1); continue; }
      const alpha = 1 - p.age/p.life;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.type==='lava' ? p.col : `rgba(100,80,60,${alpha*.8})`;
      ctx.globalAlpha = alpha; ctx.fill(); ctx.globalAlpha = 1;
    }

    // pressure gauge
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(12,12,16,H*.55);
    const gaugeH = (H*.55)*(pressure/100);
    const gc = pressure>70?'#ef4444':pressure>40?'#f59e0b':'#34d399';
    ctx.fillStyle=gc; ctx.fillRect(12, 12+H*.55-gaugeH, 16, gaugeH);
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.strokeRect(12,12,16,H*.55);
    ctx.fillStyle='#fff'; ctx.font='8px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('P', 20, 10);

    // VEI estimate
    const vei = Math.min(8, Math.round((eruptPower/100)*visc/1.5));
    pPres.set(Math.round(pressure)+'%'); pVEI.set(erupting?'VEI '+vei:'—'); pPhase.set(phase);
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── ELECTROCHEMISTRY SIM ── */
function simElectrochem(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pV    = pill('Voltage'); const pQ = pill('Charge'); const pMode = pill('Mode');
  pRow.appendChild(pV.el); pRow.appendChild(pQ.el); pRow.appendChild(pMode.el);
  const rLoad    = mkRange(ctrl, 'Load (discharge rate)', 1, 10, 4, 1, color);
  const bDischarge = mkBtn('▶ Discharge', true, color);
  const bCharge    = mkBtn('⚡ Charge');
  const bReset     = mkBtn('↺ Reset');
  ctrl.appendChild(bDischarge); ctrl.appendChild(bCharge); ctrl.appendChild(bReset);

  let soc = 1.0;        // state of charge 0–1
  let mode = 'idle';    // idle | discharge | charge
  let ions = [];        // animated ion particles
  let t = 0;

  function initIons() {
    ions = [];
    for (let i = 0; i < 28; i++)
      ions.push({ x: 0.2*W + Math.random()*0.6*W, y: 60 + Math.random()*(H-120),
        vx:0, vy:0, side: Math.random()<0.5?'L':'R', phase: Math.random()*Math.PI*2 });
  }
  function reset() { soc=1.0; mode='idle'; initIons(); }
  bDischarge.addEventListener('click', () => mode='discharge');
  bCharge.addEventListener('click',    () => mode='charge');
  bReset.addEventListener('click', reset);
  reset();

  const S = SIMS.electrochem = { raf: null };

  function frame() {
    t++;
    // update SOC
    const rate = rLoad.val * 0.0008;
    if (mode==='discharge') { soc = Math.max(0, soc - rate); if (soc<=0) mode='idle'; }
    if (mode==='charge')    { soc = Math.min(1, soc + rate*0.7); if (soc>=1) mode='idle'; }

    // Nernst-like voltage: E = E0 - (0.059/n)*log((1-soc)/soc)
    const E0 = 3.7, n = 1;
    const ratio = Math.max(0.001, (1-soc)/Math.max(0.001,soc));
    const voltage = Math.max(2.5, Math.min(4.2, E0 - (0.059/n)*Math.log10(ratio)));

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    // electrodes
    const anodeX = 80, cathodeX = W-80, elecH = H-80, elecW = 36, elecY = 40;
    // anode (graphite — discharge: Li leaves)
    const anodeCol = mode==='discharge'?'#6366f1':'#4338ca';
    ctx.fillStyle = anodeCol;
    ctx.fillRect(anodeX - elecW/2, elecY, elecW, elecH);
    ctx.fillStyle='rgba(255,255,255,0.08)';
    for(let i=0;i<8;i++) ctx.fillRect(anodeX-elecW/2+2, elecY+10+i*(elecH-20)/8, elecW-4, 4);
    ctx.fillStyle='#a5b4fc'; ctx.font='bold 10px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('ANODE', anodeX, elecY-8);
    ctx.fillText('(Graphite)', anodeX, elecY-18);

    // cathode (LiCoO2)
    const cathodeCol = mode==='charge'?'#f59e0b':'#d97706';
    ctx.fillStyle = cathodeCol;
    ctx.fillRect(cathodeX - elecW/2, elecY, elecW, elecH);
    ctx.fillStyle='rgba(255,255,255,0.08)';
    for(let i=0;i<8;i++) ctx.fillRect(cathodeX-elecW/2+2, elecY+10+i*(elecH-20)/8, elecW-4, 4);
    ctx.fillStyle='#fcd34d'; ctx.font='bold 10px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('CATHODE', cathodeX, elecY-8);
    ctx.fillText('(LiCoO₂)', cathodeX, elecY-18);

    // electrolyte region
    ctx.fillStyle='rgba(14,165,233,0.07)';
    ctx.fillRect(anodeX+elecW/2, elecY, cathodeX-anodeX-elecW, elecH);
    ctx.fillStyle='rgba(14,165,233,0.3)'; ctx.font='10px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('Electrolyte (LiPF₆)', W/2, elecY+elecH/2);

    // external circuit (wire + bulb)
    const wireY = elecY - 22;
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(anodeX, elecY); ctx.lineTo(anodeX, wireY);
    ctx.lineTo(W/2-18, wireY); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cathodeX, elecY); ctx.lineTo(cathodeX, wireY);
    ctx.lineTo(W/2+18, wireY); ctx.stroke();
    // bulb/charger icon
    const bulbGlow = mode==='discharge' ? Math.min(1, soc+0.1) : 0;
    const chargeGlow = mode==='charge' ? 0.8 : 0;
    ctx.beginPath(); ctx.arc(W/2, wireY, 14, 0, Math.PI*2);
    ctx.fillStyle = mode==='charge' ? `rgba(251,191,36,${0.3+chargeGlow*0.5})` : `rgba(253,224,71,${0.1+bulbGlow*0.7})`;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 11px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText(mode==='charge'?'⚡':'💡', W/2, wireY+4);

    // electron flow arrows on wire
    if (mode !== 'idle') {
      const dir = mode==='discharge' ? 1 : -1;
      const arrowT = (t*0.03*dir + 10) % 1;
      const ax = anodeX + (W/2-14 - anodeX) * arrowT;
      ctx.beginPath(); ctx.arc(ax, wireY, 4, 0, Math.PI*2);
      ctx.fillStyle='#60a5fa'; ctx.fill();
      ctx.fillStyle='#60a5fa'; ctx.font='8px Nunito,sans-serif'; ctx.textAlign='center';
      ctx.fillText('e⁻', ax, wireY-8);
    }

    // ion particles
    ions.forEach(ion => {
      const dir = mode==='discharge' ? 1 : -1; // discharge: anode→cathode
      ion.phase += 0.03 * rLoad.val * Math.abs(dir);
      const prog = (Math.sin(ion.phase)*0.5+0.5);
      const tx = mode==='idle' ? ion.x :
        dir > 0 ? anodeX+elecW/2+20 + prog*(cathodeX-elecW/2-20 - (anodeX+elecW/2+20))
                : cathodeX-elecW/2-20 - prog*(cathodeX-elecW/2-20 - (anodeX+elecW/2+20));
      const ty = elecY + 20 + Math.sin(ion.phase*1.3+ion.side==='L'?0:Math.PI)*(elecH-40)*0.4 + elecH*0.3;
      ctx.beginPath(); ctx.arc(tx, ty, 5, 0, Math.PI*2);
      ctx.fillStyle='#34d399'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 7px Nunito,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Li⁺', tx, ty); ctx.textBaseline='alphabetic';
    });

    // SOC bar
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(10, H-22, W-20, 12);
    ctx.fillStyle=soc>0.4?'#34d399':soc>0.2?'#f59e0b':'#ef4444';
    ctx.fillRect(10, H-22, (W-20)*soc, 12);
    ctx.fillStyle='#fff'; ctx.font='9px Nunito,sans-serif'; ctx.textAlign='left';
    ctx.fillText('State of Charge: '+Math.round(soc*100)+'%', 14, H-12);

    pV.set(voltage.toFixed(2)+' V');
    pQ.set(Math.round(soc*100)+'%');
    pMode.set(mode==='discharge'?'Discharging':mode==='charge'?'Charging':'Idle');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── KINETICS SIM ── */
function simKinetics(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pReact = pill('[Reactant]'); const pProd = pill('[Product]'); const pRate = pill('Rate');
  pRow.appendChild(pReact.el); pRow.appendChild(pProd.el); pRow.appendChild(pRate.el);
  const rTemp  = mkRange(ctrl, 'Temperature (K)', 200, 800, 400, 10, color);
  const rEa    = mkRange(ctrl, 'Activation energy (kJ/mol)', 10, 100, 50, 5, color);
  const bCat   = mkBtn('⚗️ Add catalyst', true, color);
  const bReset = mkBtn('↺ Reset');
  ctrl.appendChild(bCat); ctrl.appendChild(bReset);

  let molecules = [], catActive = false, t = 0;
  let concentrationHistory = [], productHistory = [];

  function initMolecules() {
    molecules = [];
    catActive = false;
    concentrationHistory = []; productHistory = [];
    for (let i = 0; i < 60; i++)
      molecules.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-.5)*2, vy: (Math.random()-.5)*2,
        type: 'R', // R=reactant P=product
        r: 6, age: 0
      });
    t = 0;
  }
  bCat.addEventListener('click', () => { catActive = !catActive; bCat.textContent = catActive ? '✕ Remove catalyst' : '⚗️ Add catalyst'; });
  bReset.addEventListener('click', initMolecules);
  initMolecules();

  const S = SIMS.kinetics = { raf: null };
  const R_GAS = 8.314;

  function frame() {
    t++;
    const T = rTemp.val;
    const Ea = rEa.val * 1000; // J/mol
    const EaEff = catActive ? Ea * 0.45 : Ea;
    // Arrhenius rate constant (normalised)
    const A = 1e6;
    const k = Math.min(0.08, A * Math.exp(-EaEff/(R_GAS*T)) * 0.0001);

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    // update molecules
    const spd = Math.sqrt(T/300);
    molecules.forEach(m => {
      m.x += m.vx * spd; m.y += m.vy * spd;
      if (m.x < m.r || m.x > W-m.r) m.vx *= -1;
      if (m.y < m.r || m.y > H*0.6-m.r) m.vy *= -1;
      m.vx += (Math.random()-.5)*0.15*spd;
      m.vy += (Math.random()-.5)*0.15*spd;
      const maxV = 3*spd;
      const v = Math.hypot(m.vx,m.vy);
      if(v>maxV){m.vx=m.vx/v*maxV;m.vy=m.vy/v*maxV;}
    });

    // reactions — check collisions between reactants
    for (let i = 0; i < molecules.length; i++) {
      if (molecules[i].type !== 'R') continue;
      for (let j = i+1; j < molecules.length; j++) {
        if (molecules[j].type !== 'R') continue;
        const dx = molecules[j].x - molecules[i].x;
        const dy = molecules[j].y - molecules[i].y;
        if (dx*dx+dy*dy < (molecules[i].r*2.5)**2 && Math.random() < k) {
          molecules[i].type = 'P'; molecules[j].type = 'P';
          molecules[i].vx *= -1; molecules[j].vx *= -1;
          break;
        }
      }
    }

    // draw molecules
    molecules.forEach(m => {
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
      ctx.fillStyle = m.type==='R' ? '#6366f1' : '#f59e0b';
      ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 7px Nunito,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(m.type, m.x, m.y); ctx.textBaseline='alphabetic';
    });

    // catalyst visual
    if (catActive) {
      ctx.strokeStyle='rgba(16,185,129,0.5)'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      ctx.strokeRect(5, 5, W-10, H*0.6-10); ctx.setLineDash([]);
      ctx.fillStyle='#34d399'; ctx.font='bold 9px Nunito,sans-serif'; ctx.textAlign='left';
      ctx.fillText('⚗️ Catalyst active — Ea reduced 55%', 10, 18);
    }

    // energy profile chart (bottom section)
    const chartY = H*0.62, chartH = H*0.35, chartW = W-30;
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(15, chartY, chartW, chartH);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
    ctx.strokeRect(15, chartY, chartW, chartH);

    // draw energy diagram
    const midX = 15+chartW/2;
    const baseY = chartY+chartH-10;
    const reactY = baseY-20;
    const prodY  = baseY-8;
    const tsY    = chartY+8;
    const tsYcat = catActive ? chartY+chartH*0.38 : tsY;

    // normal pathway
    ctx.beginPath(); ctx.moveTo(15+10, reactY);
    ctx.bezierCurveTo(midX-40, reactY, midX-20, tsY+4, midX, tsY+4);
    ctx.bezierCurveTo(midX+20, tsY+4, midX+40, prodY, 15+chartW-10, prodY);
    ctx.strokeStyle='rgba(99,102,241,0.6)'; ctx.lineWidth=2; ctx.stroke();

    // catalyst pathway
    if (catActive) {
      ctx.beginPath(); ctx.moveTo(15+10, reactY);
      ctx.bezierCurveTo(midX-40, reactY, midX-20, tsYcat, midX, tsYcat);
      ctx.bezierCurveTo(midX+20, tsYcat, midX+40, prodY, 15+chartW-10, prodY);
      ctx.strokeStyle='rgba(52,211,153,0.8)'; ctx.lineWidth=2; ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);
    }

    // labels
    ctx.fillStyle='#a5b4fc'; ctx.font='9px Nunito,sans-serif'; ctx.textAlign='left';
    ctx.fillText('Reactants', 18, reactY-4);
    ctx.fillStyle='#fcd34d'; ctx.textAlign='right';
    ctx.fillText('Products', 15+chartW-2, prodY-4);
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.textAlign='center';
    ctx.fillText('‡ Transition state', midX, tsY-2);
    ctx.fillText('Ea = '+rEa.val+'kJ/mol'+(catActive?' → '+Math.round(rEa.val*0.45)+'kJ/mol':''), midX, chartY+chartH/2+4);

    const nR = molecules.filter(m=>m.type==='R').length;
    const nP = molecules.filter(m=>m.type==='P').length;
    pReact.set(nR); pProd.set(nP); pRate.set((k*1000).toFixed(2)+'×10⁻³');
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

      ...a,
      px: cx + a.x * cos - a.y * 0,
      py: cy + a.x * sin * 0.3 + a.y,
      scale: 0.8 + (a.x * cos) / 300
