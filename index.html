      const r = (a.s==='C'?10:a.s==='O'?9:a.s==='N'?9:7) * a.scale;
      ctx.beginPath(); ctx.arc(a.px, a.py, r, 0, Math.PI*2);
      ctx.fillStyle = a.col; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
      if (r > 6) {
        ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(8*a.scale)}px Nunito,sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(a.s, a.px, a.py); ctx.textBaseline='alphabetic';
      }
    });

    // legend
    const legX = 12;
    [[`#6b7280`,'C Carbon'],[`#ef4444`,'H Hydrogen'],[`#3b82f6`,'O Oxygen'],[`#8b5cf6`,'N Nitrogen']].forEach(([c,l],i) => {
      ctx.beginPath(); ctx.arc(legX+6, H-22+i*0-i*14, 5, 0, Math.PI*2);
      ctx.fillStyle=c; ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='9px Nunito,sans-serif'; ctx.textAlign='left';
      ctx.fillText(l, legX+14, H-18+i*0-i*14);
    });

    // molecule info
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='10px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText(mol.info, W/2, H-8);

    pMol.set(mol.name.split(' ')[0]);
    pAtoms.set(mol.atoms.length+' atoms');
    pType.set(mol.type);
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── BLACK HOLES SIM ── */
function simBlackholes(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pDist = pill('Distance'); const pDilat = pill('Time dilation'); const pRedshift = pill('Redshift');
  pRow.appendChild(pDist.el); pRow.appendChild(pDilat.el); pRow.appendChild(pRedshift.el);
  const rMass = mkRange(ctrl, 'Black hole mass (M☉)', 1, 50, 10, 1, color);
  const rOrbit = mkRange(ctrl, 'Test particle distance (r_S)', 2, 20, 6, 0.5, color);
  const bGwave = mkBtn('🌊 Gravitational wave', true, color);
  ctrl.appendChild(bGwave);

  let t = 0, gwAnim = 0, stars = [];
  for (let i = 0; i < 80; i++)
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5, twinkle: Math.random()*Math.PI*2 });

  bGwave.addEventListener('click', () => { gwAnim = 80; });

  const S = SIMS.blackholes = { raf: null };
  const cx = W/2, cy = H/2;

  function frame() {
    t += 0.02;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000010'; ctx.fillRect(0, 0, W, H);

    // stars
    stars.forEach(s => {
      s.twinkle += 0.03;
      const alpha = 0.4 + 0.3*Math.sin(s.twinkle);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
    });

    const M = rMass.val;
    const rs_px = Math.min(40, 8 + M*1.2); // Schwarzschild radius in pixels (visual)
    const orbitR_rs = rOrbit.val; // in units of r_S
    const orbitR_px = rs_px * orbitR_rs;

    // gravitational lensing rings
    for (let ring = 1; ring <= 4; ring++) {
      const ringR = rs_px * (1 + ring * 0.8);
      const alpha = 0.15/ring;
      ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,200,100,${alpha})`;
      ctx.lineWidth = ring===1?3:2; ctx.stroke();
    }

    // photon sphere
    ctx.beginPath(); ctx.arc(cx, cy, rs_px*1.5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(251,191,36,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(251,191,36,0.5)'; ctx.font='8px Nunito,sans-serif'; ctx.textAlign='left';
    ctx.fillText('photon sphere', cx+rs_px*1.5+4, cy);

    // accretion disc (ellipse)
    ctx.save(); ctx.translate(cx,cy); ctx.scale(1, 0.28);
    for (let r2 = rs_px*1.1; r2 < rs_px*4; r2 += 2) {
      const heat = 1 - (r2-rs_px*1.1)/(rs_px*3);
      ctx.beginPath(); ctx.arc(0, 0, r2, 0, Math.PI*2);
      ctx.strokeStyle = `hsla(${30+heat*20},90%,${50+heat*20}%,${heat*0.35})`;
      ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();

    // event horizon (black hole)
    const bhGrad = ctx.createRadialGradient(cx-rs_px*.3, cy-rs_px*.3, 0, cx, cy, rs_px);
    bhGrad.addColorStop(0, '#1a0533');
    bhGrad.addColorStop(0.6, '#000');
    bhGrad.addColorStop(1, '#000');
    ctx.beginPath(); ctx.arc(cx, cy, rs_px, 0, Math.PI*2);
    ctx.fillStyle = bhGrad; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, rs_px, 0, Math.PI*2);
    ctx.strokeStyle='rgba(150,50,255,0.6)'; ctx.lineWidth=2; ctx.stroke();

    // orbiting test particle
    const orbitSpeed = 1/Math.sqrt(orbitR_rs*orbitR_rs*orbitR_rs); // Kepler
    const angle = t * orbitSpeed * 3;
    const px = cx + orbitR_px * Math.cos(angle);
    const py = cy + orbitR_px * Math.sin(angle) * 0.4;
    // orbit path
    ctx.save(); ctx.translate(cx,cy); ctx.scale(1,0.4);
    ctx.beginPath(); ctx.arc(0,0,orbitR_px,0,Math.PI*2);
    ctx.strokeStyle='rgba(99,102,241,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2);
    ctx.fillStyle='#818cf8'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();

    // gravitational wave animation
    if (gwAnim > 0) {
      gwAnim--;
      const prog = 1-(gwAnim/80);
      for (let w2=1; w2<=3; w2++) {
        const wr = prog * W * 0.6 * w2/3;
        ctx.beginPath(); ctx.arc(cx, cy, wr, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(99,102,241,${0.5*(1-prog)})`;
        ctx.lineWidth=2; ctx.stroke();
      }
    }

    // labels
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='9px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText(`M = ${M} M☉   r_S = ${(M*2.95/1000).toFixed(2)} km`, cx, H-10);

    // physics
    const rRatio = orbitR_rs; // r/r_S
    const timeDilation = Math.sqrt(1 - 1/rRatio);
    const redshift = 1/Math.sqrt(1-1/rRatio) - 1;
    const distKm = (M * 2.95 * orbitR_rs).toFixed(0);

    pDist.set(distKm+' km');
    pDilat.set(timeDilation.toFixed(3)+'×');
    pRedshift.set('z='+redshift.toFixed(3));
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── COSMOLOGY SIM ── */
function simCosmology(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pAge = pill('Age (Gyr)'); const pH = pill('H(z)'); const pZ = pill('Redshift z');
  pRow.appendChild(pAge.el); pRow.appendChild(pH.el); pRow.appendChild(pZ.el);
  const rOmegaL = mkRange(ctrl, 'Dark energy Ω_Λ', 0, 100, 69, 1, color);
  const rOmegaM = mkRange(ctrl, 'Matter Ω_m (%)', 0, 100, 31, 1, color);
  const bReset = mkBtn('↺ Reset', true, color);
  ctrl.appendChild(bReset);

  let galaxies = [], t = 0, cosmicT = 0;

  function initGalaxies() {
    galaxies = []; cosmicT = 0;
    for (let i = 0; i < 55; i++) {
      const angle = Math.random()*Math.PI*2;
      const d = 10 + Math.random()*60;
      galaxies.push({
        ox: W/2 + Math.cos(angle)*d, oy: H/2 + Math.sin(angle)*d,
        x: W/2 + Math.cos(angle)*d, y: H/2 + Math.sin(angle)*d,
        angle, d0: d,
        col: `hsl(${200+Math.random()*60},${60+Math.random()*30}%,${60+Math.random()*20}%)`,
        r: 1.5 + Math.random()*2.5
      });
    }
  }
  bReset.addEventListener('click', initGalaxies);
  initGalaxies();

  const S = SIMS.cosmology = { raf: null };
  const H0 = 70; // km/s/Mpc

  function frame() {
    t += 0.008;
    cosmicT = Math.min(13.8, cosmicT + 0.012);
    ctx.clearRect(0, 0, W, H);

    const OmL = rOmegaL.val/100;
    const OmM = rOmegaM.val/100;

    // cosmic age → scale factor (simplified)
    const a = Math.min(3, 0.01 + cosmicT/13.8 * (1 + OmL*0.5));
    const z = Math.max(0, 1/a - 1);
    const Hz = H0*Math.sqrt(OmM*(1+z)**3 + OmL);

    // CMB background — warm at early times, dark at late
    const earlyness = Math.max(0, 1 - cosmicT/13.8);
    const bgH = 20 + earlyness*220;
    ctx.fillStyle = `hsl(${bgH},${earlyness*60}%,${3+earlyness*20}%)`;
    ctx.fillRect(0, 0, W, H);

    // CMB ripples at early times
    if (cosmicT < 2) {
      for (let i = 0; i < 5; i++) {
        const alpha = (1-cosmicT/2)*0.3;
        ctx.beginPath(); ctx.arc(W/2, H/2, 30+i*30, 0, Math.PI*2);
        ctx.strokeStyle=`rgba(255,200,100,${alpha})`; ctx.lineWidth=2; ctx.stroke();
      }
    }

    // expand galaxies
    galaxies.forEach(g => {
      g.x = W/2 + Math.cos(g.angle)*g.d0*a*1.8;
      g.y = H/2 + Math.sin(g.angle)*g.d0*a*1.8;
      // wrap
      if (g.x < -20 || g.x > W+20 || g.y < -20 || g.y > H+20) return;
      // draw galaxy
      const glowR = g.r*(1+a*0.3);
      ctx.beginPath(); ctx.arc(g.x, g.y, glowR+3, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,0.05)`; ctx.fill();
      ctx.beginPath(); ctx.arc(g.x, g.y, glowR, 0, Math.PI*2);
      ctx.fillStyle=g.col; ctx.fill();
      // recession velocity arrow
      if (a > 1.2) {
        const vlen = Math.min(20, g.d0*a*0.08);
        const dx = Math.cos(g.angle)*vlen, dy = Math.sin(g.angle)*vlen;
        ctx.beginPath(); ctx.moveTo(g.x, g.y); ctx.lineTo(g.x+dx, g.y+dy);
        ctx.strokeStyle='rgba(255,100,100,0.4)'; ctx.lineWidth=1; ctx.stroke();
      }
    });

    // Milky Way (us) at centre
    ctx.beginPath(); ctx.arc(W/2, H/2, 7, 0, Math.PI*2);
    ctx.fillStyle='#fbbf24'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 8px Nunito,sans-serif'; ctx.textAlign='center';
    ctx.fillText('MW', W/2, H/2+3);

    // cosmic timeline bar
    const barW = W-60, barX=30, barY=H-18;
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(barX,barY,barW,8);
    ctx.fillStyle=color; ctx.fillRect(barX,barY,barW*(cosmicT/13.8),8);
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='8px Nunito,sans-serif'; ctx.textAlign='left';
    ctx.fillText('Big Bang', barX, barY-3);
    ctx.textAlign='right'; ctx.fillText('Now (13.8 Gyr)', barX+barW, barY-3);

    // phase labels
    const phases=[{t:0.38/1000,l:'CMB'},{t:0.4,l:'First\nstars'},{t:1,l:'Galaxies'},{t:9,l:'Solar\nSystem'},{t:13.8,l:'Today'}];
    phases.forEach(p=>{
      if(p.t>0.01){
        const px=barX+barW*(p.t/13.8);
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,barY); ctx.lineTo(px,barY+8); ctx.stroke();
      }
    });

    pAge.set(cosmicT.toFixed(2)); pH.set(Math.round(Hz)); pZ.set(z.toFixed(2));
    if (cosmicT >= 13.8) cosmicT = 0;
    S.raf = requestAnimationFrame(frame);
  }
  frame();
}

/* ── SOLAR SYSTEM SIM ── */
function simSolarSystem(container, color) {
  const W = getSimWidth(container), H = 300;
  const { canvas, ctx } = mkCanvas(container, W, H);
  const ctrl = mkCtrl(container);
  const pRow = mkPills(container);
  const pPlanet = pill('Selected'); const pPeriod = pill('Period'); const pDist = pill('Distance');
  pRow.appendChild(pPlanet.el); pRow.appendChild(pPeriod.el); pRow.appendChild(pDist.el);
  const rSpeed = mkRange(ctrl, 'Time speed', 1, 10, 4, 1, color);
  const rZoom  = mkRange(ctrl, 'Zoom', 1, 5, 2, 0.5, color);
  ctrl.appendChild(document.createElement('div'));

  const PLANETS = [
    { name:'Mercury', a:0.39, T:0.24, r:3,  col:'#9ca3af', moons:0 },
    { name:'Venus',   a:0.72, T:0.62, r:5,  col:'#fbbf24', moons:0 },
    { name:'Earth',   a:1.00, T:1.00, r:5.5,col:'#3b82f6', moons:1 },
    { name:'Mars',    a:1.52, T:1.88, r:4,  col:'#ef4444', moons:2 },
    { name:'Jupiter', a:5.20, T:11.86,r:12, col:'#f59e0b', moons:4 },
    { name:'Saturn',  a:9.58, T:29.46,r:10, col:'#fcd34d', moons:7, rings:true },
    { name:'Uranus',  a:19.2, T:84.0, r:7,  col:'#67e8f9', moons:5 },
    { name:'Neptune', a:30.1, T:164.8,r:7,  col:'#6366f1', moons:2 },
  ];

  let t = 0, selected = 2; // Earth default
  const angles = PLANETS.map(() => Math.random()*Math.PI*2);
  const cx = W/2, cy = H/2;

  const S = SIMS.solarsystem = { raf: null };

  function frame() {
    t += 0.005 * rSpeed.val;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000814'; ctx.fillRect(0, 0, W, H);

    // background stars
    for (let i = 0; i < 60; i++) {
      const sx = (i*173.7)%W, sy = (i*97.3+30)%H;
      ctx.beginPath(); ctx.arc(sx,sy,0.7,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.2+0.4*(i%3)/3})`; ctx.fill();
    }

    const zoom = rZoom.val;
    // scale: 1 AU = px_per_AU
    const maxA = 32;
    const px_per_AU = Math.min(cx, cy)*0.88 / (maxA/zoom);

    // Sun
    const sunGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,14);
    sunGrad.addColorStop(0,'#fffde7'); sunGrad.addColorStop(0.4,'#fbbf24'); sunGrad.addColorStop(1,'rgba(251,191,36,0)');
    ctx.beginPath(); ctx.arc(cx,cy,14,0,Math.PI*2); ctx.fillStyle=sunGrad; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.fillStyle='#fbbf24'; ctx.fill();

    PLANETS.forEach((p, i) => {
      const orbitR = p.a * px_per_AU;
      if (orbitR > Math.max(W,H)*0.8) return; // outside view

      // orbit ring
      ctx.beginPath(); ctx.arc(cx,cy,orbitR,0,Math.PI*2);
      ctx.strokeStyle = i===selected?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.08)';
      ctx.lineWidth=1; ctx.stroke();

      // advance angle (Kepler: ω = 2π/T)
      angles[i] += (2*Math.PI/p.T) * 0.005 * rSpeed.val;
      const px = cx + orbitR*Math.cos(angles[i]);
      const py = cy + orbitR*Math.sin(angles[i]);

      // Saturn rings
      if (p.rings && orbitR < W*0.45) {
        ctx.save(); ctx.translate(px,py); ctx.scale(1,0.3);
        ctx.beginPath(); ctx.arc(0,0,p.r*2.4,0,Math.PI*2);
        ctx.strokeStyle='rgba(253,211,77,0.5)'; ctx.lineWidth=4; ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,p.r*2.0,0,Math.PI*2);
        ctx.strokeStyle='rgba(253,211,77,0.3)'; ctx.lineWidth=2; ctx.stroke();
        ctx.restore();
      }

      // planet
      const pr = Math.max(2, p.r*(0.5+zoom*0.25));
      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
      ctx.fillStyle = p.col; ctx.fill();
      if (i===selected) {
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      }

      // moons (simplified)
      if (p.moons>0 && orbitR<W*0.4 && zoom>2) {
        const moonR = pr+6;
        for(let m=0;m<Math.min(p.moons,4);m++){
          const ma=angles[i]*3+m*(Math.PI*2/p.moons);
          ctx.beginPath(); ctx.arc(px+moonR*Math.cos(ma),py+moonR*Math.sin(ma)*0.4,1.5,0,Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();
        }
      }

      // label
      if (orbitR < W*0.48 && (zoom>1.5||orbitR>30)) {
        ctx.fillStyle=i===selected?'#fff':'rgba(255,255,255,0.5)';
        ctx.font=`${i===selected?'bold ':''} 9px Nunito,sans-serif`;
        ctx.textAlign='center';
        ctx.fillText(p.name, px, py-pr-4);
      }

      if (i===selected) {
        pPlanet.set(p.name);
        pPeriod.set(p.T<2?p.T.toFixed(2)+' yr':Math.round(p.T)+' yr');
        pDist.set(p.a.toFixed(2)+' AU');
      }
    });

    // click to select
    S.raf = requestAnimationFrame(frame);
  }

  // planet selection on click
  const canvasEl = container.querySelector('canvas');
  canvasEl.addEventListener('click', e => {
    const rect = canvasEl.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(canvasEl.width/canvasEl.offsetWidth/( window.devicePixelRatio||1));
    const my = (e.clientY-rect.top)*(canvasEl.height/canvasEl.offsetHeight/(window.devicePixelRatio||1));
    const zoom = rZoom.val, maxA=32;
    const px_per_AU = Math.min(cx,cy)*0.88/(maxA/zoom);
    let best=-1, bestD=20;
    PLANETS.forEach((p,i)=>{
      const orbitR=p.a*px_per_AU;
      const px2=cx+orbitR*Math.cos(angles[i]), py2=cy+orbitR*Math.sin(angles[i]);
      const d=Math.hypot(mx-px2,my-py2);
      if(d<bestD){bestD=d;best=i;}
    });
    if(best>=0) selected=best;
  });

  frame();
}
</script>
