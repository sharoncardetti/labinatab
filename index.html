<p>In the simulation below, each coloured square is like a simple cell, following just four simple rules about its neighbours. Watch as gliders — patterns that travel across the grid — and oscillators that flicker between states emerge from nothing but those four rules. Now imagine how much richer things become with trillions of cell types, each with thousands of different chemical signals!</p>`,
   facts:[{e:'🔴',t:'Your body makes 2 million new red blood cells every second to replace old ones — that\'s 170 billion per day!'},{e:'🧠',t:'Your brain has 86 billion neurons and an estimated 100 trillion connections — more than all the stars in the Milky Way galaxy.'},{e:'🦠',t:'The bacteria in your gut outnumber your human cells by about 1.3:1. You\'re literally more microbe than human, by cell count!'}],
   formula:null,sim:'life'},

  student:{icon:'🔬',title:'Conway\'s Game of Life and Emergent Complexity',
   body:`<p>Cellular automata are mathematical models where a grid of cells evolves in discrete time steps according to local rules. John Conway's <strong>Game of Life (1970)</strong> uses just four rules, applied simultaneously to every cell:</p>
<ul>
<li><strong>Underpopulation:</strong> a live cell with fewer than 2 live neighbours dies</li>
<li><strong>Survival:</strong> a live cell with 2 or 3 live neighbours survives</li>
<li><strong>Overpopulation:</strong> a live cell with more than 3 live neighbours dies</li>
<li><strong>Reproduction:</strong> a dead cell with exactly 3 live neighbours becomes alive</li>
</ul>
<p>These four rules produce extraordinary complexity. <strong>Gliders</strong> move diagonally across the grid; <strong>oscillators</strong> cycle through repeating patterns; <strong>glider guns</strong> emit an endless stream of gliders. Most remarkably, the Game of Life is <strong>Turing-complete</strong> — in 2000, Paul Rendell proved that a working universal Turing machine can be constructed entirely within the Life grid. This means that, in principle, any computation that can be performed by a modern computer can be performed by patterns in the Game of Life. An entire computer can be simulated inside another computer made of coloured squares.</p>
<p>This result has profound implications for our understanding of complexity. Universal computational power can emerge from four local rules operating on a binary grid. If such simplicity can produce universal computation, it suggests that the breathtaking complexity of biology — of cells, organisms, and ecosystems — may not require any special "life force" or magic ingredient. It might be an inevitable consequence of local chemical rules interacting at scale.</p>`,
   facts:[{e:'🐝',t:'Honeybee swarms collectively choose a new home with no central leader — scouts waggle-dance to advertise sites, and a quorum emerges naturally.'},{e:'🐚',t:'The patterns on seashells (stripes, spots, spirals) arise from 1D cellular automata-like reaction-diffusion in the mantle tissue.'},{e:'⚗️',t:'The Belousov-Zhabotinsky reaction produces spiralling chemical waves in a dish — a real-world continuous cellular automaton.'}],
   formula:{rows:[
    {n:'Live cell rule',e:'k=2 or 3 neighbours  →  survives',c:'else dies'},
    {n:'Dead cell rule',e:'k=3 neighbours  →  born',c:'else stays dead'},
    {sep:1},
    {n:'Turing completeness',e:'Game of Life  ≡  Universal Turing Machine',c:'Rendell, 2000'},
    {n:'Wolfram Class IV',e:'Rule 110 (1D)  also  ≡  UTM',c:'simplest known Turing-complete system'},
   ]},sim:'life'},

  scholar:{icon:'∂',title:'Turing Patterns, Reaction-Diffusion Systems, and Morphogenesis',
   body:`<p>Alan Turing's landmark 1952 paper "The Chemical Basis of Morphogenesis" proposed that biological pattern formation arises from a <strong>reaction-diffusion instability</strong> between two chemical morphogens: an <em>activator</em> u (which promotes its own production and that of an inhibitor v) and an <em>inhibitor</em> v (which suppresses u), with the crucial asymmetry that D_v ≫ D_u — the inhibitor diffuses much faster than the activator. The system is described by coupled PDEs: <span class="mk">∂u/∂t = D_u∇²u + f(u,v)</span> and <span class="mk">∂v/∂t = D_v∇²v + g(u,v)</span>, where f and g encode the reaction kinetics.</p>
<p>A spatially uniform steady state (u₀, v₀) that is stable in the absence of diffusion can become unstable to spatial perturbations when diffusion is added — the <strong>Turing instability</strong>. Linearising around (u₀, v₀) and substituting a plane-wave perturbation <span class="mk">∝ e^{σt + ikx}</span> yields the dispersion relation σ(k²). The instability condition requires that <span class="mk">det(J − k²D) = 0</span> has solutions with Re(σ) > 0 for some k ≠ 0, where J is the Jacobian of the reaction terms and D = diag(D_u, D_v). The dominant unstable wavenumber k* sets the characteristic pattern wavelength <span class="mk">λ* = 2π/k*</span>, explaining why stripes and spots have a preferred spatial scale.</p>
<p>Experimental verification came decades after Turing's death. Leopard spot geometry was matched to Turing simulations by Shankaran et al. (2012); zebrafish stripe formation was shown to follow a Turing mechanism by Nakamasu et al. (2009); mouse digit spacing was shown to depend on the BMP-BMPR reaction-diffusion system by Sheth et al. (2012). The Turing mechanism has now been identified in hair follicle spacing, palate rugae formation, and the patterning of pigmentation in bird feathers.</p>
<p>The connection to Conway's Life is through the lens of <strong>discrete vs continuous reaction-diffusion</strong>: Life operates on a binary grid with discrete time steps, while Turing systems work in continuous space and time with smooth chemical concentrations. Both belong to the broader class of excitable media. Wolfram's classification of cellular automata (Classes I-IV, analogous to fixed point, limit cycle, chaotic, and complex/edge-of-chaos dynamics) provides a unified framework. Class IV automata — including Life — are conjectured to be generically Turing-complete, suggesting that complexity and computation arise naturally at the "edge of chaos."</p>`,
   facts:[{e:'🐆',t:'Leopard spot size is tuned by the Turing diffusion ratio — in knockin mice with altered morphogen diffusivity, spots predictably change to stripes.'},{e:'🤖',t:'A fully functional Game-of-Life computer (capable of running any program) was constructed within the simulation and is documented on the LifeWiki.'},{e:'🔬',t:'CRISPR knockout of specific morphogen receptors produces the exact stripe-to-spot transitions predicted by Turing models in zebrafish.'}],
   formula:{rows:[
    {n:'Activator PDE',e:'∂u/∂t  =  D_u·∇²u  +  f(u,v)'},
    {n:'Inhibitor PDE',e:'∂v/∂t  =  D_v·∇²v  +  g(u,v)'},
    {sep:1},
    {n:'Turing instability',e:'det(J − k²D) = 0  for some  k ≠ 0'},
    {n:'Condition (necessary)',e:'D_v / D_u  >>  1   (fast inhibitor)'},
    {sep:1},
    {n:'Pattern wavelength',e:'λ*  =  2π/k*   where  k* = argmax σ(k)'},
    {n:'Dispersion relation',e:'σ(k)  =  ½[ tr(J) − (D_u+D_v)k²  ±  √Δ ]'},
   ]},sim:'life'},
 }},

{id:'dna',group:'🧬 Biology',emoji:'🧬',color:'#16a34a',light:'#f0fdf4',
 title:'DNA & Genetics',teaser:'Every cell in your body carries a 2-metre-long instruction manual, written in a 4-letter alphabet, that makes you uniquely you.',chips:['DNA','Genes','Heredity'],
 lvls:{
  junior:{icon:'🔬',title:'The instruction manual inside every cell!',
   body:`<p>Inside almost every single cell in your body — and you have 37 trillion of them — there is a complete set of instructions for building and running an entire human being. These instructions are written on a twisted ladder-shaped molecule called <strong>DNA</strong> (deoxyribonucleic acid). If you uncoiled all the DNA from just one of your cells and stretched it out, it would be about <strong>2 metres long</strong>. Yet it is so incredibly thin that it fits, neatly folded, inside a space far smaller than the full stop at the end of this sentence.</p>
<p>DNA is written in an alphabet of just <strong>four letters</strong> — A, T, C, and G — representing four chemical building blocks called bases. The entire human genome contains about 3.2 billion of these letters. Specific stretches of this text are called <strong>genes</strong>, and each gene is an instruction for building one protein. Proteins do almost everything in your body: they form your muscles, carry oxygen in your blood, digest your food, and defend you from disease.</p>
<p>The most remarkable thing is that every time a cell divides, the entire 3.2-billion-letter text is copied — accurately — in just a few hours. The machinery that does this makes roughly one error per billion letters copied. That's like copying out 3,000 books and making just three typos. In the simulation below, watch the DNA double helix unwind and replicate in real time.</p>`,
   facts:[{e:'📏',t:'All the DNA in your body, laid end to end, would stretch from Earth to Pluto and back — twice. You carry about 70 billion kilometres of DNA.'},{e:'👯',t:'You share 99.9% of your DNA with every other human on Earth. The 0.1% difference — about 3 million letters — is what makes you unique.'},{e:'🍌',t:'You share 60% of your DNA with a banana. Life on Earth is surprisingly related — all organisms use the same 4-letter DNA code.'}],
   formula:null,sim:'dna'},

  student:{icon:'🧬',title:'DNA replication, transcription, translation, and Mendelian genetics',
   body:`<p>DNA has a double-helix structure (Watson & Crick, 1953) — two antiparallel polynucleotide strands held together by complementary base pairing: A pairs with T (2 hydrogen bonds) and C pairs with G (3 hydrogen bonds). The sugar-phosphate backbone runs 5′→3′ on each strand. <strong>Replication</strong> is semi-conservative: helicase unwinds the helix, primase lays RNA primers, and DNA polymerase III synthesises the new strand 5′→3′, producing one continuous leading strand and a discontinuous lagging strand (Okazaki fragments joined by ligase). Fidelity is ~10⁻⁹ errors per base pair, achieved through polymerase proofreading (3′→5′ exonuclease activity) and mismatch repair.</p>
<p>The <strong>central dogma</strong> (Crick, 1958): DNA → RNA → protein. <em>Transcription</em>: RNA polymerase II binds a promoter (TATA box, ~30 bp upstream), unwinds DNA, and synthesises pre-mRNA 5′→3′. Introns are spliced out by the spliceosome; the mature mRNA is 5′-capped and 3′-polyadenylated. <em>Translation</em>: ribosomes read codons (triplets) in the mRNA; each codon specifies one amino acid via the <strong>genetic code</strong> (64 codons → 20 amino acids + 3 stop codons). tRNAs deliver amino acids; the polypeptide grows from N- to C-terminus.</p>
<p><strong>Mendelian genetics</strong> (Mendel, 1866): genes exist in two copies (alleles) — one inherited from each parent. <em>Dominant</em> alleles mask <em>recessive</em> ones. For a monohybrid cross Aa × Aa: genotype ratio 1 AA : 2 Aa : 1 aa; phenotype ratio 3 dominant : 1 recessive. The chi-squared test χ² = Σ(O−E)²/E assesses goodness of fit to expected Mendelian ratios. Modern genetics extends Mendel with codominance, incomplete dominance, polygenic traits, and epistasis.</p>`,
   facts:[{e:'✂️',t:'CRISPR-Cas9 can edit a specific sequence among 3.2 billion base pairs with the precision of finding and changing one word in a 1,000-book library.'},{e:'👴',t:'Telomeres — protective caps on chromosome ends — shorten with each cell division. Their length is a molecular clock of ageing.'},{e:'🎨',t:'Eye colour, height, and IQ are all polygenic — influenced by hundreds of genes simultaneously, not a single dominant/recessive pair.'}],
   formula:{rows:[
    {n:'Base pairing',e:'A ≡ T  (2 H-bonds)     G ≡ C  (3 H-bonds)'},
    {n:'Complementarity',e:'5′-ATCG-3′   pairs with   3′-TAGC-5′'},
    {sep:1},
    {n:'Replication fidelity',e:'~1 error / 10⁹ bp   (with proofreading)'},
    {n:'Central dogma',e:'DNA  →  mRNA  →  protein'},
    {sep:1},
    {n:'Genetic code',e:'64 codons  →  20 amino acids + 3 stop'},
    {n:'Mendelian F₂ ratio',e:'Aa × Aa  →  1 AA : 2 Aa : 1 aa   (3:1 phenotype)'},
   ]},sim:'dna'},

  scholar:{icon:'∂',title:'Population genetics, Hardy-Weinberg equilibrium, and molecular evolution',
   body:`<p>The <strong>Hardy-Weinberg principle</strong> (1908) describes allele frequency dynamics in an idealised population (infinite size, random mating, no selection, mutation, or migration). For a biallelic locus with allele frequencies p and q = 1−p, genotype frequencies at equilibrium are p² (AA) : 2pq (Aa) : q² (aa), and remain constant across generations. Deviations from H-W equilibrium signal evolutionary forces at work. The <strong>fixation index</strong> F_ST = (H_T − H_S)/H_T measures genetic differentiation between subpopulations; F_ST = 0 implies panmixia, F_ST = 1 implies complete isolation.</p>
<p><strong>Molecular evolution</strong> proceeds via mutation, genetic drift, and natural selection. The <strong>neutral theory</strong> (Kimura, 1968) proposes that most molecular variants are selectively neutral; fixation occurs by drift at rate equal to the mutation rate μ. Synonymous (silent) substitutions accumulate faster than nonsynonymous ones; the ratio dN/dS (ω) tests for selection: ω &lt; 1 indicates purifying selection, ω &gt; 1 positive selection, ω ≈ 1 neutrality. The <strong>molecular clock</strong> hypothesis states that neutral substitutions accumulate at a roughly constant rate, enabling phylogenetic dating.</p>
<p><strong>Quantitative genetics</strong> decomposes phenotypic variance: V_P = V_A + V_D + V_I + V_E, where V_A is additive genetic variance (the component visible to selection), V_D dominance variance, V_I epistatic variance, V_E environmental variance. <strong>Heritability</strong> h² = V_A/V_P measures the proportion of phenotypic variation attributable to additive genetic effects. GWAS (genome-wide association studies) scan ~10⁷ SNPs across thousands of individuals; hits explain only a fraction of h² for complex traits — the "missing heritability" problem — attributable to rare variants, gene-environment interactions, and epistasis too complex for additive models.</p>`,
   facts:[{e:'🌍',t:'Out-of-Africa bottleneck ~70,000 years ago reduced human genetic diversity so severely that chimpanzees in a single forest show more genetic variation than all 8 billion humans.'},{e:'🔬',t:'The first complete human genome (HGP, 2003) cost $2.7 billion and took 13 years. Today a genome costs ~$200 and takes one day.'},{e:'⚡',t:'Transposable elements ("jumping genes") constitute ~45% of the human genome — more than protein-coding genes (only ~1.5%).'}],
   formula:{rows:[
    {n:'Hardy-Weinberg',e:'p² + 2pq + q²  =  1,   p + q = 1'},
    {n:'F_ST',e:'F_ST  =  (H_T − H_S) / H_T'},
    {sep:1},
    {n:'Neutral fixation rate',e:'k  =  μ   (Kimura 1968)'},
    {n:'Selection test',e:'ω  =  dN/dS:   <1 purifying,  >1 positive'},
    {sep:1},
    {n:'Phenotypic variance',e:'V_P  =  V_A + V_D + V_I + V_E'},
    {n:'Narrow heritability',e:'h²  =  V_A / V_P'},
   ]},sim:'dna'},
 }},

{id:'evolution',group:'🧬 Biology',emoji:'🦕',color:'#ca8a04',light:'#fefce8',
 title:'Evolution & Natural Selection',teaser:'Every living thing on Earth shares a common ancestor. Four billion years of trial and error, guided by one simple rule.',chips:['Selection','Adaptation','Speciation'],
 lvls:{
  junior:{icon:'🌱',title:'How life changes — one generation at a time!',
   body:`<p>Imagine a population of beetles living on brown soil. Most are brown, but a few are bright green — a rare mutation. A bird flying overhead easily spots and eats the green beetles, but misses the brown ones. The brown beetles survive, reproduce, and pass their brown colour to their offspring. After many generations, almost every beetle is brown. This is <strong>natural selection</strong> at work — the single most powerful idea in all of biology.</p>
<p>Charles Darwin realised in 1859 that all life on Earth is shaped by this simple process: individuals with traits that help them survive and reproduce have more offspring, passing those traits to the next generation. Over millions of years, this accumulates into breathtaking diversity — from bacteria to blue whales, from mushrooms to maple trees. Every living thing you have ever seen is the product of an unbroken chain of successful survival stretching back <strong>3.8 billion years</strong> to the very first cell.</p>
<p>The evidence for evolution is overwhelming and comes from every direction: the fossil record shows gradual changes over time; DNA comparisons reveal exactly how closely related all organisms are; antibiotic-resistant bacteria and pesticide-resistant insects are evolution happening in real time, right now. In the simulation below, watch a population evolve before your eyes as selection pressure changes.</p>`,
   facts:[{e:'🦠',t:'Bacteria can evolve antibiotic resistance in as little as 11 days — evolution is not a slow process when generations are short.'},{e:'🐋',t:'Whales evolved from land mammals about 50 million years ago. Their ancestors were four-legged, deer-like creatures that waded into rivers to feed.'},{e:'👁️',t:'The eye evolved independently at least 40 separate times in different animal lineages — the same useful solution, discovered over and over by natural selection.'}],
   formula:null,sim:'evolution'},

  student:{icon:'🦕',title:'Population genetics of selection, drift, and speciation',
   body:`<p>Evolution is defined as <strong>change in allele frequencies over time</strong> in a population. Four mechanisms drive this: <em>natural selection</em> (differential survival/reproduction), <em>genetic drift</em> (random sampling in finite populations), <em>mutation</em> (new variation), and <em>gene flow</em> (migration between populations). Selection on a diploid locus with alleles A₁ (frequency p) and A₂ (frequency q = 1−p) with fitness w₁₁, w₁₂, w₂₂ changes p each generation by <span class="mk">Δp = pq[p(w₁₁−w₁₂) + q(w₁₂−w₂₂)] / w̄</span>, where w̄ = p²w₁₁ + 2pqw₁₂ + q²w₂₂ is mean population fitness. Mean fitness always increases under selection — <strong>Fisher's Fundamental Theorem</strong>: the rate of increase in mean fitness equals the additive genetic variance in fitness.</p>
<p><strong>Genetic drift</strong> is the random change in allele frequencies due to finite population size N. In each generation, allele frequency changes by a random amount with variance p(1−p)/(2N). Over time, drift causes alleles to fix (p→1) or be lost (p→0); the expected time to fixation for a neutral allele starting at frequency p is −4N·[p·ln(p) + (1−p)·ln(1−p)] generations. In small populations, drift overpowers selection when the selective advantage s &lt; 1/(2N) — many mildly deleterious mutations can fix by drift alone.</p>
<p><strong>Speciation</strong> occurs when populations diverge until they can no longer interbreed. <em>Allopatric speciation</em> (geographic isolation) is the most common route: separated populations accumulate different mutations and adaptations until reproductive isolation evolves. <em>Sympatric speciation</em> (in the same location) requires strong disruptive selection. The <strong>biological species concept</strong> (Mayr) defines a species as a group of actually or potentially interbreeding populations reproductively isolated from others — though it fails for asexual organisms and fossils, motivating phylogenetic and ecological species concepts.</p>`,
   facts:[{e:'🐟',t:'The 500+ cichlid species in Lake Victoria evolved from a common ancestor in as little as 15,000 years — one of the fastest speciation events ever documented.'},{e:'🌺',t:'Darwin\'s finches on the Galápagos Islands show beak evolution measurable within a single human lifetime — Peter and Rosemary Grant documented it over 40 years of fieldwork.'},{e:'🦠',t:'The Lenski experiment has tracked E. coli evolution in real time since 1988 — over 80,000 generations, observing key innovations including the ability to consume citrate aerobically.'}],
   formula:{rows:[
    {n:'Selection (Δp)',e:'Δp  =  pq[p(w₁₁−w₁₂) + q(w₁₂−w₂₂)] / w̄'},
    {n:'Mean fitness',e:'w̄  =  p²w₁₁ + 2pq·w₁₂ + q²·w₂₂'},
    {sep:1},
    {n:'Fisher\'s theorem',e:'Δw̄  =  V_A(w) / w̄   (≥ 0)'},
    {n:'Drift variance',e:'Var(Δp)  =  p(1−p) / (2N)'},
    {sep:1},
    {n:'Fixation time (neutral)',e:'t̄_fix  =  −4N[p·ln p + (1−p)·ln(1−p)]'},
    {n:'Selection vs drift',e:'selection dominates when  s >> 1/(2N)'},
   ]},sim:'evolution'},

  scholar:{icon:'∂',title:'Phylogenetics, the modern synthesis, and evo-devo',
   body:`<p>The <strong>Modern Synthesis</strong> (1930s–50s, Fisher, Wright, Haldane, Dobzhansky, Mayr) unified Mendelian genetics with Darwinian natural selection into a coherent mathematical framework. The central result is that continuous phenotypic variation arises from many Mendelian loci, each with small effect. Population genetics provides the quantitative theory of allele dynamics; the coalescent (Kingman, 1982) traces the genealogy of a sample of alleles backwards in time — all copies of a gene in a population coalesce to a single ancestral copy (the <em>most recent common ancestor</em>, MRCA) on a timescale of ~4N_e generations for diploids. The coalescent is the standard null model for molecular population genetics and phylogenetic inference.</p>
<p><strong>Phylogenetics</strong> reconstructs the tree of life from molecular data. Maximum likelihood methods find the tree topology T and branch lengths that maximise P(data|T, model). The GTR (general time-reversible) substitution model with Γ-distributed rate variation is the standard for nucleotide sequences. Bayesian phylogenetics (MrBayes, BEAST) samples from the posterior P(T, model|data) via MCMC, providing credible intervals on divergence times when combined with fossil calibrations. The <strong>molecular clock</strong>, corrected for rate variation (relaxed clock), places the origin of eukaryotes at ~2 Gya, animals ~750 Mya, and tetrapods ~375 Mya.</p>
<p><strong>Evo-devo</strong> (evolutionary developmental biology) reveals that morphological diversity arises largely from changes in gene regulation rather than gene content. The <em>Hox genes</em> — a conserved cluster of transcription factors specifying body-axis identity — are present in all bilaterians; their expression boundaries, not their sequences, determine whether a segment grows a leg, a wing, or a vertebra. The concept of the <em>developmental toolkit</em> (Pax6 for eyes, Dlx for limbs, Nkx2.5 for heart) shows that evolution reuses the same molecular components in new contexts — explaining the convergent evolution of eyes, limbs, and hearts across vastly divergent lineages.</p>`,
   facts:[{e:'🧬',t:'Hox genes are so conserved that a mouse Hox gene transplanted into a fruit fly can rescue the fly\'s development — separated by 600 million years of evolution.'},{e:'🌳',t:'The last universal common ancestor (LUCA) of all life lived ~3.8 billion years ago. It already had ribosomes, DNA replication, and a genetic code — implying a long prior evolution we cannot yet see.'},{e:'🔬',t:'Ancient DNA from Neanderthal bones sequenced in 2010 shows that all non-African humans carry 1–4% Neanderthal DNA — evidence of interbreeding ~50,000 years ago.'}],
   formula:{rows:[
    {n:'Coalescent time (diploid)',e:'E[T_MRCA]  ≈  4·N_e  generations'},
    {n:'Watterson\'s θ',e:'θ_W  =  S / a_n,   a_n = Σ_{i=1}^{n-1} 1/i'},
    {sep:1},
    {n:'Maximum likelihood tree',e:'T*  =  argmax_T  P(data | T, model)'},
    {n:'GTR model',e:'Q_{ij}  =  π_j · r_{ij}  (i≠j),   rows sum to 0'},
    {sep:1},
    {n:'dN/dS ratio',e:'ω < 1 purifying   ω = 1 neutral   ω > 1 positive'},
    {n:'Tajima\'s D',e:'D  =  (π − θ_W) / SD   tests neutrality'},
   ]},sim:'evolution'},
 }},

 // ── ECOSYSTEMS ────────────────────────────────────────────────────
{id:'ecosystem',group:'🧬 Biology',emoji:'🌿',color:'#15803d',light:'#f0fdf4',
 title:'Ecosystems & Food Webs',teaser:'Remove one species from a forest and the whole system can collapse. Every living thing is connected in a web of energy and dependency.',chips:['Food Webs','Energy','Biodiversity'],
 lvls:{
  junior:{icon:'🌍',title:'Nature\'s web — everything eats everything!',
   body:`<p>Imagine a meadow in summer. Grass soaks up sunlight and grows. A grasshopper eats the grass. A frog eats the grasshopper. A snake eats the frog. A hawk eats the snake. Each creature depends on the ones below it for food and energy. This chain of eating and being eaten is called a <strong>food chain</strong> — and real ecosystems contain hundreds of overlapping food chains, woven together into a complex <strong>food web</strong>.</p>
<p>All the energy in a food web comes originally from the Sun. Plants and algae capture sunlight through <strong>photosynthesis</strong> and convert it into sugars — they are called <strong>producers</strong>. Animals that eat plants are <strong>primary consumers</strong>; animals that eat those animals are <strong>secondary consumers</strong>, and so on. But here is the amazing and important rule: at each step, roughly <strong>90% of the energy is lost</strong> as heat. This is why there are always far more plants than herbivores, and far more herbivores than predators. You can never have more lions than wildebeest!</p>
<p>The consequences of removing a species from a food web can be dramatic and unexpected. When wolves were hunted to extinction in Yellowstone National Park, elk populations exploded, overgrazing riverbanks. Rivers eroded and changed course. Fish populations crashed. The entire landscape transformed — all because one predator was removed. When wolves were reintroduced in 1995, the whole system slowly recovered. Ecologists call animals like wolves <strong>keystone species</strong> — their outsized effect on the ecosystem is far greater than their numbers suggest.</p>`,
   facts:[{e:'🌳',t:'A single large oak tree can support over 500 species of insects, birds, and fungi — a one-tree ecosystem within an ecosystem.'},{e:'🐺',t:'After wolves returned to Yellowstone in 1995, they triggered a "trophic cascade" that changed the course of rivers — their effect rippled through the entire food web.'},{e:'🌊',t:'Phytoplankton in the oceans produce about 50% of all Earth\'s oxygen — more than all the world\'s rainforests combined.'}],
   formula:null,sim:'ecosystem'},

  student:{icon:'🌿',title:'Energy flow, trophic dynamics, and the Lotka-Volterra equations',
   body:`<p>Ecosystems are open thermodynamic systems: energy enters as solar radiation, flows through trophic levels, and exits as heat. The <strong>10% rule</strong> (Lindeman, 1942) states that roughly 10% of energy at one trophic level is incorporated into biomass at the next — the rest is lost to respiration, excretion, and decomposition. Consequently, the number of trophic levels in a food chain is typically limited to 4–5. <strong>Net Primary Production</strong> (NPP) is the rate at which producers fix energy minus their own respiration; globally ~120 PgC/yr, with tropical forests and open ocean contributing most.</p>
<p>Predator-prey dynamics are captured by the <strong>Lotka-Volterra equations</strong> (1925–26): prey population N grows at rate r but is consumed by predators P at rate aNP; predator population grows by consuming prey (efficiency e) but dies at rate d: <span class="mk">dN/dt = rN − aNP</span> and <span class="mk">dP/dt = eaNP − dP</span>. The system has a non-trivial equilibrium at N* = d/(ea), P* = r/a, around which populations oscillate neutrally. Real predator-prey cycles (lynx-hare in Canada, measured over 90 years via Hudson's Bay Company fur records) show these oscillations with a ~10-year period, though with additional stabilising mechanisms.</p>
<p><strong>Food web structure</strong> can be quantified using network theory: connectance C = L/(S²) (where L = links, S = species) determines stability. May's stability criterion (1972) states a random community matrix is stable iff <span class="mk">(SC)^{1/2} · σ &lt; 1</span> (where σ is interaction strength), creating a diversity-stability paradox — larger, more connected webs are harder to stabilise. Empirical food webs are more stable than random because they have <em>weak interactions</em> (most links have low strength) and <em>compartmentalisation</em> (modular structure limits cascade propagation). Keystone species have high interaction strength but low biomass — their removal disproportionately increases connectance variance.</p>`,
   facts:[{e:'🎣',t:'The collapse of the Grand Banks cod fishery in 1992 removed ~99% of the cod population in decades — despite the fish\'s 200-million-year evolutionary history in those waters.'},{e:'🌺',t:'Mycorrhizal fungal networks connect trees in a forest, transferring carbon and nutrients between individuals — the "Wood Wide Web" enables mother trees to feed seedlings.'},{e:'🦈',t:'Removing sharks from an ecosystem triggers a trophic cascade: their prey (rays) explode in number and devastate scallop populations — as documented off the US East Coast.'}],
   formula:{rows:[
    {n:'Lotka-Volterra (prey)',e:'dN/dt  =  rN  −  aNP'},
    {n:'Lotka-Volterra (pred.)',e:'dP/dt  =  eaNP  −  dP'},
    {sep:1},
    {n:'Equilibrium',e:'N*  =  d/(ea),   P*  =  r/a'},
    {n:'10% rule (Lindeman)',e:'NPP_{n+1}  ≈  0.1 × NPP_n'},
    {sep:1},
    {n:'Food web connectance',e:'C  =  L / S²'},
    {n:'May\'s stability criterion',e:'(S·C)^{½} · σ  <  1   for stability'},
   ]},sim:'ecosystem'},

  scholar:{icon:'∂',title:'Metabolic theory of ecology, biodiversity, and tipping points',
   body:`<p>The <strong>Metabolic Theory of Ecology</strong> (MTE, Brown et al. 2004) derives ecological patterns from first principles of metabolism. Individual metabolic rate B scales with body mass M and temperature T: <span class="mk">B = b₀ · M^{3/4} · e^{−E/kT}</span>, where E ≈ 0.65 eV is the average activation energy of metabolic reactions and k is Boltzmann's constant. The M^{3/4} scaling (Kleiber's law) arises from the fractal geometry of resource distribution networks (West, Brown & Enquist, 1997). MTE predicts how population density, growth rates, home range sizes, and evolutionary rates all scale with body mass and temperature — with remarkable empirical support across 27 orders of magnitude of body mass.</p>
<p><strong>Species-area relationships</strong> and <strong>island biogeography theory</strong> (MacArthur & Wilson, 1967) predict species richness S on islands of area A: <span class="mk">S = cA^z</span>, where z ≈ 0.25–0.35 empirically. The dynamic equilibrium model balances immigration rate (decreasing with distance from mainland) against extinction rate (decreasing with island area). Species richness at equilibrium is determined by the intersection of these curves. The theory predicts that habitat fragmentation — converting continuous habitat into islands — reduces biodiversity predictably, providing the quantitative basis for conservation area design and the SLOSS debate (Single Large Or Several Small reserves).</p>
<p><strong>Ecological tipping points</strong> arise from alternative stable states: ecosystems can exist in multiple stable configurations, and perturbations can push them past a bifurcation point into a qualitatively different regime. Classic examples include the regime shift from clear to turbid water in shallow lakes (driven by phosphorus loading and macrophyte-turbidity feedbacks), coral-algal phase transitions, and Amazon dieback. Early warning signals (critical slowing down: increasing variance and autocorrelation in time series near a tipping point) can in principle detect approaching transitions before they occur — a rapidly developing research area with urgent applications to climate and biodiversity policy.</p>`,
   facts:[{e:'🐘',t:'Metabolic rate scales as M^{3/4} across 27 orders of magnitude of body size — from bacteria to blue whales — one of ecology\'s most precise and universal laws.'},{e:'🌳',t:'Deforestation of the Amazon beyond ~20–25% may trigger a self-reinforcing dieback — the forest stops generating its own rainfall and converts to savanna. Current deforestation stands at ~17%.'},{e:'🐠',t:'Coral reefs occupy &lt;1% of the ocean floor but harbour ~25% of all marine species — the highest biodiversity density of any ecosystem, maintained by a complex web of mutualisms.'}],
   formula:{rows:[
    {n:'Metabolic rate (MTE)',e:'B  =  b₀ · M^{3/4} · e^{−E/kT}',c:'E ≈ 0.65 eV'},
    {n:'Kleiber\'s law',e:'B  ∝  M^{3/4}   across all life'},
    {sep:1},
    {n:'Species-area',e:'S  =  c · A^z,   z ≈ 0.25–0.35'},
    {n:'Island biogeography',e:'Ŝ  =  intersection of immigration & extinction curves'},
    {sep:1},
    {n:'Critical slowing down',e:'return time  ~  1/(λ_1)   → ∞  near bifurcation'},
    {n:'Lotka-Volterra extended',e:'dxᵢ/dt  =  xᵢ(rᵢ + Σⱼ αᵢⱼ xⱼ)   (community matrix)'},
   ]},sim:'ecosystem'},
 }},

// ── COMPUTER SCIENCE ─────────────────────────────────────────────
{id:'sorting',group:'💻 Computer Science',emoji:'🔀',color:'#6366f1',light:'#f0f0ff',
 title:'Sorting Algorithms',teaser:'How does a computer sort a million numbers in milliseconds — and why does strategy matter?',chips:['Algorithms','Big-O','CS'],
 lvls:{
  junior:{icon:'📚',title:'Putting things in order — the clever way!',
   body:`<p>Imagine you have a big stack of cards, each with a different number, all shuffled. Your job: put them in order from smallest to biggest. You could pick them up one by one, compare each to the others, and slot it into place. Simple! But if you had a million cards, this approach could take years.</p>
<p>Computers face this exact problem constantly — sorting your emails by date, your photos by time, search results by relevance, contacts alphabetically. A <strong>sorting algorithm</strong> is a precise, step-by-step recipe a computer follows to sort things. The clever insight: some recipes are astronomically faster than others, even for the exact same task!</p>
<p>The simplest method, called <strong>Bubble Sort</strong>, goes through the list comparing neighbours, swapping them if they're in the wrong order, and repeating until the list is sorted. It works, but it's slow — like checking every single pair of cards. The smarter method, <strong>Merge Sort</strong>, uses a brilliant divide-and-conquer idea: split the list in half, sort each half, then merge the two sorted halves together. By splitting and merging repeatedly, it sorts a million cards in seconds rather than years!</p>`,
   facts:[{e:'📧',t:'Your email app sorts thousands of messages almost instantly using variants of Merge Sort and QuickSort.'},{e:'🗺️',t:'Google Maps finds the shortest route through billions of road segments in under a second — using specialised graph algorithms.'},{e:'🎮',t:'Video games sort thousands of 3D objects by distance every frame to render them in the correct depth order!'}],
   formula:null,sim:'sorting'},

  student:{icon:'⏱️',title:'Big-O Complexity: measuring algorithmic efficiency',
   body:`<p>The efficiency of a sorting algorithm is described by how its running time grows as the input size n grows. We use <strong>Big-O notation</strong> to capture this growth rate, focusing on the worst case. The key insight is that absolute speed is hardware-dependent, but growth rate is intrinsic to the algorithm.</p>
<p><strong>Bubble Sort</strong> compares adjacent pairs and bubbles large elements rightward. For n elements it performs up to n(n−1)/2 comparisons — O(n²). Double the input, quadruple the work. For n = 10⁶: ~500 billion comparisons. At 10⁹ comparisons/second, that's ~8 minutes.</p>
<p><strong>Merge Sort</strong> uses divide-and-conquer: split into halves, recursively sort each, merge the sorted halves. The merge step takes O(n) work and the recursion tree has log₂n levels, giving total work O(n log n). For n = 10⁶: ~20 million comparisons — 25,000× faster than Bubble Sort! The trade-off is extra memory: Merge Sort needs O(n) auxiliary space for the merge step.</p>
<p><strong>QuickSort</strong> selects a pivot element, partitions the array into "less than pivot" and "greater than pivot" halves, and recurses on each. Average case O(n log n) with excellent cache performance; worst case O(n²) for already-sorted input (mitigated by random pivot selection). Python and Java use <strong>TimSort</strong> — a hybrid of Merge Sort and Insertion Sort that exploits naturally occurring runs of sorted data, achieving O(n) on nearly-sorted inputs.</p>`,
   facts:[{e:'⚡',t:'Sorting 1,000,000 elements: Bubble Sort ≈ 8 minutes; Merge Sort ≈ 0.02 seconds. Same problem, 25,000× faster — from pure strategy.'},{e:'🧮',t:'Comparison-based sorting has a proven lower bound of Ω(n log n) — no comparison sort can be asymptotically faster, ever.'},{e:'🔢',t:'Radix Sort bypasses the comparison lower bound by sorting digit-by-digit, achieving O(nk) for k-digit integers.'}],
   formula:{rows:[
    {n:'Bubble Sort',e:'T(n)  =  O(n²)',c:'stable; slow for large n'},
    {n:'Merge Sort',e:'T(n)  =  O(n log n)',c:'stable; O(n) extra space'},
    {n:'QuickSort',e:'T(n)  =  O(n log n) avg,  O(n²) worst',c:'in-place; fast in practice'},
    {sep:1},
    {n:'Comparison lower bound',e:'Any comparison sort:  Ω(n log n)',c:'information-theoretic proof'},
    {sep:1},
    {n:'Merge recurrence',e:'T(n)  =  2T(n/2)  +  O(n)',c:'Master Theorem → O(n log n)'},
   ]},sim:'sorting'},

  scholar:{icon:'Ω',title:'Computational Complexity, the Master Theorem, and lower bound proofs',
   body:`<p>Algorithm analysis rigorously characterises the worst-case time T(n), average-case, and best-case complexity as functions of input size. The <strong>Master Theorem</strong> solves divide-and-conquer recurrences of the form <span class="mk">T(n) = a·T(n/b) + f(n)</span> (a subproblems of size n/b, with f(n) work at each level): <br>Case 1: if <span class="mk">f(n) = O(n^{log_b a − ε})</span>, then T(n) = Θ(n^{log_b a}); <br>Case 2: if <span class="mk">f(n) = Θ(n^{log_b a})</span>, then T(n) = Θ(n^{log_b a} log n); <br>Case 3: if <span class="mk">f(n) = Ω(n^{log_b a + ε})</span> and af(n/b) ≤ cf(n), then T(n) = Θ(f(n)).<br>For Merge Sort: a=2, b=2, f(n)=Θ(n), so f(n) = Θ(n^{log₂2}) = Θ(n) — Case 2 gives T(n) = Θ(n log n).</p>
<p>The <strong>Ω(n log n) lower bound</strong> for comparison-based sorting follows from an information-theoretic argument. Any comparison-based sort can be modelled as a binary decision tree: each internal node represents a comparison (is A[i] ≤ A[j]?), and each leaf represents a complete sorted permutation. For n elements, there are n! distinct permutations, so the tree must have ≥ n! leaves. A binary tree of height h has at most 2^h leaves, so h ≥ log₂(n!). By Stirling's approximation, log₂(n!) = n log₂ n − n·log₂ e + O(log n) = Ω(n log n). Therefore any comparison sort must make Ω(n log n) comparisons in the worst case — Merge Sort and HeapSort achieve this and are thus optimal among comparison sorts.</p>
<p>Non-comparison sorts circumvent this bound by exploiting structure. <strong>Counting Sort</strong> achieves O(n + k) for integers in [0,k]; <strong>Radix Sort</strong> achieves O(d(n+k)) for d-digit base-k numbers; <strong>Bucket Sort</strong> achieves expected O(n) for uniformly distributed data. These are not contradictions of the lower bound — they use operations other than pairwise comparisons.</p>
<p>Sorting connects to deeper complexity theory. The <strong>P vs NP problem</strong> — whether every problem whose solution can be verified in polynomial time can also be solved in polynomial time — is the central open question of theoretical CS. Sorting is in P (efficiently solvable), but problems like the Travelling Salesman Problem are NP-hard (believed to require exponential time in the worst case). A polynomial-time sorting algorithm exists; a polynomial-time optimal TSP algorithm would imply P = NP, with revolutionary consequences for cryptography, AI, and mathematics.</p>`,
   facts:[{e:'🔐',t:'RSA cryptography relies on the hardness of integer factorisation (believed NP-intermediate) — the best known algorithm runs in exp(O(n^{1/3})), not polynomial time.'},{e:'💾',t:'Cache-oblivious sorting algorithms (Frigo et al., 1999) achieve optimal cache performance at all cache sizes simultaneously using recursive structure.'},{e:'🧬',t:'Suffix array construction in O(n log n) (or O(n) with SA-IS) is the workhorse of genome assembly — sorting the ~3 billion suffixes of the human genome.'}],
   formula:{rows:[
    {n:'Master Theorem',e:'T(n)  =  a·T(n/b)  +  f(n)'},
    {n:'Case 2 (Merge Sort)',e:'f(n)=Θ(n^{log_b a})  →  T=Θ(n^{log_b a} log n)'},
    {sep:1},
    {n:'Comparison lower bound',e:'h  ≥  log₂(n!)  =  Ω(n log n)'},
    {n:'Stirling approx.',e:'log(n!)  =  n log n  −  n  +  O(log n)'},
    {sep:1},
    {n:'QuickSort average',e:'E[T(n)]  =  2n·H_n  −  2n  =  O(n log n)',c:'H_n: nth harmonic number'},
    {n:'Radix Sort',e:'T(n)  =  O( d·(n+k) )',c:'d digits, base k'},
   ]},sim:'sorting'},
 }},

{id:'ml',group:'💻 Computer Science',emoji:'🤖',color:'#6366f1',light:'#eef2ff',
 title:'Machine Learning & Neural Networks',teaser:'How does a computer learn to recognise your face, translate languages, and beat world champions at chess — without ever being explicitly programmed?',chips:['Neural Nets','Gradient Descent','AI'],
 lvls:{
  junior:{icon:'🧠',title:'Computers that learn from experience!',
   body:`<p>Imagine teaching a dog to sit. You don't give it a rulebook — you show it examples, reward it when it gets things right, and correct it when it goes wrong. After enough repetitions, the dog just knows. <strong>Machine learning</strong> works almost exactly the same way — except the "dog" is a computer program, and the "treats" are mathematical scores called rewards or loss values.</p>
<p>Traditional programming works by writing exact rules: "IF the email contains the word 'lottery' THEN mark it as spam." But what about emails that describe a lottery without using that word? A machine learning system instead looks at thousands of examples of real spam and real emails, finds hidden patterns humans would never think to write down, and builds its own internal rules automatically.</p>
<p>The most powerful form of machine learning today uses <strong>neural networks</strong> — layers of simple mathematical units loosely inspired by neurons in the brain. Each unit receives numbers, multiplies them by learned weights, and passes the result forward. A deep neural network with millions of these units, trained on billions of examples, is what recognises your face on your phone, translates between 100 languages in real time, and generates images from text descriptions. In the simulation below, watch a tiny neural network learn to classify points in real time.</p>`,
   facts:[{e:'👁️',t:'The neural network behind modern face recognition achieves 99.7% accuracy — surpassing the average human score of 97.5% on the same benchmark.'},{e:'♟️',t:'AlphaZero learned chess from scratch in 9 hours with no human knowledge except the rules — then defeated the world\'s best chess engine convincingly.'},{e:'🌡️',t:'Google\'s DeepMind reduced the energy used to cool its data centres by 40% using a neural network — saving the same energy as removing 100,000 cars from the road.'}],
   formula:null,sim:'ml'},

  student:{icon:'🤖',title:'Gradient descent, backpropagation, and the universal approximation theorem',
   body:`<p>A neural network with L layers computes <span class="mk">f(x) = W_L · σ(W_{L-1} · σ(… σ(W_1 x + b_1) …) + b_{L-1}) + b_L</span>, where σ is a nonlinear activation function (ReLU: σ(z) = max(0,z); sigmoid: σ(z) = 1/(1+e⁻ᶻ)) and W_i, b_i are learned weight matrices and bias vectors. Training minimises a loss function L(θ) — e.g. cross-entropy for classification: <span class="mk">L = −Σᵢ yᵢ log(ŷᵢ)</span> — over parameters θ = {W_i, b_i}.</p>
<p><strong>Gradient descent</strong> iteratively updates parameters in the direction of steepest descent: <span class="mk">θ ← θ − η·∇_θ L</span>, where η is the learning rate. Computing ∇_θ L requires <strong>backpropagation</strong>: the chain rule applied recursively backwards through the network. For a composition f = f_L ∘ … ∘ f_1, the gradient with respect to layer k parameters is <span class="mk">∂L/∂W_k = (∂L/∂f_L)(∂f_L/∂f_{L-1})…(∂f_{k+1}/∂f_k)(∂f_k/∂W_k)</span>. Stochastic gradient descent (SGD) uses mini-batches to estimate gradients noisily but cheaply; adaptive optimisers (Adam, RMSProp) maintain per-parameter learning rates for faster convergence.</p>
<p>The <strong>Universal Approximation Theorem</strong> (Cybenko 1989, Hornik 1991) guarantees that a single hidden layer with enough units can approximate any continuous function on a compact domain to arbitrary precision. Depth (many layers) provides exponential efficiency: functions requiring exponentially many units in a shallow network can be represented compactly in a deep one. <strong>Regularisation</strong> (dropout, weight decay, batch normalisation) prevents overfitting — memorising training data at the expense of generalisation — which is the central challenge of practical deep learning.</p>`,
   facts:[{e:'📊',t:'GPT-4 has an estimated 1.8 trillion parameters across 120 layers — trained on ~13 trillion tokens of text using roughly 25,000 A100 GPUs for 90 days.'},{e:'🎨',t:'Convolutional neural networks (CNNs) learn hierarchical features automatically: early layers detect edges, middle layers detect shapes, deep layers detect faces or objects.'},{e:'⚠️',t:'Vanishing gradients plagued deep networks until 2015: gradients shrink exponentially with depth, preventing learning. ReLU activations and residual connections (ResNets) solved this.'}],
   formula:{rows:[
    {n:'Forward pass',e:'a^{(l)}  =  σ(W^{(l)} a^{(l-1)} + b^{(l)})'},
    {n:'Cross-entropy loss',e:'L  =  −Σᵢ yᵢ · log(ŷᵢ)'},
    {sep:1},
    {n:'Gradient descent',e:'θ  ←  θ  −  η · ∇_θ L'},
    {n:'Backprop (chain rule)',e:'∂L/∂W^{(k)}  =  δ^{(k)} · (a^{(k-1)})ᵀ'},
    {sep:1},
    {n:'ReLU activation',e:'σ(z)  =  max(0, z)'},
    {n:'UAT (Cybenko 1989)',e:'∀ε>0, ∃ shallow net f_θ: ‖f−f_θ‖_∞ < ε'},
   ]},sim:'ml'},

  scholar:{icon:'∂',title:'Optimisation landscape, generalisation theory, and transformers',
   body:`<p>The loss surface L(θ) of a deep network is a non-convex function in millions of dimensions. Contrary to early fears, local minima are rarely a practical problem: in high dimensions, saddle points dominate, and most local minima have loss values close to the global minimum (Dauphin et al., 2014). The <strong>loss of sharpness</strong> — the largest eigenvalue λ_max of the Hessian ∂²L/∂θ² — correlates with generalisation: flat minima (small λ_max) generalise better than sharp ones. SAM (Sharpness-Aware Minimisation) explicitly seeks flat regions by solving <span class="mk">min_θ max_{‖ε‖≤ρ} L(θ+ε)</span>, consistently improving test accuracy.</p>
<p><strong>Generalisation theory</strong> asks: why do overparameterised networks (parameters ≫ data points) not overfit catastrophically? Classical VC theory predicts disaster; the empirical reality shows "benign overfitting" — perfect training fit with good test performance. Modern understanding invokes the <em>implicit bias</em> of SGD (which finds minimum-norm solutions), the <em>double descent</em> phenomenon (test error decreases again beyond the interpolation threshold), and PAC-Bayes bounds: <span class="mk">L(f) ≤ L̂(f) + √[(KL(Q‖P) + ln(n/δ))/(2n)]</span>, which remain non-vacuous for deep networks when the prior P is chosen carefully.</p>
<p>The <strong>Transformer architecture</strong> (Vaswani et al., 2017) replaced recurrence with <em>self-attention</em>: for queries Q, keys K, values V, the attention output is <span class="mk">Attention(Q,K,V) = softmax(QKᵀ/√d_k)·V</span>. Each token attends to all others in O(n²) time and O(1) sequential steps. Multi-head attention runs h parallel attention heads, each learning different relationship patterns. Positional encodings inject sequence order. Transformers scale predictably: the Chinchilla scaling laws (Hoffmann et al., 2022) show that optimal compute allocation follows N_params ∝ C^{0.5} and N_tokens ∝ C^{0.5} — model size and training data should scale equally with compute budget.</p>`,
   facts:[{e:'🔢',t:'The "grokking" phenomenon: networks can suddenly jump from memorisation to genuine generalisation millions of training steps after achieving 100% training accuracy.'},{e:'🌐',t:'Transformer attention is equivalent to a single step of gradient descent on an associative memory (Hopfield network) — connecting modern LLMs to 1980s memory models.'},{e:'📉',t:'Neural scaling laws are remarkably precise power laws: loss decreases as L ∝ N^{-0.076} with parameters N, holding across 7 orders of magnitude of model size.'}],
   formula:{rows:[
    {n:'Self-attention',e:'Attention(Q,K,V)  =  softmax(QKᵀ/√d_k) · V'},
    {n:'Multi-head',e:'MHA  =  concat(head_1,…,head_h) · W^O'},
    {sep:1},
    {n:'PAC-Bayes bound',e:'L(f)  ≤  L̂(f)  +  √[(KL(Q‖P) + ln(n/δ)) / 2n]'},
    {n:'Double descent',e:'test error has two peaks: at underfitting & interpolation threshold'},
    {sep:1},

   ]},sim:'ml'},
 }},

{id:'crypto',group:'💻 Computer Science',emoji:'🔐',color:'#0f766e',light:'#f0fdfa',
 title:'Cryptography & Security',teaser:'Every time you buy something online, mathematics shields your data from the entire internet. How does a secret stay secret in public?',chips:['Encryption','RSA','Quantum'],
 lvls:{
  junior:{icon:'🔑',title:'Secret messages and unbreakable locks!',
   body:`<p>Imagine you want to pass a secret note to a friend across a crowded room full of people who would love to read it. You could use a <strong>cipher</strong> — a secret code. The simplest cipher, used by Julius Caesar 2,000 years ago, shifts every letter by a fixed number: A becomes D, B becomes E, and so on. Your friend knows the shift and can decode it; everyone else just sees gibberish.</p>
<p>But there is a problem: how do you tell your friend the secret shift in the first place, without anyone overhearing? For thousands of years this was the central puzzle of cryptography. The answer, discovered in the 1970s, is almost magical: <strong>public-key cryptography</strong>. Imagine a special padlock that anyone can snap shut, but only you have the key to open. You can send your open padlock to anyone in the world over a public channel. They lock their message inside and send it back. Only you can open it — even though you never shared any secret!</p>
<p>This is how every secure website works today. When you see the little padlock icon in your browser, your computer and the server are using mathematics to create a shared secret in public, right in front of any eavesdropper — who still cannot figure it out. In the simulation below, watch the key exchange happen step by step.</p>`,
   facts:[{e:'🌐',t:'HTTPS encrypts over 95% of web traffic today. The mathematics protecting your passwords was essentially non-existent before 1976.'},{e:'🏦',t:'The RSA algorithm, invented in 1977, derives its security from the fact that multiplying two large primes takes milliseconds, but factoring the result takes longer than the age of the universe.'},{e:'⚛️',t:'Quantum computers could break RSA encryption — which is why governments worldwide are already transitioning to "post-quantum" cryptography standards.'}],
   formula:null,sim:'crypto'},

  student:{icon:'🔐',title:'RSA, Diffie-Hellman, and the mathematics of one-way functions',
   body:`<p><strong>RSA</strong> (Rivest-Shamir-Adleman, 1977) is based on the hardness of integer factorisation. Key generation: choose large primes p, q; compute n = pq and φ(n) = (p−1)(q−1); choose public exponent e with gcd(e, φ(n)) = 1; compute private key d ≡ e⁻¹ (mod φ(n)) via the extended Euclidean algorithm. Encryption: <span class="mk">c = mᵉ mod n</span>. Decryption: <span class="mk">m = cᵈ mod n</span>. Correctness follows from Euler's theorem: m^{φ(n)} ≡ 1 (mod n), so m^{ed} = m^{kφ(n)+1} ≡ m (mod n). Security rests on the assumption that computing d from (e, n) is as hard as factoring n — unproven but believed for n ≥ 2048 bits.</p>
<p><strong>Diffie-Hellman key exchange</strong> (1976) solves the key distribution problem using the discrete logarithm problem. Alice and Bob agree publicly on a prime p and generator g. Alice chooses secret a, sends A = gᵃ mod p. Bob chooses secret b, sends B = gᵇ mod p. Both compute shared secret K = Bᵃ mod p = Aᵇ mod p = g^{ab} mod p. An eavesdropper sees g, p, A, B but cannot recover a, b, or K without solving the discrete logarithm problem (computing log_g(A) mod p) — believed to be computationally infeasible for large p.</p>
<p><strong>Symmetric encryption</strong> (AES, ChaCha20) uses a shared secret key for bulk encryption — orders of magnitude faster than RSA. Modern TLS uses DH/ECDH for key exchange, then AES-GCM for the actual data: the hybrid approach combines the convenience of public-key cryptography with the speed of symmetric ciphers. <strong>Hash functions</strong> (SHA-256, SHA-3) map arbitrary data to a fixed-length digest: one-way (preimage resistance), collision-resistant, and avalanche-effect (flipping one input bit changes ~50% of output bits). They underpin digital signatures, certificate authorities, and blockchain.</p>`,
   facts:[{e:'🔢',t:'The RSA-2048 encryption key has 617 decimal digits. Factoring it with the best known algorithm on all current computers would take longer than the age of the universe.'},{e:'📱',t:'Your phone\'s HTTPS connection uses Elliptic Curve Diffie-Hellman (ECDH) — providing RSA-equivalent security with keys 20× smaller, thanks to the hardness of the elliptic curve discrete log.'},{e:'🏛️',t:'NIST standardised its first post-quantum cryptography algorithms in 2024 — CRYSTALS-Kyber for key exchange and CRYSTALS-Dilithium for signatures — both based on lattice problems.'}],
   formula:{rows:[
    {n:'RSA encrypt',e:'c  =  mᵉ  mod  n'},
    {n:'RSA decrypt',e:'m  =  cᵈ  mod  n,   d ≡ e⁻¹ (mod φ(n))'},
    {sep:1},
    {n:'Euler\'s theorem',e:'m^{φ(n)}  ≡  1  (mod n)   →   m^{ed} ≡ m'},
    {n:'DH shared secret',e:'K  =  g^{ab}  mod  p'},
    {sep:1},
    {n:'Hash (SHA-256)',e:'H: {0,1}*  →  {0,1}^{256}   (one-way, collision-resistant)'},
    {n:'Birthday bound',e:'collision found with prob ½ after ~√(2^{256}) ≈ 2^{128} queries'},
   ]},sim:'crypto'},

  scholar:{icon:'∞',title:'Information-theoretic security, lattice cryptography, and zero-knowledge proofs',
   body:`<p><strong>Shannon's perfect secrecy</strong> (1949) provides the gold standard: a cipher is perfectly secret iff the ciphertext reveals zero information about the plaintext — formally, P(M=m | C=c) = P(M=m) for all m, c. The <strong>one-time pad</strong> (c = m ⊕ k, with |k| = |m| and k uniformly random, used once) achieves perfect secrecy. Shannon proved it is the <em>only</em> perfectly secret cipher, and its key must be at least as long as the message — making it impractical for most applications. Modern cryptography relaxes perfect secrecy to <em>computational security</em>: security holds against polynomial-time adversaries, with negligible advantage.</p>
<p><strong>Lattice-based cryptography</strong> derives hardness from the <em>Shortest Vector Problem</em> (SVP) and <em>Learning With Errors</em> (LWE). In LWE, given many samples (aᵢ, bᵢ = aᵢ·s + eᵢ mod q) for secret vector s and small noise eᵢ, recovering s is believed hard even for quantum computers. The Ring-LWE variant works over polynomial rings ℤ_q[x]/(xⁿ+1), enabling efficient key exchange and fully homomorphic encryption. <strong>Fully homomorphic encryption</strong> (FHE, Gentry 2009) allows arbitrary computation on encrypted data — f(Enc(x)) = Enc(f(x)) — so a server can process sensitive data without ever seeing it. Practical FHE (CKKS, BFV schemes) is now within 100-1000× of plaintext computation speed.</p>
<p><strong>Zero-knowledge proofs</strong> (ZKPs, Goldwasser-Micali-Rackoff, 1985) allow a prover to convince a verifier that a statement is true without revealing <em>why</em> it is true. Formally, a ZKP for language L satisfies: completeness (honest prover always convinces verifier), soundness (dishonest prover convinces verifier with negligible probability), and zero-knowledge (verifier learns nothing beyond the truth of the statement). zk-SNARKs (Succinct Non-interactive ARguments of Knowledge) produce O(1)-size proofs verifiable in milliseconds, regardless of computation complexity. They now underpin privacy-preserving blockchains (Zcash), anonymous credentials, and verifiable ML inference.</p>`,
   facts:[{e:'🔮',t:'A zk-SNARK proof that a neural network produced a specific output can be generated and verified — without revealing the model weights or input data.'},{e:'🧮',t:'The LWE problem is so hard that even a quantum computer running Shor\'s algorithm (which breaks RSA) cannot solve it — no quantum speedup is known.'},{e:'🏆',t:'The 2012 Turing Award went to Silvio Micali and Shafi Goldwasser for inventing zero-knowledge proofs — originally considered a purely theoretical curiosity.'}],
   formula:{rows:[
    {n:'Perfect secrecy',e:'P(M=m | C=c)  =  P(M=m)   ∀ m,c'},
    {n:'One-time pad',e:'c  =  m ⊕ k,   |k| = |m|,   k uniform & secret'},
    {sep:1},
    {n:'LWE sample',e:'b_i  =  ⟨a_i, s⟩  +  e_i   (mod q),   e_i small'},
    {n:'Ring-LWE ring',e:'R_q  =  ℤ_q[x] / (xⁿ + 1)'},
    {sep:1},
    {n:'ZKP properties',e:'completeness  +  soundness  +  zero-knowledge'},
    {n:'zk-SNARK proof size',e:'|π|  =  O(1)   regardless of circuit size'},
   ]},sim:'crypto'},
 }},

{id:'complexity',group:'💻 Computer Science',emoji:'⚙️',color:'#7c3aed',light:'#f5f3ff',
 title:'Computation & Complexity',teaser:'Some problems are easy. Some are hard. And some are provably impossible — no matter how fast your computer gets. Why?',chips:['Turing','P vs NP','Decidability'],
 lvls:{
  junior:{icon:'🤔',title:'What can computers actually do — and what can\'t they?',
   body:`<p>Computers seem infinitely powerful. They can land rockets, beat grandmasters at chess, and generate photorealistic images from a sentence. But here is a profound surprise: there are problems that no computer — no matter how fast, how large, or how cleverly programmed — can ever solve. Not because we haven't built the right computer yet. Because it's <strong>mathematically impossible</strong>.</p>
<p>Alan Turing proved in 1936 — before modern computers even existed! — that no program can ever be written to reliably tell whether any other program will finish running or loop forever. This is called the <strong>Halting Problem</strong>, and it's genuinely, provably unsolvable. Turing showed this using a brilliant logical trick: if such a program existed, you could use it to create a paradox, just like the sentence "This statement is false."</p>
<p>Beyond what's impossible, there's the question of what's <em>hard</em>. Some problems are easy — sorting a list takes milliseconds. But others, like finding the shortest route through 1,000 cities, seem to require trying every possible combination — an astronomical number even for a supercomputer. The great unsolved question of computer science — and one of the most important open problems in all of mathematics — is whether these "hard" problems are genuinely hard, or whether we've just been too clever to find a shortcut yet. This is the famous <strong>P vs NP problem</strong>, with a $1,000,000 prize for whoever solves it.</p>`,
   facts:[{e:'💰',t:'The Clay Mathematics Institute offers $1,000,000 for solving P vs NP — it has been open since 1971 and most experts believe P ≠ NP, but no one can prove it.'},{e:'🔐',t:'All of modern internet security assumes P ≠ NP. If P = NP, encryption could be broken instantly and the entire financial system would collapse.'},{e:'♟️',t:'Chess is computationally "solved" in principle — perfect play exists — but calculating it would require more operations than there are atoms in the observable universe.'}],
   formula:null,sim:'complexity'},

  student:{icon:'⚙️',title:'Turing machines, decidability, and the complexity zoo',
   body:`<p>A <strong>Turing machine</strong> (TM) is a mathematical model of computation: an infinite tape, a read/write head, and a finite set of states with transition rules δ(state, symbol) → (new_state, new_symbol, direction). Despite its simplicity, the Church-Turing thesis conjectures that every effectively computable function is computable by some TM — i.e., Turing machines capture the full power of computation. The <strong>Universal Turing Machine</strong> (UTM) can simulate any other TM given its description as input: it is the theoretical basis of general-purpose computers.</p>
<p>The <strong>Halting Problem</strong>: does TM M halt on input w? Turing proved this is <em>undecidable</em> by diagonalisation. Assume a decider H(M,w) exists. Construct D(M): run H(M,M); if H says "halt", loop forever; if H says "loop", halt. Then D(D) — the program applied to itself — creates a contradiction. By Rice's Theorem, every non-trivial semantic property of programs is undecidable, making general program verification impossible.</p>
<p><strong>Complexity classes</strong>: P (decidable in polynomial time O(nᵏ)); NP (verifiable in polynomial time — the certificate can be checked efficiently, e.g. Sudoku, graph colouring, integer factorisation); co-NP (complement of NP problems); PSPACE (polynomial space); EXP (exponential time). A problem is <strong>NP-complete</strong> if it is in NP and every NP problem reduces to it in polynomial time. Cook-Levin (1971) proved SAT (boolean satisfiability) is NP-complete; over 3,000 natural problems are known NP-complete. If any NP-complete problem is in P, then P = NP.</p>`,
   facts:[{e:'🗺️',t:'The Travelling Salesman Problem (TSP) is NP-hard: the best exact algorithms for 1,000 cities still require astronomical time — yet TSP drives real-world logistics for FedEx and UPS.'},{e:'🧬',t:'Protein folding was long considered computationally intractable — a PSPACE problem. DeepMind\'s AlphaFold solved it heuristically using deep learning, winning the 2024 Nobel Prize in Chemistry.'},{e:'🎮',t:'Many classic video games are NP-hard: Super Mario Bros., Tetris, Minesweeper, and Candy Crush are all provably as hard as SAT in the general case.'}],
   formula:{rows:[
    {n:'TM transition',e:'δ: Q × Γ  →  Q × Γ × {L, R}'},
    {n:'Church-Turing thesis',e:'computable  ⟺  TM-computable   (conjecture)'},
    {sep:1},
    {n:'P',e:'L ∈ P  iff  ∃ TM M: M decides L in O(nᵏ) time'},
    {n:'NP',e:'L ∈ NP  iff  certificates verifiable in poly time'},
    {sep:1},
    {n:'NP-completeness',e:'L is NP-complete  iff  L ∈ NP  and  ∀L\' ∈ NP: L\' ≤_p L'},
    {n:'Cook-Levin',e:'SAT is NP-complete   (1971)'},
   ]},sim:'complexity'},

  scholar:{icon:'λ',title:'Circuit complexity, randomised computation, and the limits of proof',
   body:`<p>The <strong>circuit complexity</strong> approach attacks P vs NP by asking: how large must a Boolean circuit be to compute a given function? A circuit is a DAG of AND, OR, NOT gates; its size is the number of gates. Every problem in P has polynomial-size circuits (P ⊆ P/poly), but the converse is open. <strong>Shannon counting</strong> shows most Boolean functions on n bits require circuits of size Ω(2ⁿ/n) — superpolynomial — proving that hard functions exist. The challenge is to exhibit a specific hard function. The strongest known lower bounds for explicit functions in NP reach only Ω(n log n) — exponentially far from proving P ≠ NP via this route.</p>
<p><strong>Razborov-Rudich natural proofs</strong> barrier (1994) shows that any "natural" proof technique — one satisfying constructivity and largeness conditions — cannot prove super-polynomial circuit lower bounds unless one-way functions do not exist (which would break all cryptography). This suggests the P vs NP proof, if it exists, must use fundamentally non-natural techniques. The other main barriers are relativisation (most proof techniques relativise, but both P = NP and P ≠ NP hold in some oracle worlds) and algebrisation.</p>
<p><strong>Randomised complexity</strong>: BPP is the class of problems solvable in polynomial time with two-sided error ≤ 1/3. Derandomisation conjectures (Impagliazzo-Wigderson, 1997) state that if hard functions exist, then BPP = P — randomness is not fundamentally necessary. <strong>Interactive proof systems</strong> extend NP: IP = PSPACE (Shamir, 1992), meaning any PSPACE computation can be verified interactively. <strong>MIP* = RE</strong> (Ji et al., 2020) — multi-prover interactive proofs with quantum entanglement equal the recursively enumerable sets — a 2020 result that simultaneously resolved Connes' embedding conjecture in operator algebras, showing computation complexity intersects with pure mathematics in the deepest ways.</p>`,
   facts:[{e:'🎲',t:'The Schwartz-Zippel lemma underpins polynomial identity testing — the best known algorithm is randomised, and derandomising it would imply circuit lower bounds separating P from NP.'},{e:'🌀',t:'MIP* = RE (2020) means quantum-entangled provers can convince a verifier of undecidable facts — the most surprising result in complexity theory in decades.'},{e:'🔬',t:'The algebrisation barrier shows that techniques using algebraic methods — which proved IP=PSPACE — cannot alone resolve P vs NP, narrowing the space of possible proof strategies.'}],
   formula:{rows:[
    {n:'Circuit lower bound',e:'∃f ∈ NP: circuit size(f)  =  Ω(2ⁿ/n)   (Shannon counting)'},
    {n:'Best explicit bound',e:'∃f ∈ NP: circuit size(f)  ≥  Ω(n log n)   (2021)'},
    {sep:1},
    {n:'Randomised class',e:'BPP: poly-time, error ≤ 1/3 both sides'},
    {n:'Derandomisation',e:'hard functions exist  ⟹  BPP = P'},
    {sep:1},
    {n:'Interactive proofs',e:'IP  =  PSPACE   (Shamir 1992)'},
    {n:'Quantum provers',e:'MIP*  =  RE   (Ji et al. 2020)'},
   ]},sim:'complexity'},
 }},
