// SIMULATION ENGINE
// Key rule: canvas is sized ONCE. Controls live OUTSIDE canvas wrapper.
// No layout-triggering calls inside rAF.
// ═══════════════════════════════════════════════════════════════════
const SIMS={};
function stopSims(){
  for(const k in SIMS){
    const s=SIMS[k];
    if(s.raf) cancelAnimationFrame(s.raf);
    if(s.timer) clearTimeout(s.timer);
    if(s.int) clearInterval(s.int);
    delete SIMS[k];
  }
}

// Setup canvas with fixed W×H, scaled for DPR. Returns {canvas,ctx,W,H,dpr}
function mkCanvas(container, W, H){
  const dpr=window.devicePixelRatio||1;
  const wrap=newEl('div','sim-canvas-wrap');
  wrap.style.width=W+'px'; wrap.style.height=H+'px';
  const c=document.createElement('canvas');
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  wrap.appendChild(c);
  container.appendChild(wrap);
  return{canvas:c,ctx,W,H,dpr};
}

// Controls row (sibling of canvas wrap, inside container)
function mkCtrl(container){
  const d=newEl('div','sim-controls');
  container.appendChild(d);
  return d;
}
function mkPills(container){const d=newEl('div','sim-pills');container.appendChild(d);return d;}
function pill(lbl){
  const d=newEl('div','spill');d.innerHTML=lbl+': <b>—</b>';
  return{el:d,set(v){d.querySelector('b').textContent=v}};
}
function mkBtn(txt,pri=false,clr=''){
  const b=newEl('button','cbtn'+(pri?' pri':''));
  b.textContent=txt;
  if(pri&&clr)b.style.background=clr;
  return b;
}
function mkRange(ctrl,lbl,min,max,val,step,clr){
  const w=newEl('div','rng-wrap'); const top=newEl('div','rng-top');
  const l=newEl('span','rng-lbl');l.textContent=lbl;
  const v=newEl('span','rng-v');v.textContent=val;if(clr)v.style.color=clr;
  top.appendChild(l);top.appendChild(v);
  const inp=document.createElement('input');inp.type='range';
  inp.min=min;inp.max=max;inp.value=val;inp.step=step||1;
  w.appendChild(top);w.appendChild(inp);
  ctrl.appendChild(w);
  inp.addEventListener('input',()=>{v.textContent=parseFloat(inp.value).toFixed(step<1?2:0);});
  return{inp,v,get val(){return+inp.value}};
}

function getSimWidth(container){
  // Use the panel body width, capped at 800
  const w=document.getElementById('pbody').offsetWidth||500;
  return Math.min(w-4,820);
}

function buildSim(id,container,color,lvl){
  const map={orbit:simOrbit,waves:simWaves,thermo:simThermo,prob:simGalton,
             fractal:simFractal,life:simLife,sorting:simSorting,climate:simClimate};
  if(map[id])map[id](container,color,lvl);
}

/* ── ORBIT ── */
function simOrbit(container,color){
  const W=getSimWidth(container),H=290;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pPer=pill('Period'); const pVel=pill('Speed');
  pRow.appendChild(pPer.el); pRow.appendChild(pVel.el);
  const rR=mkRange(ctrl,'Orbit Radius',40,130,80,1,color);
  const rM=mkRange(ctrl,'Star Mass',0.5,5,2,0.1,color);

  let angle=0, trail=[];
  const S=SIMS.orbit={raf:null};

  rR.inp.addEventListener('input',()=>trail=[]);
  rM.inp.addEventListener('input',()=>trail=[]);

  function frame(){
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2, r=rR.val, m=rM.val;
    const spd=Math.sqrt(m*900/r);
    angle+=spd/r*0.016;
    const px=cx+r*Math.cos(angle), py=cy+r*Math.sin(angle);
    trail.push({x:px,y:py}); if(trail.length>220)trail.shift();

    // Star glow
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,40+m*9);
    g.addColorStop(0,'rgba(255,200,60,0.4)');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,40+m*9,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Orbit ring
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1.5;ctx.stroke();
    // Trail
    for(let i=1;i<trail.length;i++){
      const t=i/trail.length;
      const hex=Math.round(t*150+30).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);
      ctx.strokeStyle=color+hex;ctx.lineWidth=2;ctx.stroke();
    }
    // Star
    ctx.beginPath();ctx.arc(cx,cy,9+m*2.5,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    // Planet
    ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(px,py,13,0,Math.PI*2);ctx.fillStyle=color+'33';ctx.fill();
    // Gravity arrow
    const dx=cx-px,dy=cy-py,dl=Math.sqrt(dx*dx+dy*dy);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+dx/dl*22,py+dy/dl*22);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2.5;ctx.stroke();

    pPer.set(((2*Math.PI*r)/spd).toFixed(1)+'s');
    pVel.set(spd.toFixed(1)+' u/s');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── WAVES ── */
function simWaves(container,color){
  const W=getSimWidth(container),H=260;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pType=pill('Interference'); const pAmp=pill('Max amplitude');
  pRow.appendChild(pType.el); pRow.appendChild(pAmp.el);
  const rF=mkRange(ctrl,'Frequency 2',0.5,3,1,0.05,color);
  const rP=mkRange(ctrl,'Phase Shift',0,6.28,0,0.05,color);

  let t=0;
  const S=SIMS.waves={raf:null};

  function frame(){
    ctx.clearRect(0,0,W,H);
    const cy=H/2, A=Math.min(H/2-8,50);
    const f2=rF.val, ph=rP.val;

    // Centre line
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);
    ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=1;ctx.stroke();

    // Wave 1
    ctx.beginPath();
    for(let x=0;x<W;x++){const xi=x/W*Math.PI*8;const y=cy+A*Math.sin(xi-t);x?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle=color+'88';ctx.lineWidth=2;ctx.stroke();

    // Wave 2
    ctx.beginPath();
    for(let x=0;x<W;x++){const xi=x/W*Math.PI*8;const y=cy+A*Math.sin(f2*xi-t+ph);x?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle='rgba(124,58,237,0.55)';ctx.lineWidth=2;ctx.stroke();

    // Superposition
    let maxA=0;
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const xi=x/W*Math.PI*8;
      const sum=A*Math.sin(xi-t)+A*Math.sin(f2*xi-t+ph);
      if(Math.abs(sum)>maxA)maxA=Math.abs(sum);
      x?ctx.lineTo(x,cy+sum):ctx.moveTo(x,cy+sum);
    }
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();

    pType.set(maxA>A*1.6?'Constructive ✓':maxA<A*0.4?'Destructive ✗':'Partial ~');
    pAmp.set((maxA/A).toFixed(2)+'×');
    t+=0.04; S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── THERMODYNAMICS ── */
function simThermo(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pHits=pill('Wall hits/s'); const pAvg=pill('Avg speed');
  pRow.appendChild(pHits.el); pRow.appendChild(pAvg.el);
  const rT=mkRange(ctrl,'Temperature (K)',50,1200,300,10,color);
  const rN=mkRange(ctrl,'Particles',5,90,30,5,color);

  let particles=[], wallHits=0, frames=0;
  function initP(){
    particles=[];
    const n=rN.val;
    for(let i=0;i<n;i++) particles.push({
      x:18+Math.random()*(W-36),y:18+Math.random()*(H-36),
      vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3
    });
  }
  rN.inp.addEventListener('input',initP);
  initP();

  const S=SIMS.thermo={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(10,10,W-20,H-20);
    const sc=Math.sqrt(rT.val/300)*2;
    let tv=0;
    for(const p of particles){
      p.x+=p.vx*sc; p.y+=p.vy*sc;
      if(p.x<15){p.vx=Math.abs(p.vx);wallHits++;}
      if(p.x>W-15){p.vx=-Math.abs(p.vx);wallHits++;}
      if(p.y<15){p.vy=Math.abs(p.vy);wallHits++;}
      if(p.y>H-15){p.vy=-Math.abs(p.vy);wallHits++;}
      p.x=Math.max(15,Math.min(W-15,p.x));
      p.y=Math.max(15,Math.min(H-15,p.y));
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)*sc; tv+=spd;
      const h=Math.max(0,220-rT.val*0.18);
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fillStyle=`hsl(${h},76%,58%)`;ctx.fill();
    }
    frames++;
    if(frames%30===0){
      pHits.set(wallHits);
      pAvg.set((tv/particles.length).toFixed(2)+' u/s');
      wallHits=0;
    }
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── GALTON BOARD ── */
function simGalton(container,color){
  const W=getSimWidth(container),H=300;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pTot=pill('Total balls'); const pMean=pill('Mean bin');
  pRow.appendChild(pTot.el); pRow.appendChild(pMean.el);

  const bDrop=mkBtn('▶ Drop balls',true,color);
  const bReset=mkBtn('↺ Reset');
  const rRows=mkRange(ctrl,'Rows of pegs',4,10,7,1,color);
  ctrl.prepend(bReset); ctrl.prepend(bDrop);

  let numRows=7, bins, balls=[], total=0, dropping=false, dropInt;
  function reset(){bins=new Array(numRows+1).fill(0);balls=[];total=0;pTot.set('0');pMean.set('—');}
  reset();

  rRows.inp.addEventListener('input',()=>{numRows=rRows.val;reset();});
  bDrop.addEventListener('click',()=>{
    dropping=!dropping;
    bDrop.textContent=dropping?'⏸ Stop':'▶ Drop balls';
    if(dropping)dropInt=setInterval(()=>{
      balls.push({x:W/2,y:6,row:0,col:0,vy:0,hue:180+Math.random()*70});
    },120);
    else clearInterval(dropInt);
  });
  bReset.addEventListener('click',()=>{
    dropping=false;clearInterval(dropInt);bDrop.textContent='▶ Drop balls';reset();
  });

  function pp(r,c){
    const sp=Math.min(24,(W-60)/(numRows+1));
    const sy=(H-90)/(numRows+2);
    return{x:W/2+(c-r/2)*sp, y:26+r*sy};
  }

  const S=SIMS.prob={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    // Pegs
    for(let r=0;r<=numRows;r++) for(let c=0;c<=r;c++){
      const p=pp(r,c);
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fill();
    }
    // Bins
    const maxB=Math.max(...bins,1);
    const lastY=pp(numRows,0).y+14;
    const maxBH=H-lastY-8;
    const bw=Math.min(22,(W-60)/(numRows+1));
    for(let i=0;i<=numRows;i++){
      const p=pp(numRows,i), bx=p.x-bw/2;
      // Gaussian ghost
      const g=Math.exp(-0.5*Math.pow((i-numRows/2)/(numRows*0.2),2));
      ctx.fillStyle=color+'18'; ctx.fillRect(bx,H-8-g*maxBH,bw-2,g*maxBH);
      // Data bar
      if(bins[i]>0){
        const bh=(bins[i]/maxB)*maxBH;
        ctx.fillStyle=color+'cc'; ctx.fillRect(bx,H-8-bh,bw-2,bh);
      }
      ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;
      ctx.strokeRect(bx,lastY,bw-2,maxBH);
    }
    // Animate balls
    const alive=[];
    for(const b of balls){
      b.vy+=0.65; b.y+=b.vy;
      if(b.row<=numRows){
        const pin=pp(b.row,b.col);
        if(b.y>=pin.y){b.vy=2.5;b.col+=(Math.random()<.5?1:0);b.row++;b.x=pp(b.row,b.col).x+(Math.random()-.5)*3;}
      }
      if(b.row>numRows&&b.y>H-10){
        bins[b.col]++; total++;
        pTot.set(total);
        pMean.set((bins.reduce((s,v,i)=>s+v*i,0)/total).toFixed(2));
      } else {
        ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);
        ctx.fillStyle=`hsl(${b.hue},76%,55%)`;ctx.fill();
        alive.push(b);
      }
    }
    balls=alive;
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ── MANDELBROT ── */
function simFractal(container,color,lvl){
  const W=getSimWidth(container),H=300;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pZoom=pill('Zoom level'); pRow.appendChild(pZoom.el);
  let maxIter=lvl==='junior'?50:lvl==='student'?90:160;
  const rI=mkRange(ctrl,'Detail (iterations)',20,240,maxIter,5,color);
  const bR=mkBtn('↺ Reset view');
  ctrl.appendChild(bR);

  let cx=-0.5,cy=0,zoom=Math.min(W,H)*0.44, dirty=true;

  rI.inp.addEventListener('input',()=>{maxIter=rI.val;dirty=true;});
  bR.addEventListener('click',()=>{cx=-0.5;cy=0;zoom=Math.min(W,H)*0.44;pZoom.set('1×');dirty=true;});

  canvas.style.cursor='crosshair';
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/(rect.width*dpr), sy=canvas.height/(rect.height*dpr);
    const mx=(e.clientX-rect.left)*dpr*sx/dpr;
    const my=(e.clientY-rect.top)*dpr*sy/dpr;
    cx+=(mx-W/2)/zoom; cy+=(my-H/2)/zoom;
    zoom*=2.2;
    pZoom.set((zoom/(Math.min(W,H)*0.44)).toFixed(1)+'×');
    dirty=true;
  });

  function drawM(){
    const RW=W*dpr, RH=H*dpr;
    const id=ctx.createImageData(RW,RH);
    const d=id.data;
    for(let py=0;py<RH;py++){
      for(let px=0;px<RW;px++){
        const cr=(px/dpr-W/2)/zoom+cx, ci=(py/dpr-H/2)/zoom+cy;
        let zr=0,zi=0,it=0;
        while(it<maxIter&&zr*zr+zi*zi<4){const t=zr*zr-zi*zi+cr;zi=2*zr*zi+ci;zr=t;it++;}
        const idx=(py*RW+px)*4;
        if(it===maxIter){d[idx]=10;d[idx+1]=8;d[idx+2]=20;d[idx+3]=255;}
        else{
          const t=it/maxIter;
          d[idx]=Math.round(9+230*Math.pow(Math.sin(t*3.14),1.5));
          d[idx+1]=Math.round(220*Math.pow(Math.sin(t*3.14+2.1),1.5));
          d[idx+2]=Math.round(30+220*Math.pow(Math.sin(t*3.14+4.2),1.5));
          d[idx+3]=255;
        }
      }
    }
    ctx.putImageData(id,0,0);
    // overlay hint
    ctx.save();ctx.scale(1/dpr,1/dpr);
    ctx.font=`bold ${13*dpr}px Nunito,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillText('Click anywhere to zoom in',10*dpr,(H-10)*dpr);
    ctx.restore();
    dirty=false;
  }

  const S=SIMS.fractal={raf:null};
  function frame(){if(dirty)drawM();S.raf=requestAnimationFrame(frame);}
  frame();
}

/* ── GAME OF LIFE ── */
function simLife(container,color){
  const W=getSimWidth(container),H=290;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pGen=pill('Generation'); const pAlive=pill('Alive cells');
  pRow.appendChild(pGen.el); pRow.appendChild(pAlive.el);

  const bTog=mkBtn('⏸ Pause');bTog.style.cssText=`border-color:${color};color:${color}`;
  const bClear=mkBtn('✕ Clear');
  const bRand=mkBtn('⚡ Random');
  const bGlider=mkBtn('🛸 Glider',true,color);
  [bTog,bClear,bRand,bGlider].forEach(b=>ctrl.appendChild(b));

  const CELL=9;
  const cols=Math.floor(W/CELL), rows=Math.floor(H/CELL);
  let grid=new Uint8Array(cols*rows), next=new Uint8Array(cols*rows);
  let running=true, gen=0;

  const idx=(r,c)=>r*cols+c;
  const N=(r,c)=>{ let n=0; for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;n+=grid[idx((r+dr+rows)%rows,(c+dc+cols)%cols)];}return n;};

  function randomize(){for(let i=0;i<grid.length;i++)grid[i]=Math.random()<0.28?1:0;gen=0;}
  function clearG(){grid.fill(0);gen=0;}
  function glider(r,c){[[0,1],[1,2],[2,0],[2,1],[2,2]].forEach(([dr,dc])=>{if(r+dr<rows&&c+dc<cols)grid[idx(r+dr,c+dc)]=1;});}
  function step(){
    let alive=0;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const n=N(r,c), cur=grid[idx(r,c)];
      next[idx(r,c)]=(cur&&(n===2||n===3))||(!cur&&n===3)?1:0;
      if(next[idx(r,c)])alive++;
    }
    [grid,next]=[next,grid];gen++;
    pGen.set(gen);pAlive.set(alive);
  }

  bTog.addEventListener('click',()=>{running=!running;bTog.textContent=running?'⏸ Pause':'▶ Play';});
  bClear.addEventListener('click',clearG);
  bRand.addEventListener('click',randomize);
  bGlider.addEventListener('click',()=>{clearG();glider(2,2);glider(3,Math.floor(cols/2));glider(Math.floor(rows/2),Math.floor(cols/3));});
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const c2=Math.floor((e.clientX-rect.left)/CELL), r2=Math.floor((e.clientY-rect.top)/CELL);
    if(r2>=0&&r2<rows&&c2>=0&&c2<cols) grid[idx(r2,c2)]^=1;
  });
  randomize();

  const S=SIMS.life={raf:null,timer:null};
  function frame(){
    ctx.fillStyle='#f4f9f4';ctx.fillRect(0,0,W*dpr,H*dpr);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(!grid[idx(r,c)])continue;
      ctx.fillStyle=color+'e0';
      ctx.fillRect((c*CELL+1)*dpr,(r*CELL+1)*dpr,(CELL-2)*dpr,(CELL-2)*dpr);
    }
    if(running) step();
    S.timer=setTimeout(()=>{S.raf=requestAnimationFrame(frame);},72);
  }
  frame();
}

/* ── SORTING ── */
function simSorting(container,color){
  const W=getSimWidth(container),H=260;
  const {canvas,ctx,dpr}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pAlgo=pill('Algorithm'); const pComp=pill('Comparisons'); const pSwap=pill('Swaps');
  pRow.appendChild(pAlgo.el); pRow.appendChild(pComp.el); pRow.appendChild(pSwap.el);

  const bBubble=mkBtn('Bubble Sort',true,color);
  const bMerge=mkBtn('Merge Sort');
  const bRand=mkBtn('↺ Shuffle');
  const rN=mkRange(ctrl,'Array size',10,80,40,5,color);
  [bBubble,bMerge,bRand].forEach(b=>ctrl.prepend(b));

  let arr=[], n=40, gen=null, active=false, comps=0, swaps=0;
  function shuffle(){n=rN.val;arr=Array.from({length:n},()=>Math.floor(Math.random()*95)+5);comps=0;swaps=0;active=false;gen=null;pComp.set(0);pSwap.set(0);}

  function* bubble(a){
    for(let i=0;i<a.length;i++) for(let j=0;j<a.length-i-1;j++){
      comps++;if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;}
      yield;
    }
  }
  function* merge(a){
    function*ms(l,r){
      if(l>=r)return;const m=(l+r)>>1;yield*ms(l,m);yield*ms(m+1,r);
      const L=a.slice(l,m+1),R=a.slice(m+1,r+1);
      let i=0,j=0,k=l;
      while(i<L.length&&j<R.length){comps++;if(L[i]<=R[j])a[k++]=L[i++];else{a[k++]=R[j++];swaps++;}yield;}
      while(i<L.length){a[k++]=L[i++];yield;}
      while(j<R.length){a[k++]=R[j++];yield;}
    }
    yield*ms(0,a.length-1);
  }

  bBubble.addEventListener('click',()=>{shuffle();pAlgo.set('Bubble O(n²)');gen=bubble(arr);active=true;});
  bMerge.addEventListener('click',()=>{shuffle();pAlgo.set('Merge O(n log n)');gen=merge(arr);active=true;});
  bRand.addEventListener('click',shuffle);
  rN.inp.addEventListener('input',shuffle);
  shuffle();

  const S=SIMS.sorting={raf:null,timer:null};
  function frame(){
    ctx.clearRect(0,0,W*dpr,H*dpr);
    const bw=W/arr.length;
    arr.forEach((v,i)=>{
      const bh=(v/100)*(H-12)*dpr;
      ctx.fillStyle=`hsl(${210+i*120/arr.length},65%,55%)`;
      ctx.fillRect(i*bw*dpr,(H-6)*dpr-bh,Math.max(1,(bw-1.5)*dpr),bh);
    });
    if(active&&gen){
      const steps=gen===bubble?4:10;
      for(let i=0;i<steps;i++){const r=gen.next();if(r.done){active=false;break;}}
      pComp.set(comps);pSwap.set(swaps);
    }
    S.timer=setTimeout(()=>{S.raf=requestAnimationFrame(frame);},16);
  }
  frame();
}

/* ── CLIMATE ── */
function simClimate(container,color){
  const W=getSimWidth(container),H=280;
  const {canvas,ctx}=mkCanvas(container,W,H);
  const ctrl=mkCtrl(container);
  const pRow=mkPills(container);
  const pCO2=pill('CO₂'); const pF=pill('Forcing'); const pDT=pill('ΔT');
  pRow.appendChild(pCO2.el); pRow.appendChild(pF.el); pRow.appendChild(pDT.el);

  const rC=mkRange(ctrl,'CO₂ concentration (ppm)',280,800,280,5,color);
  const bPre=mkBtn('↺ Pre-industrial (280)');
  const bNow=mkBtn('Set to 2024 (420)',true,color);
  ctrl.appendChild(bPre); ctrl.appendChild(bNow);

  bPre.addEventListener('click',()=>{rC.inp.value=280;rC.v.textContent='280';});
  bNow.addEventListener('click',()=>{rC.inp.value=420;rC.v.textContent='420';});

  let t=0;
  const S=SIMS.climate={raf:null};
  function frame(){
    ctx.clearRect(0,0,W,H);
    t+=0.03;
    const co2=rC.val;
    const dF=5.35*Math.log(co2/280);
    const dT=dF*0.8;

    // Sky gradient
    const skyH=H*0.72;
    const g=ctx.createLinearGradient(0,0,0,skyH);
    const warmth=Math.min((co2-280)/520,1);
    g.addColorStop(0,`hsl(${200-warmth*30},${60+warmth*20}%,${70-warmth*15}%)`);
    g.addColorStop(1,`hsl(${200-warmth*20},40%,85%)`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,skyH);

    // Ground
    const groundH=H*0.28;
    const gh=ctx.createLinearGradient(0,skyH,0,H);
    gh.addColorStop(0,`hsl(${120-warmth*40},${50+warmth*10}%,${35-warmth*8}%)`);
    gh.addColorStop(1,`hsl(${100-warmth*40},40%,25%)`);
    ctx.fillStyle=gh;ctx.fillRect(0,skyH,W,groundH);

    // Sun
    const sx=W*0.12,sy=H*0.17;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,25);
    sg.addColorStop(0,'rgba(255,240,80,1)');sg.addColorStop(1,'rgba(255,200,50,0)');
    ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fillStyle='#fbbf24';ctx.fill();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2+t*0.3;ctx.beginPath();ctx.moveTo(sx+26*Math.cos(a),sy+26*Math.sin(a));ctx.lineTo(sx+36*Math.cos(a),sy+36*Math.sin(a));ctx.strokeStyle='#fbbf24';ctx.lineWidth=2.5;ctx.stroke();}

    // Atmosphere layer (thicker = more CO₂)
    const atmoAlpha=0.08+(warmth*0.38);
    const atmoY=H*0.24, atmoH=H*0.16;
    ctx.fillStyle=`rgba(100,180,80,${atmoAlpha})`;
    ctx.fillRect(0,atmoY,W,atmoH);
    ctx.font='bold 11px Nunito,sans-serif';ctx.fillStyle=`rgba(0,80,0,${0.4+atmoAlpha})`;ctx.textAlign='center';
    ctx.fillText(`Atmosphere  CO₂: ${co2} ppm`,W/2,atmoY+atmoH*0.62);

    // Incoming solar rays (yellow dots)
    for(let i=0;i<5;i++){
      const prog=(t*0.38+i*0.2)%1;
      const rx=W*0.2+W*0.6*(i/4.5);const ry=sy+prog*(skyH*0.88-sy);
      ctx.beginPath();ctx.arc(rx,ry,3.5,0,Math.PI*2);ctx.fillStyle='rgba(255,220,40,0.85)';ctx.fill();
    }

    // Outgoing IR rays (orange) — some trapped
    for(let i=0;i<5;i++){
      const prog=(t*0.3+i*0.2)%1;
      const rx=W*0.25+W*0.5*(i/4.5);const ry=skyH-prog*(skyH*0.75);
      const trapped=warmth>0.3&&Math.random()<warmth*0.7;
      ctx.beginPath();ctx.arc(rx,ry,3.5,0,Math.PI*2);
      ctx.fillStyle=trapped?'rgba(255,80,30,0.85)':'rgba(255,160,60,0.65)';ctx.fill();
    }

    // Labels
    ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 12px Nunito,sans-serif';
    ctx.fillText('🟡 Solar radiation',W*0.02,H*0.55);
    ctx.fillStyle='rgba(255,120,50,0.9)';
    ctx.fillText('🔴 Trapped IR heat',W*0.02,H*0.62);

    // Ground label
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='center';ctx.font='bold 11px Nunito,sans-serif';
    ctx.fillText(`Earth surface — ΔT: ${dT>0?'+':''}${dT.toFixed(2)} °C vs pre-industrial`,W/2,H*0.88);

    pCO2.set(co2+' ppm');pF.set(dF.toFixed(2)+' W/m²');pDT.set((dT>0?'+':'')+dT.toFixed(2)+'°C');
    S.raf=requestAnimationFrame(frame);
  }
  frame();
}
